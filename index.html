<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elevation Bend — Farmers Market</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f8f7f4;color:#1a1a1a;min-height:100vh}
/* AUTH */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
.auth-card{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,0.1)}
.auth-logo{font-size:22px;font-weight:700;margin-bottom:4px}
.auth-sub{font-size:12px;color:#888;margin-bottom:1.75rem}
.auth-title{font-size:16px;font-weight:600;margin-bottom:1.25rem}
.auth-fg{margin-bottom:.85rem}
.auth-fg label{font-size:11px;color:#555;display:block;margin-bottom:4px;font-weight:500}
.auth-fg input{width:100%;border:1px solid #d0cec7;border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;outline:none}
.auth-fg input:focus{border-color:#22c55e;box-shadow:0 0 0 3px #dcfce7}
.auth-btn{width:100%;background:#1a1a1a;color:#fff;border:none;padding:11px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-err{background:#FCEBEB;color:#791F1F;border-radius:8px;padding:.75rem 1rem;font-size:12px;margin-bottom:.85rem;display:none}
.auth-footer{text-align:center;font-size:12px;color:#888;margin-top:1rem}
.auth-link{color:#1a1a1a;font-weight:500;cursor:pointer;text-decoration:underline}
/* APP */
#app-screen{display:none;padding:.75rem;max-width:960px;margin:0 auto}
.env-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:8px;margin-bottom:.75rem;border:0.5px solid #22c55e;background:#dcfce7}
.env-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0}
.env-label{font-size:11px;font-weight:500;flex:1;color:#15803d}
.env-user{font-size:10px;color:#15803d}
.signout-btn{font-size:10px;padding:4px 9px;border-radius:6px;border:0.5px solid #639922;background:#fff;color:#27500A;cursor:pointer;font-family:inherit}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:8px}
.hdr-title{font-size:16px;font-weight:700}
.hdr-sub{font-size:11px;color:#888;margin-top:1px}
nav{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:.85rem;background:#f0ede6;border-radius:8px;padding:3px}

.nb.active{background:#fff;color:#1a1a1a;border:0.5px solid #e5e3de;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:5px;margin-bottom:.85rem}
.stat{background:#fff;border:0.5px solid #e5e3de;border-radius:10px;padding:.5rem .65rem}
.sl{font-size:9px;color:#888;margin-bottom:1px;text-transform:uppercase;letter-spacing:.03em}
.sv{font-size:16px;font-weight:700}

.vrow.vstatus-active{border-left:3px solid #22c55e}
.vrow.vstatus-inwork{border-left:3px solid #eab308}

.vname{font-size:13px;font-weight:600}
.vmeta{font-size:11px;color:#888;margin-top:2px}
.vdates{font-size:10px;color:#888;margin-top:3px}
.vtags{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.tg{background:#EAF3DE;color:#27500A}.tb{background:#E6F1FB;color:#0C447C}
.tw{background:#FAEEDA;color:#633806}.tr{background:#FCEBEB;color:#791F1F}.tgr{background:#f0ede6;color:#555}

.vs-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle}
.vactions{display:flex;align-items:center;gap:4px;margin-top:7px;flex-wrap:wrap}
.vactions select{font-size:10px;padding:3px 5px;border-radius:5px;border:0.5px solid #d0cec7;background:#f8f7f4;color:#1a1a1a;font-family:inherit}
.iBtn{background:none;border:0.5px solid #e5e3de;border-radius:6px;padding:4px 7px;font-size:12px;cursor:pointer;color:#888}

.empty{text-align:center;padding:2rem .5rem;color:#aaa;font-size:12px;background:#fff;border:0.5px solid #e5e3de;border-radius:10px}
.glabel{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin:.65rem 0 .3rem;padding-left:2px}

.tnum{font-size:9px;font-weight:700;color:#aaa;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;padding-right:26px}
.tvname{font-size:12px;font-weight:600;margin-top:4px;color:#1a1a1a}

.tassign:hover{background:#f0ede6;color:#1a1a1a}
/* CALENDAR */
.cal-wrap{background:#fff;border:0.5px solid #e5e3de;border-radius:12px;padding:.85rem}
.cal-nav{display:flex;align-items:center;gap:8px;margin-bottom:.65rem}
.cal-nav span{font-size:13px;font-weight:600;flex:1;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.chd{text-align:center;font-size:10px;color:#888;padding:3px 0;font-weight:600}

.cday.selected-day{box-shadow:0 0 0 2.5px #1a1a1a}
.day-count{font-size:8px;display:block;font-weight:400}
.day-report{background:#fff;border:0.5px solid #e5e3de;border-radius:12px;margin-top:.85rem;overflow:hidden}
.day-report-header{padding:.85rem 1rem;background:#f8f7f4;border-bottom:0.5px solid #e5e3de;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.day-vendor-card{padding:.85rem 1rem;border-bottom:0.5px solid #e5e3de;cursor:pointer;display:flex;align-items:flex-start;gap:10px}

.day-vendor-card:last-child{border-bottom:none}
.dvc-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
/* MODAL */
.overlay{background:rgba(0,0,0,.4);position:fixed;inset:0;z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:1.5rem 1rem;overflow-y:auto}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:100%;max-width:520px;margin:auto}
.mtitle{font-size:14px;font-weight:700;margin-bottom:1rem;padding-bottom:.65rem;border-bottom:0.5px solid #e5e3de}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem;padding-top:.75rem;border-top:0.5px solid #e5e3de;flex-wrap:wrap}
.sec{background:#f8f7f4;border:0.5px solid #e5e3de;border-radius:10px;padding:.85rem;margin-bottom:.65rem}
.stitle{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.6rem}
.fg{margin-bottom:.6rem}
.fg label{font-size:11px;color:#555;display:block;margin-bottom:3px;font-weight:500}
.fg input,.fg select,.fg textarea{width:100%;border:0.5px solid #d0cec7;border-radius:8px;padding:7px 9px;font-size:13px;background:#fff;color:#1a1a1a;font-family:inherit;outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#22c55e}
.fg textarea{height:52px;resize:vertical}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rg{display:flex;flex-direction:column;gap:4px}
.ropt{display:flex;align-items:flex-start;gap:7px;padding:6px 9px;border:0.5px solid #e5e3de;border-radius:8px;cursor:pointer;background:#fff}
.ropt.sel{border-color:#22c55e;background:#dcfce7}
.ropt input[type=radio]{margin-top:2px;flex-shrink:0;accent-color:#22c55e}
.ropt span{font-size:12px}
.copt{display:flex;align-items:flex-start;gap:7px;padding:7px 10px;border:0.5px solid #e5e3de;border-radius:8px;cursor:pointer;background:#fff}
.copt:hover{border-color:#d0cec7}
.copt span{font-size:12px;flex:1}
.copt input[type=checkbox]{margin-top:2px;flex-shrink:0;accent-color:#22c55e;width:15px;height:15px}
.sub{margin-top:5px;padding-left:12px;border-left:2px solid #d0cec7}
.q{font-size:12px;font-weight:600;margin-bottom:5px}
.upload-zone{border:1.5px dashed #d0cec7;border-radius:10px;padding:.85rem;text-align:center;cursor:pointer;color:#aaa;font-size:12px;margin-bottom:.5rem}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:.4rem}
.pthumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;border:0.5px solid #e5e3de}
.vs-selector{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:4px}
.vs-card{border:1.5px solid #e5e3de;border-radius:8px;padding:9px 6px;text-align:center;cursor:pointer;background:#fff}
.vs-card.sel-active{border-color:#22c55e;background:#dcfce7}
.vs-card.sel-inwork{border-color:#eab308;background:#fef9c3}
.vs-card.sel-inactive{border-color:#9ca3af;background:#f3f4f6}
.vs-card-dot{width:11px;height:11px;border-radius:50%;margin:0 auto 4px}
.vs-card-label{font-size:10px;font-weight:700}
.toggle-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.toggle-card{border:1.5px solid #e5e3de;border-radius:8px;padding:9px;cursor:pointer;background:#fff;display:flex;align-items:center;gap:7px}
.toggle-card.checked-contract{border-color:#0C447C;background:#E6F1FB}
.toggle-card.checked-payment{border-color:#27500A;background:#EAF3DE}
.toggle-card input[type=checkbox]{display:none}
.date-strip{display:flex;gap:10px;flex-wrap:wrap;margin-top:.5rem;padding:.6rem .75rem;background:#f8f7f4;border-radius:8px;border:0.5px solid #e5e3de}
.date-item-label{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.04em}
.date-item-val{font-size:11px;font-weight:600;margin-top:1px}
.date-chip-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.date-chip{font-size:11px;padding:5px 10px;border-radius:20px;border:0.5px solid #d0cec7;background:#fff;cursor:pointer;font-family:inherit;color:#888}
.date-chip.selected{background:#EAF3DE;border-color:#639922;color:#27500A;font-weight:600}
.report-table{width:100%;border-collapse:collapse;font-size:12px}
.report-table th{text-align:left;padding:7px 8px;font-weight:700;color:#888;border-bottom:0.5px solid #e5e3de;font-size:10px;text-transform:uppercase;background:#f8f7f4}
.report-table td{padding:7px 8px;border-bottom:0.5px solid #f0ede6;vertical-align:middle}
.report-table tr:hover td{background:#f8f7f4;cursor:pointer}
.report-wrap{background:#fff;border:0.5px solid #e5e3de;border-radius:12px;overflow:hidden;margin-bottom:.85rem}
.sched-approved{background:#EAF3DE;color:#27500A;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600}
.sched-waitlist{background:#FAEEDA;color:#633806;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600}
.sched-pending{background:#f0ede6;color:#555;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600}

.size-option.sel{border-color:#378ADD;background:#E6F1FB}
.size-option input[type=radio]{accent-color:#378ADD;flex-shrink:0}
.notice{background:#fef9c3;border:0.5px solid #eab308;border-radius:8px;padding:.65rem .85rem;font-size:11px;color:#a16207;margin-bottom:.75rem;line-height:1.6}
.vendor-search{width:100%;border:0.5px solid #d0cec7;border-radius:8px;padding:8px 10px;font-size:13px;background:#fff;font-family:inherit;margin-bottom:.65rem;outline:none}
.vendor-list{max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
</style>

<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">Elevation Bend</div>
    <div class="auth-sub">Farmers Market — Vendor Management</div>
    <div class="auth-title" id="auth-title">Sign in to your account</div>
    <div class="auth-err" id="auth-err"></div>
    <div class="auth-fg"><label>Email address</label><input type="email" id="auth-email" placeholder="you@example.com" autocomplete="email"></div>
    <div class="auth-fg"><label>Password</label><input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password"></div>
    <div class="auth-fg" id="auth-confirm-wrap" style="display:none"><label>Confirm password</label><input type="password" id="auth-confirm"></div>
    <button class="auth-btn" id="auth-btn">Sign in</button>
    <div class="auth-footer"><span id="auth-toggle-text">Don't have an account?</span> <span class="auth-link" id="auth-toggle">Sign up</span></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="env-bar">
    <div class="env-dot"></div>
    <div style="flex:1"><div class="env-label">Elevation Bend — Live (Supabase)</div><div class="env-user" id="user-email"></div></div>
    <button class="signout-btn" id="signout-btn">Sign out</button>
  </div>
  <div class="hdr">
    <div><div class="hdr-title">Elevation Bend</div><div class="hdr-sub">Farmers Market Vendors</div></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn-g" id="exportBtn">↓ Export</button>
      <button class="btn-p" id="newBtn">+ New vendor</button>
    </div>
  </div>
  <nav>
    <button class="nb active" data-tab="vendors">Vendors</button>
    <button class="nb" data-tab="calendar">Calendar</button>
    <button class="nb" data-tab="tents">Tents</button>
    <button class="nb" data-tab="reports">Reports</button>
    <button class="nb" data-tab="waitlist">Waitlist</button>
  </nav>
  <div id="stats-bar"></div>
  <div id="filter-bar"></div>
  <div id="main-content"></div>
  <div id="modal-area"></div>
</div>

<script>
const SUPA_URL='https://mixubqomqdfcrgfovnwy.supabase.co';
const SUPA_KEY='sb_publishable_btz05uH2n90XYfkGIooLog_CY71YUW3';
const {createClient}=supabase;
const sb=createClient(SUPA_URL,SUPA_KEY);

// ── State ───────────────────────────────────────────────────────────────────
var vendors=[],tents=[],calRows={},currentUser=null;
// calRows[date] = {approved:[ids], waitlist:[ids], tent_assignments:{tentId:vendorId}}
var tab='vendors',cY=new Date().getFullYear(),cM=new Date().getMonth();
var eId=null,vsFilter='all',reportDate='',reportType='summary';
var selectedCalDay='',tentViewDate='';
window._ep=[];

var VSC={
  active:{label:'Active',dot:'#22c55e',text:'#15803d',tagCls:'tag-vs-active'},
  inwork:{label:'In-Work',dot:'#eab308',text:'#a16207',tagCls:'tag-vs-inwork'},
  inactive:{label:'Inactive',dot:'#9ca3af',text:'#6b7280',tagCls:'tag-vs-inactive'}
};
var AVC=['#E6F1FB','#EAF3DE','#EEEDFE','#FAEEDA','#FAECE7','#fef9c3'];
var AVT=['#0C447C','#27500A','#3C3489','#633806','#712B13','#a16207'];

function avc(n){var h=0;for(var i=0;i<(n||'').length;i++)h=(h*31+n.charCodeAt(i))%6;return{bg:AVC[Math.abs(h)],text:AVT[Math.abs(h)]};}
function ini(n){return String(n||'?').split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);}
function vsTag(vs){var c=VSC[vs||'active']||VSC.active;return'<span class="tag '+c.tagCls+'"><span class="vs-dot" style="background:'+c.dot+'"></span>'+c.label+'</span>';}
function schedTag(s){if(s==='approved')return'<span class="sched-approved">Approved</span>';if(s==='waitlist')return'<span class="sched-waitlist">Waitlist</span>';return'<span class="sched-pending">Pending</span>';}
function uid(){return'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function csvCell(v){return'"'+String(v||'').replace(/"/g,'""')+'"';}
function nowISO(){return new Date().toISOString();}
function fmtDate(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fmtDT(iso){if(!iso)return'—';var d=new Date(iso);return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
function today(){return new Date().toISOString().slice(0,10);}
function closeMod(){document.getElementById('modal-area').innerHTML='';}

// Helpers for calRows
function getMarketDates(){return Object.keys(calRows).sort();}
function getApproved(ds){return(calRows[ds]&&calRows[ds].approved)||[];}
function getWaitlist(ds){return(calRows[ds]&&calRows[ds].waitlist)||[];}
function getTentAssignments(ds){return(calRows[ds]&&calRows[ds].tent_assignments)||{};}
function eligibleVendors(){
  return vendors.filter(function(v){return v.status==='approved'&&(v.vendorStatus||'active')==='active';})
    .sort(function(a,b){return(a.businessName||'').localeCompare(b.businessName||'');});
}

// ── Auth ─────────────────────────────────────────────────────────────────────
var authMode='signin';
document.getElementById('auth-toggle').addEventListener('click',function(){
  authMode=authMode==='signin'?'signup':'signin';
  document.getElementById('auth-title').textContent=authMode==='signin'?'Sign in to your account':'Create your account';
  document.getElementById('auth-btn').textContent=authMode==='signin'?'Sign in':'Sign up';
  document.getElementById('auth-toggle-text').textContent=authMode==='signin'?"Don't have an account?":'Already have an account?';
  document.getElementById('auth-toggle').textContent=authMode==='signin'?'Sign up':'Sign in';
  document.getElementById('auth-confirm-wrap').style.display=authMode==='signup'?'':'none';
  document.getElementById('auth-err').style.display='none';
});
document.getElementById('auth-email').addEventListener('keydown',function(e){if(e.key==='Enter')doAuth();});
document.getElementById('auth-password').addEventListener('keydown',function(e){if(e.key==='Enter')doAuth();});
document.getElementById('auth-btn').addEventListener('click',doAuth);

async function doAuth(){
  var email=document.getElementById('auth-email').value.trim();
  var password=document.getElementById('auth-password').value;
  var confirm=document.getElementById('auth-confirm').value;
  var btn=document.getElementById('auth-btn');
  if(!email||!password){showAuthErr('Please enter your email and password.');return;}
  if(authMode==='signup'&&password!==confirm){showAuthErr('Passwords do not match.');return;}
  btn.disabled=true;btn.textContent=authMode==='signin'?'Signing in…':'Creating account…';
  document.getElementById('auth-err').style.display='none';
  var result=authMode==='signin'
    ?await sb.auth.signInWithPassword({email,password})
    :await sb.auth.signUp({email,password});
  if(result.error){showAuthErr(result.error.message);btn.disabled=false;btn.textContent=authMode==='signin'?'Sign in':'Sign up';}
  else if(authMode==='signup'&&!result.data.session){showAuthErr('✅ Check your email to confirm, then sign in.');btn.disabled=false;btn.textContent='Sign in';authMode='signin';}
  else{currentUser=result.data.user;enterApp();}
}
function showAuthErr(msg){var el=document.getElementById('auth-err');el.textContent=msg;el.style.display='block';}

document.getElementById('signout-btn').addEventListener('click',async function(){
  await sb.auth.signOut();currentUser=null;vendors=[];tents=[];calRows={};
  document.getElementById('app-screen').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('auth-email').value='';document.getElementById('auth-password').value='';
});

async function checkSession(){
  var{data}=await sb.auth.getSession();
  if(data.session){currentUser=data.session.user;enterApp();}
}
function enterApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  document.getElementById('user-email').textContent=currentUser.email;
  loadData();
}

async function loadData(){
  document.getElementById('main-content').innerHTML='<div style="text-align:center;padding:2rem;color:#888">Loading…</div>';
  try{
    var{data:vd,error:ve}=await sb.from('vendors').select('*').order('created_at',{ascending:false});
    if(ve)throw ve;
    vendors=(vd||[]).map(dbToV);

    var{data:td,error:te}=await sb.from('tents').select('*').order('num');
    if(te)throw te;
    tents=td||[];
    if(!tents.length)await initTentsDB();

    var{data:cd,error:ce}=await sb.from('calendar').select('*');
    if(ce)throw ce;
    calRows={};
    (cd||[]).forEach(function(r){
      calRows[r.date]={
        approved:r.approved_vendors||[],
        waitlist:r.waitlist_vendors||[],
        tent_assignments:r.tent_assignments||{}
      };
    });
  }catch(e){console.error('loadData error',e);}
  render();
}

function dbToV(r){
  return{
    id:r.id,vendorStatus:r.vendor_status||'active',status:r.status||'pending',
    businessName:r.business_name||'',contactName:r.contact_name||'',
    email:r.email||'',phone:r.phone||'',website:r.website||'',social:r.social||'',
    category:r.category||'',categoryComment:r.category_comment||'',
    products:r.products||'',productDesc:r.product_desc||'',
    local:r.local_produced||'',localComment:r.local_comment||'',
    priceRange:r.price_range||[],licenses:r.licenses||'',licensesComment:r.licenses_comment||'',
    foodDocs:r.food_docs||[],liability:r.liability||'',boothSize:r.booth_size||'',
    ownSetup:r.own_setup||'',ownSetupComment:r.setup_comment||'',electricity:r.electricity||'',
    attendance:r.attendance||'',months:r.months||'',whyJoin:r.why_join||'',
    values:r.values||'',additionalInfo:r.additional_info||'',photos:r.photos||[],
    selectedDates:r.selected_dates||[],
    contractReceived:!!r.contract_received,paymentReceived:!!r.payment_received,

  };
}

async function saveVendorDB(data,id){
  var isNew=!id;
  var row={
    id:id||uid(),vendor_status:data.vendorStatus||'active',status:data.status||'pending',
    business_name:data.businessName||'',contact_name:data.contactName||'',
    email:data.email||'',phone:data.phone||'',website:data.website||'',social:data.social||'',
    category:data.category||'',category_comment:data.categoryComment||'',
    products:data.products||'',product_desc:data.productDesc||'',
    local_produced:data.local||'',local_comment:data.localComment||'',
    price_range:data.priceRange||[],licenses:data.licenses||'',licenses_comment:data.licensesComment||'',
    food_docs:data.foodDocs||[],liability:data.liability||'',booth_size:data.boothSize||'',
    own_setup:data.ownSetup||'',setup_comment:data.ownSetupComment||'',electricity:data.electricity||'',
    attendance:data.attendance||'',months:data.months||'',why_join:data.whyJoin||'',
    values:data.values||'',additional_info:data.additionalInfo||'',photos:[],
    selected_dates:data.selectedDates||[],
    contract_received:!!data.contractReceived,payment_received:!!data.paymentReceived,
    modified_at:nowISO()
  };
  if(isNew)row.created_at=nowISO();
  var{error}=await sb.from('vendors').upsert(row);
  if(error){alert('Error saving vendor: '+error.message);return null;}
  return row.id;
}

async function saveCalRow(ds){
  var row=calRows[ds];
  if(!row||(!row.approved.length&&!row.waitlist.length&&!Object.keys(row.tent_assignments||{}).length)){
    await sb.from('calendar').delete().eq('date',ds);
    delete calRows[ds];
  } else {
    await sb.from('calendar').upsert({
      date:ds,
      approved_vendors:row.approved||[],
      waitlist_vendors:row.waitlist||[],
      tent_assignments:row.tent_assignments||{}
    });
  }
}

async function initTentsDB(){
  var rows=[];
  for(var i=1;i<=6;i++)rows.push({id:'t'+i,num:i,size:"10'x10'"});
  rows.push({id:'t7',num:7,size:"20'x20'"},{id:'t8',num:8,size:"20'x20'"},{id:'t9',num:9,size:'Food truck'});
  await sb.from('tents').upsert(rows);
  tents=rows;
}

async function doDeleteTent(id){
  if(!confirm('Delete this spot? It will be removed from all dates.'))return;
  await sb.from('tents').delete().eq('id',id);
  tents=tents.filter(function(t){return t.id!==id;});
  // Remove from all tent assignments
  var dirty=[];
  Object.keys(calRows).forEach(function(ds){
    if(calRows[ds].tent_assignments&&calRows[ds].tent_assignments[id]){
      delete calRows[ds].tent_assignments[id];dirty.push(ds);
    }
  });
  await Promise.all(dirty.map(function(ds){return saveCalRow(ds);}));
  renderTents();
}

async function autoAssign(){
  if(!tentViewDate){alert('Select a market date first.');return;}
  var v4d=getApproved(tentViewDate).map(function(id){return vendors.find(function(x){return x.id===id;});}).filter(Boolean);
  if(!v4d.length){alert('No approved vendors for '+tentViewDate+'.\nGo to Calendar → click this date → Manage vendors to add some first.');return;}
  if(!tents.length){alert('No tent spots defined. Click "+ Add spot" to add some first.');return;}
  var spots=tents.slice(),assignment={},lastSpot={};
  // Find where each vendor was last time
  var allDates=getMarketDates().filter(function(d){return d!==tentViewDate;}).sort();
  v4d.forEach(function(v){
    for(var i=allDates.length-1;i>=0;i--){
      var ta=getTentAssignments(allDates[i]);
      var f=Object.keys(ta).find(function(tid){return ta[tid]===v.id;});
      if(f){lastSpot[v.id]=f;break;}
    }
  });
  // First pass: assign to preferred spots
  var assigned=[];
  v4d.forEach(function(v){
    var p=lastSpot[v.id];
    if(p&&spots.find(function(s){return s.id===p;})&&!assignment[p]){
      assignment[p]=v.id;assigned.push(v.id);
    }
  });
  var unasgn=v4d.filter(function(v){return assigned.indexOf(v.id)===-1;});
  var nums=spots.map(function(t){return t.num;}).sort(function(a,b){return a-b;});
  // Second pass: no same-category adjacent
  unasgn.forEach(function(v){
    var placed=false;
    for(var i=0;i<spots.length;i++){
      var s=spots[i];if(assignment[s.id])continue;
      var idx=nums.indexOf(s.num),conflict=false;
      [nums[idx-1],nums[idx+1]].forEach(function(nn){
        if(!nn)return;
        var ns=spots.find(function(x){return x.num===nn;});
        if(ns&&assignment[ns.id]){var nv=vendors.find(function(x){return x.id===assignment[ns.id];});if(nv&&nv.category&&nv.category===v.category)conflict=true;}
      });
      if(!conflict){assignment[s.id]=v.id;placed=true;break;}
    }
    if(!placed){for(var i=0;i<spots.length;i++){if(!assignment[spots[i].id]){assignment[spots[i].id]=v.id;break;}}}
  });
  if(!calRows[tentViewDate])calRows[tentViewDate]={approved:getApproved(tentViewDate),waitlist:[],tent_assignments:{}};
  calRows[tentViewDate].tent_assignments=assignment;
  await saveCalRow(tentViewDate);
  renderTents();
  var count=Object.values(assignment).filter(Boolean).length;
  alert('✅ Auto-assigned '+count+' vendor'+(count!==1?'s':'')+' for '+tentViewDate+'.\nVendors returned to their previous spot where possible.');
}

  if(!wl.length){el.innerHTML='<div class="empty">No vendors on waitlist.</div>';return;}
  el.innerHTML='<div style="font-size:12px;font-weight:600;margin-bottom:.6rem">Waitlist ('+wl.length+')</div>'+
    wl.map(function(v){return'<div class="vrow vstatus-'+(v.vendorStatus||'active')+'">'+
      '<div style="display:flex;align-items:flex-start;justify-content:space-between">'+
        '<div><div class="vname">'+esc(v.businessName)+'</div><div class="vmeta">'+esc(v.contactName||'')+' · '+esc(v.category||'')+'</div></div>'+
        vsTag(v.vendorStatus||'active')+
      '</div>'+
      '<div style="display:flex;gap:6px;margin-top:7px">'+
        '<button class="btn-p" style="font-size:11px;padding:5px 10px" data-approve="'+v.id+'">Approve</button>'+
        '<button class="btn-s" style="font-size:11px;padding:5px 10px" data-edit="'+v.id+'">Edit</button>'+
      '</div></div>';}).join('');
  el.querySelectorAll('[data-approve]').forEach(function(b){b.addEventListener('click',function(){setSt(b.dataset.approve,'approved');});});
  el.querySelectorAll('[data-edit]').forEach(function(b){b.addEventListener('click',function(){openForm(b.dataset.edit);});});

    mkExportRow('exportWaitlistBtn','⏳','Waitlist only','Contact details and vendor status')+
    mkExportRow('exportTentsBtn','⛺','Tent allocations (all dates)','Spot, vendor, type, size')+
    mkExportRow('exportCalBtn','📅','Market dates schedule','Dates with vendor names')+

function mkExportRow(id,icon,title,sub){
  return'<div style="display:flex;align-items:center;gap:10px;padding:.75rem;border:0.5px solid #e5e3de;border-radius:10px;cursor:pointer" id="'+id+'">'+
    '<div style="font-size:22px;flex-shrink:0">'+icon+'</div>'+
    '<div><div style="font-size:12px;font-weight:600">'+title+'</div>'+
    (sub?'<div style="font-size:10px;color:#888">'+sub+'</div>':'')+
    '</div></div>';
}
function downloadCSV(fn,rows){
  var csv=rows.map(function(r){return r.map(csvCell).join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv'});var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=fn;a.style.display='none';
  document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},500);
}
function exportVendorsCSV(filter){
  var list=filter==='all'?vendors:vendors.filter(function(v){return v.status===filter;});
  if(!list.length){alert('No vendors to export.');return;}
  var rows=[['Vendor Status','Contract','Payment','App. Status','Business Name','Contact','Email','Phone','Website','Social','Category','Products','Locally Produced','Price Range','Licenses','Food Docs','Liability','Booth Size','Electricity','Attendance','Why Join','Values','Additional Info','Selected Dates','Created','Modified']];
  list.forEach(function(v){rows.push([v.vendorStatus||'active',v.contractReceived?'Yes':'No',v.paymentReceived?'Yes':'No',v.status||'pending',v.businessName||'',v.contactName||'',v.email||'',v.phone||'',v.website||'',v.social||'',v.category||'',v.products||'',v.local||'',(v.priceRange||[]).join('; '),v.licenses||'',(v.foodDocs||[]).join('; '),v.liability||'',v.boothSize||'',v.electricity||'',v.attendance||'',v.whyJoin||'',v.values||'',v.additionalInfo||'',(v.selectedDates||[]).join('; '),fmtDT(v.createdAt),fmtDT(v.modifiedAt)]);});
  downloadCSV('eb-vendors-'+filter+'-'+today()+'.csv',rows);closeMod();
}
function exportTentsCSV(){
  var rows=[['Date','Spot','Size','Vendor Name','Category','Vendor Status']];
  getMarketDates().forEach(function(ds){
    var ta=getTentAssignments(ds);
    tents.forEach(function(t){var vid=ta[t.id];var v=vid?vendors.find(function(x){return x.id===vid;}):null;rows.push([ds,t.num,t.size,v?v.businessName:'',v?v.category||'':'',v?v.vendorStatus||'active':'']);});
  });
  downloadCSV('eb-tents-'+today()+'.csv',rows);closeMod();
}
function exportCalCSV(){
  var allDates=getMarketDates();
  if(!allDates.length){alert('No market dates scheduled.');return;}
  var rows=[['Date','Approved Vendors','Waitlisted Vendors']];
  allDates.forEach(function(ds){
    var av=getApproved(ds).map(function(id){var v=vendors.find(function(x){return x.id===id;});return v?v.businessName:'';}).filter(Boolean).join('; ');
    var wv=getWaitlist(ds).map(function(id){var v=vendors.find(function(x){return x.id===id;});return v?v.businessName:'';}).filter(Boolean).join('; ');
    rows.push([ds,av,wv]);
  });
  downloadCSV('eb-calendar-'+today()+'.csv',rows);closeMod();
}

function toggleCard(cid,cbid,cls){var card=document.getElementById(cid),cb=document.getElementById(cbid);cb.checked=!cb.checked;card.classList.toggle(cls,cb.checked);}
function selectVS(k){['active','inwork','inactive'].forEach(function(x){var el=document.getElementById('vsc-'+x);if(!el)return;el.className='vs-card'+(x===k?' sel-'+k:'');el.querySelector('.vs-card-label').style.color=x===k?VSC[x].text:'#aaa';el.querySelector('input').checked=x===k;});}
function pgHtml(){return window._ep.map(function(p,i){return'<div style="position:relative"><img src="'+p+'" class="pthumb" alt="Photo '+(i+1)+'"><button style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);border:none;border-radius:50%;width:16px;height:16px;cursor:pointer;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center" data-rmph="'+i+'">×</button></div>';}).join('');}
function rmPh(i){window._ep.splice(i,1);refreshPG();}
function refreshPG(){var g=document.getElementById('photoGrid');if(!g)return;g.innerHTML=pgHtml();g.querySelectorAll('[data-rmph]').forEach(function(btn){btn.addEventListener('click',function(){rmPh(parseInt(btn.dataset.rmph));});});}
function selR(label,name){var rg=label.closest('.rg');if(!rg)return;rg.querySelectorAll('.ropt').forEach(function(l){l.classList.remove('sel');});label.classList.add('sel');label.querySelector('input').checked=true;var val=label.querySelector('input').value;var sm={category:'Other',local:'Some (describe below)',licenses:'Not Yet (describe below)',ownSetup:'Partial (describe below)'};if(sm[name]){var s=document.getElementById('sub_'+name);if(s)s.style.display=val===sm[name]?'':'none';}}
function getR(name){var el=document.querySelector('input[name="'+name+'"]:checked');return el?el.value:'';}
function getSelectedDates(){return Array.from(document.querySelectorAll('#dateChips .date-chip.selected')).map(function(b){return b.dataset.ds||b.textContent.trim();});}

async function saveV(){
  var biz=document.getElementById('f_biz').value.trim();var contact=document.getElementById('f_contact').value.trim();
  if(!biz||!contact){alert('Business name and contact name are required.');return;}
  var btn=document.getElementById('formSaveBtn');btn.disabled=true;btn.textContent='Saving…';
  var cat=getR('category');
  var existing=eId?vendors.find(function(v){return v.id===eId;}):null;
  var oldDates=existing?existing.selectedDates||[]:[];var newDates=getSelectedDates();
  var data={
    vendorStatus:getR('vendorStatus')||'active',status:existing?existing.status||'pending':'pending',
    contractReceived:!!(document.getElementById('cb-contract')||{}).checked,
    paymentReceived:!!(document.getElementById('cb-payment')||{}).checked,
    selectedDates:newDates,businessName:biz,contactName:contact,
    email:document.getElementById('f_email').value.trim(),phone:document.getElementById('f_phone').value.trim(),
    website:document.getElementById('f_web').value.trim(),social:document.getElementById('f_social').value.trim(),
    category:cat,categoryComment:cat==='Other'?(document.getElementById('cmt_category')||{}).value||'':'',
    products:document.getElementById('f_products').value.trim(),productDesc:document.getElementById('f_prodDesc').value.trim(),
    local:getR('local'),localComment:(document.getElementById('cmt_local')||{}).value||'',
    priceRange:Array.from(document.querySelectorAll('#priceChecks input:checked')).map(function(c){return c.value;}),
    licenses:getR('licenses'),licensesComment:(document.getElementById('cmt_licenses')||{}).value||'',
    foodDocs:Array.from(document.querySelectorAll('#fdChecks input:checked')).map(function(c){return c.value;}),
    liability:getR('liability'),boothSize:getR('boothSize'),ownSetup:getR('ownSetup'),
    ownSetupComment:(document.getElementById('cmt_ownSetup')||{}).value||'',
    electricity:getR('electricity'),attendance:getR('attendance'),
    months:document.getElementById('f_months').value.trim(),
    whyJoin:document.getElementById('f_whyJoin').value.trim(),values:document.getElementById('f_values').value.trim(),
    additionalInfo:document.getElementById('f_addl').value.trim(),photos:[]
  };
  var savedId=await saveVendorDB(data,eId);
  if(savedId){
    // Sync calendar dates
    for(var i=0;i<newDates.length;i++){
      var ds=newDates[i];
      if(oldDates.indexOf(ds)===-1){
        if(!calRows[ds])calRows[ds]={approved:[],waitlist:[],tent_assignments:{}};
        if(calRows[ds].approved.indexOf(savedId)===-1)calRows[ds].approved.push(savedId);
        await saveCalRow(ds);
      }
    }
    for(var i=0;i<oldDates.length;i++){
      var ds=oldDates[i];
      if(newDates.indexOf(ds)===-1&&calRows[ds]){
        calRows[ds].approved=calRows[ds].approved.filter(function(id){return id!==savedId;});
        await saveCalRow(ds);
      }
    }
    await loadData();closeMod();
  } else {btn.disabled=false;btn.textContent='Save';}
}

// ── Boot ──────────────────────────────────────────────────────────────────────
checkSession();
</script>
