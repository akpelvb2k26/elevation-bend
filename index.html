      'background:'+cc.bg+';border:1.5px solid '+cc.border+';border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px;box-sizing:border-box;overflow:hidden">'+
      '<div style="font-size:'+(Math.max(24,28*scale))+'px;font-weight:900;color:'+cc.text+'">'+s.num+'</div>'+
      (v?'<div style="font-size:'+(Math.max(14,16*scale))+'px;color:'+cc.text+';text-align:center;line-height:1.2;overflow:hidden">'+esc(v.businessName)+'</div>':'')+'</div>';
  }).join('');

  win.document.write('<!DOCTYPE html><html><head><title>Market Layout — '+esc(ds)+'</title>'+
    '<style>body{font-family:-apple-system,sans-serif;max-width:1600px;margin:20px auto;padding:0 20px;color:#1a1a1a}'+
    '@media print{.no-print{display:none}}'+
    '.print-btn{background:#27500A;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer;margin-bottom:16px}'+
    'table{width:100%;border-collapse:collapse;margin-top:20px}'+
    'th{background:#27500A;color:#fff;padding:16px 20px;text-align:left;font-size:24px}'+
    'td{padding:14px 20px;border-bottom:1px solid #f0ede6;font-size:24px}'+
    'tr:nth-child(even){background:#f8f7f4}'+
    '</style></head><body>'+
    '<div class="no-print"><button class="print-btn" onclick="window.print()">🖨 Print / Save as PDF</button></div>'+
    '<h2 style="color:#27500A;margin-bottom:4px;font-size:28px">Elevation Bend Farmers Market</h2>'+
    '<div style="font-size:28px;color:#555;margin-bottom:4px">Market Layout — '+esc(ds)+'</div>'+
    '<div style="font-size:24px;color:#888;margin-bottom:16px">Generated '+today2+' · '+spots.length+' spots · '+approvedVendors.length+' vendors</div>'+

    // Visual map
    '<div style="position:relative;width:'+(maxX*scale)+'px;height:'+(maxY*scale)+'px;background:#f8f7f4;border:1px solid #e5e3de;border-radius:8px;margin-bottom:24px;overflow:hidden">'+
      spotDivs+
    '</div>'+

    // Color legend
    '<div style="margin-bottom:24px">'+
      '<div style="font-size:22px;font-weight:700;margin-bottom:10px">Legend</div>'+
      '<div style="display:flex;flex-wrap:wrap;gap:10px">'+
        Object.keys(CAT_COLORS).map(function(cat){
          var c=CAT_COLORS[cat];
          return'<div style="display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:20px;background:'+c.bg+';border:1.5px solid '+c.border+'">'+
            '<div style="width:16px;height:16px;border-radius:50%;background:'+c.dot+';flex-shrink:0"></div>'+
            '<span style="font-size:18px;font-weight:700;color:'+c.text+'">'+esc(cat)+'</span>'+

          '<div style="width:16px;height:16px;border-radius:50%;background:#ccc;flex-shrink:0"></div>'+
          '<span style="font-size:18px;font-weight:700;color:#888">Unassigned</span>'+
        '</div>'+
      '</div>'+
    '</div>'+

    // Assignment table
    '<table><tr><th>Spot #</th><th>Vendor</th><th>Category</th><th>Booth Size</th><th>Phone</th></tr>'+
    spots.slice().sort(function(a,b){return a.num-b.num;}).map(function(s){
      var vid=ta[s.id];var v=vid?vendors.find(function(x){return x.id===vid;}):null;
      return'<tr>'+
        '<td><strong>'+s.num+'</strong></td>'+
        '<td>'+(v?esc(v.businessName):'<span style="color:#aaa">—</span>')+'</td>'+
        '<td>'+(v?esc(v.category||'—'):'—')+'</td>'+
        '<td>'+(v?esc(v.boothSize||'—'):'—')+'</td>'+
        '<td>'+(v?esc(v.phone||'—'):'—')+'</td>'+
      '</tr>';
    }).join('')+
    '</table>'+
    '<p style="font-size:10px;color:#aaa;text-align:center;margin-top:20px">Elevation Bend Farmers Market · Bend, Oregon</p>'+
    '</body></html>');
  win.document.close();

function drawLayoutGrid(){

}
function attachLayoutEvents(){
  // Date dropdown
  var dsel=document.getElementById('layoutDateSel');
  var dinp=document.getElementById('layoutDateInput');
  function switchLayoutDate(newDate){
    if(!newDate||newDate===layoutDate)return;
    if(layoutUnsaved&&layoutSpots.length){if(!confirm('Unsaved changes. Switch date?')){if(dsel)dsel.value=layoutDate;return;}}
    layoutDate=newDate;layoutSelectMode=false;
    loadLayoutForDate(layoutDate);
  }
  if(dsel){
    dsel.addEventListener('change',function(){
      if(this.value==='__custom__'){
        // Show manual date input
        dsel.style.display='none';
        if(dinp){dinp.style.display='';dinp.focus();}
      } else {
        switchLayoutDate(this.value);
      }
    });
  }
  if(dinp){
    dinp.addEventListener('change',function(){
      var v=this.value;
      if(v){switchLayoutDate(v);}
      // Hide manual input, re-render to update dropdown
      renderLayout();
    });
    dinp.addEventListener('keydown',function(e){
      if(e.key==='Escape'){renderLayout();}
    });

  // View toggle — Detail / Summary
  var ldBtn=document.getElementById('lViewDetailBtn');
  var lsBtn=document.getElementById('lViewSummaryBtn');

    if(lsBtn){lsBtn.className=mode==='summary'?'btn-p':'btn-s';lsBtn.style.padding='5px 12px';}

    var pop=document.getElementById('lspot-popup');if(pop)pop.remove();
    layoutSpots.forEach(function(sp){renderLayoutSpot(sp);});

  if(ldBtn)ldBtn.addEventListener('click',function(){setLayoutView('detail');});

  var agBtn=document.getElementById('autoGenSpotsBtn');

    if(!layoutDate){alert('Select a market date first.');return;}

          '<div style="font-size:10px;opacity:.7">Spots across then down</div>'+
        '</div>'+
        '<div id="agOptCols" style="border:2px solid #d0cec7;border-radius:10px;padding:12px;text-align:center;cursor:pointer;background:#fff;color:#555">'+
          '<div style="font-size:22px;margin-bottom:4px">⋮⋮⋮</div>'+
          '<div style="font-size:13px;font-weight:700">Columns</div>'+
          '<div style="font-size:10px;opacity:.7">Spots down then across</div>'+

    // Don't close on overlay click — too easy to accidentally dismiss

    document.getElementById('agOptCols').addEventListener('click',function(){

      document.getElementById('agOptCols').style.cssText='border:2px solid #1a1a1a;border-radius:10px;padding:12px;text-align:center;cursor:pointer;background:#1a1a1a;color:#fff';
      document.getElementById('agOptRows').style.cssText='border:2px solid #d0cec7;border-radius:10px;padding:12px;text-align:center;cursor:pointer;background:#fff;color:#555';

    genBtn.addEventListener('click',function(){

      },0);
      var startY=layoutSpots.length?maxY+gapY:START_Y;

  var lp=document.getElementById('loadPrevLayoutBtn');if(lp)lp.addEventListener('click',openLoadLayoutModal);

  var ls=document.getElementById('lSnapBtn');if(ls)ls.addEventListener('click',function(){layoutSnapOn=!layoutSnapOn;document.getElementById('lSnapLabel').textContent=layoutSnapOn?'on':'off';});
  // Select mode toggle — lets users tap/click spots to add to selection without opening panel

      layoutSelectedIds.clear();

    }

  });

  // Select All button
  var lsa=document.getElementById('lSelectAllBtn');
  if(lsa)lsa.addEventListener('click',function(){
    layoutSelectedIds.clear();
    layoutSpots.forEach(function(s){layoutSelectedIds.add(s.id);var se=document.getElementById('ls-'+s.id);if(se)se.classList.add('lsel');});
    updateLayoutToolbar();
  });

  // ── Rubber band selection on canvas background ──────────────────────────
  var canvasOuter=document.querySelector('.canvas-outer');
  var rubberBand=null;
  var rbStart={x:0,y:0};
  if(canvasOuter){
    canvasOuter.addEventListener('mousedown',function(e){
      if(!layoutSelectMode)return;
      // Only start rubber band on background (not on a spot)
      if(e.target.closest('.lspot'))return;
      var rect=canvasOuter.getBoundingClientRect();
      rbStart={x:e.clientX-rect.left+canvasOuter.scrollLeft,y:e.clientY-rect.top+canvasOuter.scrollTop};
      // Create rubber band div
      rubberBand=document.createElement('div');
      rubberBand.style.cssText='position:absolute;border:2px dashed #378ADD;background:rgba(55,138,221,.08);pointer-events:none;z-index:1000;left:'+rbStart.x+'px;top:'+rbStart.y+'px;width:0;height:0';
      document.getElementById('layoutCanvas').appendChild(rubberBand);

      function onMove(e2){
        if(!rubberBand)return;
        var rect2=canvasOuter.getBoundingClientRect();
        var cx=e2.clientX-rect2.left+canvasOuter.scrollLeft;
        var cy=e2.clientY-rect2.top+canvasOuter.scrollTop;
        var x=Math.min(rbStart.x,cx),y=Math.min(rbStart.y,cy);
        var w=Math.abs(cx-rbStart.x),h=Math.abs(cy-rbStart.y);
        rubberBand.style.left=x+'px';rubberBand.style.top=y+'px';
        rubberBand.style.width=w+'px';rubberBand.style.height=h+'px';
      }
      function onUp(e2){
        document.removeEventListener('mousemove',onMove);
        document.removeEventListener('mouseup',onUp);
        if(!rubberBand)return;
        var rbRect=rubberBand.getBoundingClientRect();
        rubberBand.remove();rubberBand=null;
        // Select all spots whose center is within the rubber band
        var rect3=canvasOuter.getBoundingClientRect();
        var rx1=rbRect.left-rect3.left+canvasOuter.scrollLeft;
        var ry1=rbRect.top-rect3.top+canvasOuter.scrollTop;
        var rx2=rbRect.right-rect3.left+canvasOuter.scrollLeft;
        var ry2=rbRect.bottom-rect3.top+canvasOuter.scrollTop;
        if(rx2-rx1<5&&ry2-ry1<5)return; // too small — ignore
        // If not holding shift, clear current selection
        if(!e2.shiftKey){layoutSelectedIds.clear();layoutSpots.forEach(function(s){var se=document.getElementById('ls-'+s.id);if(se)se.classList.remove('lsel');});}
        layoutSpots.forEach(function(s){
          var cx=s.x+s.w/2,cy=s.y+s.h/2;
          if(cx>=rx1&&cx<=rx2&&cy>=ry1&&cy<=ry2){
            layoutSelectedIds.add(s.id);
            var se=document.getElementById('ls-'+s.id);if(se)se.classList.add('lsel');
          }
        });
        updateLayoutToolbar();
      }
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
    });
  }

  var lcs=document.getElementById('lClearSelBtn');if(lcs)lcs.addEventListener('click',function(){layoutSelectedIds.clear();layoutSpots.forEach(function(s){var se=document.getElementById('ls-'+s.id);if(se)se.classList.remove('lsel');});updateLayoutToolbar();});
  var lds=document.getElementById('lDelSelBtn');if(lds)lds.addEventListener('click',function(){
    if(!layoutSelectedIds.size)return;
    if(!confirm('Remove '+layoutSelectedIds.size+' spot'+(layoutSelectedIds.size!==1?'s':'')+' from '+layoutDate+' layout only?'))return;
    Array.from(layoutSelectedIds).forEach(function(id){removeLayoutSpotLocal(id);});
    markLayoutUnsaved();updateLayoutStats();updateLayoutToolbar();
  });
  var lsv=document.getElementById('saveLayoutBtn');if(lsv)lsv.addEventListener('click',saveLayoutForDate);
  var lepdf=document.getElementById('exportLayoutPdfBtn');if(lepdf)lepdf.addEventListener('click',function(){generateLayoutPDF(layoutDate,null);});
  var la=document.getElementById('addLSpotBtn');if(la)la.addEventListener('click',function(){openAddLayoutModal(false);});
  var lr=document.getElementById('addLRowBtn');if(lr)lr.addEventListener('click',function(){openAddLayoutModal(true);});
  var canvas=document.getElementById('layoutCanvas');
  if(canvas)canvas.addEventListener('click',function(e){
    if(e.target!==this)return; // only fires on canvas background itself
    layoutSelectedIds.clear();
    layoutSpots.forEach(function(s){var se=document.getElementById('ls-'+s.id);if(se)se.classList.remove('lsel');});
    updateLayoutToolbar();
  });
}
function clearLayoutCanvas(){
  layoutSpots.forEach(function(s){var el=document.getElementById('ls-'+s.id);if(el)el.remove();});
  layoutSpots=[];layoutSelectedIds.clear();
}
function updateLayoutBadge(state){
  var el=document.getElementById('layoutBadge');if(!el)return;
  el.className='layout-badge';
  if(state==='saved'){el.classList.add('badge-saved');el.textContent='Layout saved';}
  else if(state==='unsaved'){el.classList.add('badge-unsaved');el.textContent='Unsaved changes';}
  else{el.classList.add('badge-empty');el.textContent='No layout for this date';}
}
function markLayoutUnsaved(){layoutUnsaved=true;updateLayoutBadge('unsaved');}
async function deleteCurrentLayout(){
  if(!layoutDate){alert('No date selected.');return;}
  if(!confirm('Delete the layout for '+layoutDate+'?\nThis will remove all spots and assignments for this date.'))return;
  var btn=document.getElementById('deleteLayoutBtn');
  if(btn){btn.disabled=true;btn.textContent='Deleting…';}
  await sb.from('layouts').delete().eq('date',layoutDate);
  try{localStorage.removeItem('eb_layout_'+layoutDate);}catch(e){}
  if(window._layoutCache)delete window._layoutCache[layoutDate];
  if(calRows[layoutDate]){calRows[layoutDate].tent_assignments={};await saveCalRow(layoutDate);}
  clearLayoutCanvas();layoutSpots=[];
  updateLayoutStats();updateLayoutToolbar();
  if(btn){btn.disabled=false;btn.textContent='🗑 Delete layout';}
  alert('Layout for '+layoutDate+' deleted.');
}

function updateLayoutToolbar(){

  var ds=document.getElementById('lDelSelBtn');if(ds)ds.style.display=has?'':'none';

    } else {

      sm.style.background='';sm.style.color='';sm.style.borderColor='';

function updateLayoutStats(){
  var el=document.getElementById('layoutStats');if(!el)return;
  var occ=layoutSpots.filter(function(s){return s.vendorName;}).length;
  var vendorCount=layoutDate?getApproved(layoutDate).length:0;
  var spotDiff=layoutSpots.length-vendorCount;
  el.innerHTML=
    '<div class="stat"><div class="sl">Spots</div><div class="sv">'+layoutSpots.length+'</div></div>'+
    '<div class="stat"><div class="sl">Vendors scheduled</div><div class="sv" style="color:'+(vendorCount?'#0C447C':'#aaa')+'">'+vendorCount+'</div></div>'+

      '<div class="stat"><div class="sl">Match</div><div class="sv" style="color:#27500A">✓</div></div>')+
    '<div class="stat"><div class="sl">Assigned</div><div class="sv" style="color:#27500A">'+occ+'</div></div>'+
    '<div class="stat"><div class="sl">Available</div><div class="sv">'+(layoutSpots.length-occ)+'</div></div>'+
    '<div class="stat"><div class="sl">10×10</div><div class="sv">'+layoutSpots.filter(function(s){return s.size==='10x10';}).length+'</div></div>'+
    '<div class="stat"><div class="sl">Trucks</div><div class="sv">'+layoutSpots.filter(function(s){return s.size==='truck';}).length+'</div></div>';

// Sync layout canvas spot colors + vendor labels with current tent assignments.
// Call this whenever an assignment changes (from Assignments tab or auto-assign)
// so the canvas always reflects the latest state without a full reload.
function refreshLayoutColors(ds){
  // Only update if the layout canvas is currently showing this date
  if(!layoutSpots.length||layoutDate!==ds)return;
  var ta=getTentAssignments(ds);
  layoutSpots.forEach(function(sp){
    // Match spot to assignment by spot id
    var vid=ta[sp.id]||null;
    var v=vid?vendors.find(function(x){return x.id===vid;}):null;
    // Update in-memory spot data
    sp.vendorId=vid||'';
    sp.vendorName=v?v.businessName:'';
    sp.vendorCat=v?v.category:'';
    sp.vendorInactive=v&&v.vendorStatus==='inactive';
    // Update the DOM element directly — no full re-render needed
    var el=document.getElementById('ls-'+sp.id);
    if(!el)return;
    var dims=LSIZES[sp.size]||LSIZES['10x10'];
    if(v){
      var cc=catColor(v.category);
      el.style.background=cc.bg;
      el.style.borderColor=cc.border;
      el.style.borderWidth='1.5px';
    } else {
      el.style.background='';
      el.style.borderColor='';
      el.style.borderWidth='';
    }
    // Re-render inner content (vendor name, category, hint text)
    el.innerHTML=
      '<button class="lspot-del" title="Remove from this date only">×</button>'+
      '<div class="lspot-num">Spot '+sp.num+'</div>'+
      '<div class="lspot-size">'+dims.label+'</div>'+
      (sp.vendorName
        ?'<div class="lspot-vendor" style="color:'+(sp.vendorCat?catColor(sp.vendorCat).text:'#27500A')+'">'+esc(sp.vendorName)+'</div>'+
          (sp.vendorInactive
            ?'<div style="font-size:8px;color:#791F1F;font-weight:600">⚠️ Inactive</div>'
            :'<div class="lspot-cat">'+esc(sp.vendorCat)+'</div>')+
          ''
        :'<div style="font-size:9px;color:#aaa;margin-top:6px;text-align:center">click to assign</div>');
    // Re-attach delete button handler
    var delBtn=el.querySelector('.lspot-del');
    if(delBtn)delBtn.addEventListener('click',function(e){
      e.stopPropagation();
      removeLayoutSpotLocal(sp.id);markLayoutUnsaved();updateLayoutStats();updateLayoutToolbar();
    });
  });
  updateLayoutStats();
}
async function loadLayoutForDate(ds){
  clearLayoutCanvas();
  if(!ds){updateLayoutBadge('empty');updateLayoutStats();return;}

  var loaded=false;
  // Load from Supabase first, localStorage fallback
  var savedSpots=null;
  try{
    var{data,error}=await sb.from('layouts').select('spots').eq('date',ds).single();
    if(!error&&data&&data.spots&&data.spots.length)savedSpots=data.spots;
  }catch(e){}
  if(!savedSpots){
    try{var ls=localStorage.getItem('eb_layout_'+ds);if(ls)savedSpots=JSON.parse(ls);}catch(e){}
  }
  if(savedSpots&&savedSpots.length){
    var ta=getTentAssignments(ds);
    savedSpots.forEach(function(sp){
      var vid=ta[sp.id]||sp.vendorId||null;
      var v=vid?vendors.find(function(x){return x.id===vid;}):null;
      addLayoutSpot({
        id:sp.id,num:sp.num,size:sp.size,x:sp.x,y:sp.y,w:sp.w,h:sp.h,
        vendorId:vid||'',
        vendorName:v?v.businessName:'',
        vendorCat:v?v.category:'',
        vendorInactive:v&&v.vendorStatus==='inactive'
      });
    });
    // Update cache
    window._layoutCache=window._layoutCache||{};
    window._layoutCache[ds]=savedSpots;
    updateLayoutBadge('saved');
    loaded=true;
  }

  if(!loaded||!layoutSpots.length){
    // No saved layout or empty layout — create one spot per vendor scheduled for this date.
    var approvedIds=getApproved(ds);
    // Also include any vendors who have this date in selectedDates
    vendors.forEach(function(v){
      if((v.selectedDates||[]).indexOf(ds)>-1&&approvedIds.indexOf(v.id)===-1){
        approvedIds=approvedIds.concat([v.id]);
        if(!calRows[ds])calRows[ds]={approved:[],waitlist:[],tent_assignments:{}};
        if(calRows[ds].approved.indexOf(v.id)===-1)calRows[ds].approved.push(v.id);
      }
    });
    var count=approvedIds.length;
    if(count>0){
      var COLS=5,GAP=10,START_X=60,START_Y=60;
      var dims=LSIZES['10x10'];
      for(var i=0;i<count;i++){
        var col=i%COLS,row=Math.floor(i/COLS);
        addLayoutSpot({
          num:i+1,size:'10x10',
          x:START_X+col*(dims.w+GAP),
          y:START_Y+row*(dims.h+GAP+16),
          w:dims.w,h:dims.h,
          vendorId:'',vendorName:'',vendorCat:'',vendorInactive:false
        });
      }
      updateLayoutBadge('unsaved');
      layoutUnsaved=true;
      var canvas=document.getElementById('layoutCanvas');
      if(canvas){
        var hint=document.createElement('div');
        hint.style.cssText='position:absolute;top:10px;left:50%;transform:translateX(-50%);background:#fef9c3;border:.5px solid #eab308;border-radius:8px;padding:6px 14px;font-size:11px;color:#a16207;white-space:nowrap;z-index:50;pointer-events:none;font-family:inherit';
        hint.textContent='✓ '+count+' spot'+(count!==1?'s':'')+' auto-created — one per vendor scheduled for this date. Drag to arrange, then Save layout.';
        canvas.appendChild(hint);
        setTimeout(function(){if(hint.parentNode)hint.parentNode.removeChild(hint);},5000);
      }
    } else {
      updateLayoutBadge('empty');
    }
  }
  if(loaded)layoutUnsaved=false;
  updateLayoutStats();updateLayoutToolbar();
  // Render vendor assignment panel below canvas
  renderLayoutAssignPanel(ds);
}

function addLayoutSpot(data){
  var dims=LSIZES[data.size]||LSIZES['10x10'];
  var sp={
    id:data.id||uid(),num:data.num||getNextLayoutNum(),
    size:data.size||'10x10',x:data.x||60,y:data.y||60,
    w:dims.w,h:dims.h,  // always use current LSIZES so all spots are same size
    vendorId:data.vendorId||'',
    vendorName:data.vendorName||'',
    vendorCat:data.vendorCat||'',
    vendorInactive:data.vendorInactive||false
  };
  layoutSpots.push(sp);renderLayoutSpot(sp);return sp;
}
function getNextLayoutNum(){var used=new Set(layoutSpots.map(function(s){return s.num;}));var n=1;while(used.has(n))n++;return n;}

        '<button id="lspot-close-btn" style="font-size:12px;padding:4px 10px;border:.5px solid #d0cec7;border-radius:6px;background:#f8f7f4;cursor:pointer;font-family:inherit;margin-left:6px">✕ Close</button>';
      document._currentSp=sp;

      var cb=document.getElementById('lspot-close-btn');if(cb)cb.addEventListener('click',function(){var p=document.getElementById('lspot-popup');if(p)p.remove();});

  } else {

      (sp.vendorName

          (sp.vendorInactive
            ?'<div style="font-size:8px;color:#791F1F;font-weight:600">⚠️ Inactive</div>'
            :'<div class="lspot-cat">'+esc(sp.vendorCat)+'</div>')
        :'<div style="font-size:9px;color:#aaa;margin-top:6px;text-align:center">click to assign</div>')+
      '<div class="lspot-size">'+dims.label+'</div>'+
      '<div style="font-size:13px;font-weight:900;color:'+lcc.text+';text-align:center;margin-top:2px">'+sp.num+'</div>';
  }

  document.getElementById('layoutCanvas').appendChild(el);

  // Delete removes from THIS layout only
  el.querySelector('.lspot-del').addEventListener('click',function(e){
    e.stopPropagation();
    var pop=document.getElementById('lspot-popup');if(pop)pop.remove();
    removeLayoutSpotLocal(sp.id);markLayoutUnsaved();updateLayoutStats();updateLayoutToolbar();
  });

  // ── Unified pointer handler — works on mouse (desktop) and touch (iOS/iPad) ──
  // Measures movement distance: < 8px = tap/click, >= 8px = drag.
  // Touch events use changedTouches[0] for coordinates.
  function startInteraction(startX, startY, isCtrl){
    var totalDist=0, isDrag=false;
    if(!isCtrl){
      if(!layoutSelectedIds.has(sp.id)){
        layoutSelectedIds.clear();
        layoutSpots.forEach(function(s){var se=document.getElementById('ls-'+s.id);if(se)se.classList.remove('lsel');});
        layoutSelectedIds.add(sp.id);el.classList.add('lsel');updateLayoutToolbar();
      }
    }
    var orig={};
    layoutSelectedIds.forEach(function(sid){
      var s=layoutSpots.find(function(x){return x.id===sid;});
      if(s)orig[sid]={x:s.x,y:s.y};
    });
    orig[sp.id]=orig[sp.id]||{x:sp.x,y:sp.y};

    function doMove(cx,cy){
      var dx=cx-startX,dy=cy-startY;
      totalDist=Math.sqrt(dx*dx+dy*dy);
      if(totalDist>8){
        isDrag=true;
        el.classList.add('dragging');
        layoutSelectedIds.forEach(function(sid){
          var s=layoutSpots.find(function(x){return x.id===sid;});if(!s)return;
          var o=orig[sid];if(!o)return;
          s.x=Math.max(0,snapV(o.x+dx));
          s.y=Math.max(0,snapV(o.y+dy));
          var se=document.getElementById('ls-'+sid);
          if(se){se.style.left=s.x+'px';se.style.top=s.y+'px';}
        });
      }
    }

    function doEnd(){
      el.classList.remove('dragging');
      if(isDrag){
        markLayoutUnsaved();
      } else {
        if(isCtrl){
          if(layoutSelectedIds.has(sp.id)){layoutSelectedIds.delete(sp.id);el.classList.remove('lsel');}
          else{layoutSelectedIds.add(sp.id);el.classList.add('lsel');}
          updateLayoutToolbar();
        } else {
          layoutSelectedIds.clear();
          layoutSpots.forEach(function(s){var se=document.getElementById('ls-'+s.id);if(se)se.classList.remove('lsel');});
          updateLayoutToolbar();
          openLayoutSpotPanel(sp);
        }
      }
    }

    // Mouse events
    function onMouseMove(ev){doMove(ev.clientX,ev.clientY);}
    function onMouseUp(){
      document.removeEventListener('mousemove',onMouseMove);
      document.removeEventListener('mouseup',onMouseUp);
      doEnd();
    }

    // Touch events
    function onTouchMove(ev){
      ev.preventDefault(); // prevent page scroll while dragging spot
      var t=ev.changedTouches[0];
      doMove(t.clientX,t.clientY);
    }
    function onTouchEnd(ev){
      el.removeEventListener('touchmove',onTouchMove);
      el.removeEventListener('touchend',onTouchEnd);
      doEnd();
    }

    return {
      attachMouse: function(){
        document.addEventListener('mousemove',onMouseMove);
        document.addEventListener('mouseup',onMouseUp);
      },
      attachTouch: function(){
        el.addEventListener('touchmove',onTouchMove,{passive:false});
        el.addEventListener('touchend',onTouchEnd);
      }
    };
  }

  // Mouse start
  el.addEventListener('mousedown',function(e){
    if(e.target.classList.contains('lspot-del'))return;
    e.preventDefault();e.stopPropagation();
    var h=startInteraction(e.clientX,e.clientY,e.ctrlKey||e.metaKey||layoutSelectMode);
    h.attachMouse();
  });

  // Touch start (iOS / iPad)
  el.addEventListener('touchstart',function(e){
    if(e.target.classList.contains('lspot-del'))return;
    e.stopPropagation();
    var t=e.changedTouches[0];
    var h=startInteraction(t.clientX,t.clientY,layoutSelectMode);
    h.attachTouch();
  },{passive:true});
}

async function saveLayoutForDate(){
  if(!layoutDate){alert('Select a market date first.');return;}
  var btn=document.getElementById('saveLayoutBtn');if(btn){btn.disabled=true;btn.textContent='Saving…';}
  try{
    var spots=layoutSpots.map(function(s){return{id:s.id,num:s.num,size:s.size,x:s.x,y:s.y,w:s.w,h:s.h,vendorId:s.vendorId||'',vendorName:s.vendorName||'',vendorCat:s.vendorCat||'',vendorInactive:s.vendorInactive||false};});
    // Save to Supabase layouts table (primary)
    var{error}=await sb.from('layouts').upsert({date:layoutDate,spots:spots,modified_at:nowISO()});
    if(error)throw new Error(error.message);
    // Also save to localStorage as offline fallback
    try{localStorage.setItem('eb_layout_'+layoutDate,JSON.stringify(spots));}catch(e){}
    // Update cache
    window._layoutCache=window._layoutCache||{};
    window._layoutCache[layoutDate]=spots;
    layoutUnsaved=false;updateLayoutBadge('saved');
    if(btn){btn.textContent='✅ Saved!';setTimeout(function(){btn.textContent='💾 Save layout for date';btn.disabled=false;},1500);}
  }catch(e){alert('Save failed: '+e.message);if(btn){btn.disabled=false;btn.textContent='💾 Save layout for date';}}
}
async function openLoadLayoutModal(){
  if(layoutUnsaved&&layoutSpots.length){if(!confirm('Unsaved changes. Load anyway?'))return;}
  // Load all saved layouts from Supabase
  var items=[];
  try{
    var{data,error}=await sb.from('layouts').select('date,spots,modified_at').order('date',{ascending:false});
    if(!error&&data)items=data.filter(function(r){return r.date!==layoutDate&&r.spots&&r.spots.length;});
  }catch(e){}
  // Fallback: localStorage
  if(!items.length){
    try{
      var ls=localStorage.getItem('eb_layout_dates');
      var dl=ls?JSON.parse(ls):[];
      for(var i=0;i<dl.length;i++){
        if(dl[i]===layoutDate)continue;
        var s=localStorage.getItem('eb_layout_'+dl[i]);
        if(s)items.push({date:dl[i],spots:JSON.parse(s)});
      }
    }catch(e){}
  }
  if(!items.length){alert('No saved layouts from other dates yet. Save a layout first.');return;}
  document.getElementById('modal-area').innerHTML='<div class="overlay" id="loadLayoutOverlay"><div class="modal md"><div class="mtitle">⏪ Load layout from previous date</div><div class="notice">Spot positions will be copied to <strong>'+layoutDate+'</strong>. Vendor assignments are cleared — spots start blank.</div>'+
    (items.length?items.map(function(item){var n10=item.spots.filter(function(s){return s.size==='10x10';}).length,n20=item.spots.filter(function(s){return s.size==='20x20';}).length,ntr=item.spots.filter(function(s){return s.size==='truck';}).length;
      return'<div class="hist-item" data-date="'+item.date+'" data-spots=\''+JSON.stringify(item.spots).replace(/'/g,"&#39;")+'\'>'+
        '<div><div style="font-size:12px;font-weight:600">'+item.date+'</div><div style="font-size:10px;color:#888">'+item.spots.length+' spot'+(item.spots.length!==1?'s':'')+(n10?' · '+n10+'×10×10':'')+(n20?' · '+n20+'×20×20':'')+(ntr?' · '+ntr+' truck'+(ntr!==1?'s':''):'')+' </div></div><span style="font-size:18px;color:#888">→</span></div>';
    }).join(''):'<div style="text-align:center;padding:1.5rem;color:#aaa;font-size:12px">No saved layouts found.</div>')+
    '<div class="mfoot"><button class="btn-s" id="loadLayoutCancel">Cancel</button></div></div></div>';
  document.getElementById('loadLayoutOverlay').addEventListener('click',function(e){if(e.target===this)closeMod();});
  document.getElementById('loadLayoutCancel').addEventListener('click',closeMod);
  document.querySelectorAll('.hist-item').forEach(function(item){
    item.addEventListener('click',async function(){
      var srcSpots=JSON.parse(item.dataset.spots);

      // Save to Supabase so auto-assign can find spots

      }
      markLayoutUnsaved();updateLayoutStats();updateLayoutToolbar();closeMod();

    });
  });

}

function sortVendors(list,col){
  if(!col)return list;
  return list.slice().sort(function(a,b){
    var av,bv;
    if(col==='name'){av=a.businessName||'';bv=b.businessName||'';}
    else if(col==='status'){av=a.vendorStatus||'';bv=b.vendorStatus||'';}
    else if(col==='sched'){av=a.status||'';bv=b.status||'';}
    else if(col==='contract'){av=a.contractReceived?1:0;bv=b.contractReceived?1:0;return(bv-av)*reportSortDir;}
    else if(col==='payment'){av=a.paymentReceived?1:0;bv=b.paymentReceived?1:0;return(bv-av)*reportSortDir;}
    else if(col==='category'){av=a.category||'';bv=b.category||'';}
    else if(col==='dates'){av=(a.selectedDates||[]).length;bv=(b.selectedDates||[]).length;return(av-bv)*reportSortDir;}
    else{av='';bv='';}
    return av.localeCompare(bv)*reportSortDir;
  });
}

async function exportCompleteBackup(){
  var btn=document.getElementById('exportBackupBtn');
  if(btn){var d=btn.querySelector('div div');if(d)d.textContent='Loading…';}
  var{data:vData}=await sb.from('vendors').select('*');
  var{data:iData}=await sb.from('invoices').select('*');
  var{data:cData}=await sb.from('calendar').select('*');
  var{data:lData}=await sb.from('layouts').select('*');
  var{data:gData}=await sb.from('vendor_groups').select('*');
  var backup={version:'1.0',created:new Date().toISOString(),environment:IS_LIVE?'live':'dev',vendors:vData||[],invoices:iData||[],calendar:cData||[],layouts:lData||[],vendor_groups:gData||[]};
  var json=JSON.stringify(backup,null,2);
  var blob=new Blob([json],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='eb-backup-'+today()+'.json';
  a.style.display='none';document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},500);
  closeMod();
  alert('✅ Backup saved! '+((vData||[]).length)+' vendors, '+((iData||[]).length)+' invoices.');
}

async function restoreCompleteBackup(file){
  try{
    var text=await file.text();
    var backup=JSON.parse(text);
    if(!backup.version||!backup.vendors){alert('Invalid backup file.');return;}
    if(!confirm('Restore backup from '+new Date(backup.created).toLocaleString()+'?\n\nThis will OVERWRITE all current data. Are you sure?'))return;
    var btn=document.getElementById('restoreBackupBtn');
    if(btn){btn.disabled=true;btn.textContent='Restoring…';}
    if(backup.vendors&&backup.vendors.length){for(var i=0;i<backup.vendors.length;i+=20){await sb.from('vendors').upsert(backup.vendors.slice(i,i+20));}}
    if(backup.invoices&&backup.invoices.length){for(var i=0;i<backup.invoices.length;i+=20){await sb.from('invoices').upsert(backup.invoices.slice(i,i+20));}}
    if(backup.calendar&&backup.calendar.length){for(var i=0;i<backup.calendar.length;i+=20){await sb.from('calendar').upsert(backup.calendar.slice(i,i+20));}}
    if(backup.layouts&&backup.layouts.length){for(var i=0;i<backup.layouts.length;i+=10){await sb.from('layouts').upsert(backup.layouts.slice(i,i+10));}}
    if(backup.vendor_groups&&backup.vendor_groups.length){for(var i=0;i<backup.vendor_groups.length;i+=20){await sb.from('vendor_groups').upsert(backup.vendor_groups.slice(i,i+20));}}
    alert('✅ Restore complete! Reloading data…');
    await loadData();render();
    if(btn){btn.disabled=false;btn.textContent='📂 Restore from backup';}
  }catch(e){alert('Error restoring backup: '+e.message);}
}

var SUPABASE_FN_URL=(IS_LIVE?SUPA_URL_LIVE:SUPA_URL_DEV)+'/functions/v1';
// Supabase anon key (JWT) — needed to call Edge Functions.
var SUPA_ANON_KEY=IS_LIVE?SUPA_KEY_LIVE:SUPA_KEY_DEV;

var stripeLoaded=false;
var stripeInstance=null;

// Load Stripe.js and Connect.js once
function loadStripeScripts(cb){
  if(stripeLoaded){cb();return;}
  var s1=document.createElement('script');
  s1.src='https://js.stripe.com/v3/';
  s1.onload=function(){
    var s2=document.createElement('script');
    s2.src='https://connect-js.stripe.com/v1.0/connect.js';
    s2.onload=function(){stripeLoaded=true;cb();};
    document.head.appendChild(s2);
  };
  document.head.appendChild(s1);
}

// Fetch a session token from our Edge Function
async function fetchStripeSession(){
  var res=await fetch(SUPABASE_FN_URL+'/stripe-session',{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SUPA_ANON_KEY||SUPA_KEY,'Authorization':'Bearer '+(SUPA_ANON_KEY||SUPA_KEY)},
    body:JSON.stringify({action:'dashboard_session'})
  });
  var data=await res.json();
  if(data.error)throw new Error(data.error);
  return data.client_secret;
}

// Generate a Stripe payment link for a vendor via Edge Function
async function generatePaymentLink(v){
  var res=await fetch(SUPABASE_FN_URL+'/stripe-session',{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SUPA_ANON_KEY||SUPA_KEY,'Authorization':'Bearer '+(SUPA_ANON_KEY||SUPA_KEY)},
    body:JSON.stringify({action:'create_payment_link',vendorId:v.id,vendorName:v.businessName,amount:v.boothFee})
  });
  var data=await res.json();
  if(data.error){alert('Error creating payment link: '+data.error);return null;}
  return data.url;
}


function payThSort(col,label){
  var isActive=paySortCol===col;
  var icon=isActive?'<span style="font-size:12px;margin-left:4px;font-weight:800">'+(paySortDir===1?'↑':'↓')+'</span>':'<span style="font-size:12px;margin-left:4px;color:#bbb">⇅</span>';
  return'<th data-pay-sort="'+col+'" style="cursor:pointer;user-select:none;background:'+(isActive?'#e8e8e8':'#f0ede6')+';color:'+(isActive?'#1a1a1a':'#555')+'" title="Sort by '+label+'">'+label+icon+'</th>';
}
function sortPayVendors(list){
  return list.slice().sort(function(a,b){
    var av,bv;
    if(paySortCol==='name'){av=a.businessName||'';bv=b.businessName||'';}
    else if(paySortCol==='category'){av=a.category||'';bv=b.category||'';}
    else if(paySortCol==='booth'){av=a.boothFee||0;bv=b.boothFee||0;return(av-bv)*paySortDir;}
    else if(paySortCol==='status'){av=a.paymentReceived?1:0;bv=b.paymentReceived?1:0;return(bv-av)*paySortDir;}
    else{av='';bv='';}
    return av.toString().localeCompare(bv.toString())*paySortDir;
  });
}

var payPollInterval=null;

function startPaymentsPoll(){
  stopPaymentsPoll();
  payPollInterval=setInterval(async function(){
    if(tab!=='payments')return stopPaymentsPoll();
    await loadInvoices();
    renderPayments();
  },10000);
}

function stopPaymentsPoll(){
  if(payPollInterval){clearInterval(payPollInterval);payPollInterval=null;}
}

      '</tbody>'+
    '</table></div></div>'+

    '<div id="invoiceSection" style="display:none"></div>';

  // Wire up invoice action buttons
  var bulkInvBtn=document.getElementById('invBulkDateBtn');
  if(bulkInvBtn)bulkInvBtn.addEventListener('click',openBulkInvoiceModal);

  // Mount Stripe embedded dashboard if key is set
  // Refresh payment status from Supabase

  if(refreshBtn)refreshBtn.addEventListener('click',async function(){

      var col=th.dataset.paySort;
      if(paySortCol===col)paySortDir*=-1;else{paySortCol=col;paySortDir=1;}
      renderPayments();
    });
  }

  // ── Combined Invoice & Pay button ──────────────────────────────────────

    btn.addEventListener('click',async function(){
      var v=vendors.find(function(x){return x.id===btn.dataset.invoicePay;});
      if(!v)return;
      if(!v.email){alert('No email address on file for this vendor.');return;}

      btn.disabled=true;btn.textContent='Working…';

      // 1. Generate Stripe payment link
      var stripeUrl='';
      if(STRIPE_PK){
        try{
          var res=await fetch(SUPABASE_FN_URL+'/stripe-session',{
            method:'POST',
            headers:{'Content-Type':'application/json','apikey':SUPA_ANON_KEY||SUPA_KEY,'Authorization':'Bearer '+(SUPA_ANON_KEY||SUPA_KEY)},
            body:JSON.stringify({action:'create_payment_link',vendorId:v.id,vendorName:v.businessName,amount:v.boothFee||feeForBoothSize(v.boothSize)||0})
          });
          var rd=await res.json();
          if(rd.url)stripeUrl=rd.url;
        }catch(e){console.warn('Stripe link failed:',e);}
      }

      // 2. Find or create an invoice for this vendor
      await loadInvoices();
      var inv=invoices.find(function(i){return i.vendor_id===v.id&&i.status!=='paid';});
      if(!inv){
        // Create a new invoice
        var dates=(v.selectedDates||[]).sort();
        var fee=v.boothFee||0;
        var lineItems=dates.length

      var sent=await sendEmailResend({

        try{
          var sr=await fetch(SUPABASE_FN_URL+'/stripe-session',{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPA_ANON_KEY||SUPA_KEY,'Authorization':'Bearer '+(SUPA_ANON_KEY||SUPA_KEY)},body:JSON.stringify({action:'create_payment_link',vendorId:v.id,vendorName:v.businessName,amount:parseFloat(inv.total||0),invoiceId:inv.id})});

      var res=await sb.from('invoices').update({status:'paid',paid_at:nowISO(),payment_method:'',modified_at:nowISO()}).eq('id',inv.id);
      console.log('Update result:', res.error, res.status);
      inv.status='paid';inv.paid_at=nowISO();inv.payment_method='';
      var v=vendors.find(function(x){return x.id===inv.vendor_id;});
      if(v){v.paymentReceived=true;await sb.from('vendors').update({payment_received:true,modified_at:nowISO()}).eq('id',v.id);}
      await loadInvoices();

  el.querySelectorAll('[data-inv-venmo]').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var inv=invoices.find(function(x){return x.id===btn.dataset.invVenmo;});

      btn.disabled=true;btn.textContent='Saving…';
      var res=await sb.from('invoices').update({status:'paid',paid_at:nowISO(),payment_method:'Venmo',modified_at:nowISO()}).eq('id',inv.id);
      if(res.error){

  el.querySelectorAll('[data-inv-unpaid]').forEach(function(btn){

      await sb.from('invoices').update({status:'sent',paid_at:null,modified_at:nowISO()}).eq('id',inv.id);

  el.querySelectorAll('[data-inv-del]').forEach(function(btn){
    btn.addEventListener('click',async function(){
      if(!confirm('Delete this invoice?'))return;
      var id=btn.dataset.invDel;
      var{error}=await sb.from('invoices').delete().eq('id',id);

      var vid=btn.dataset.saveFee;
      var inp=el.querySelector('[data-fee-vid="'+vid+'"]');
      var fee=parseFloat(inp?inp.value:0)||0;
      await sb.from('vendors').update({booth_fee:fee}).eq('id',vid);try{await sb.from('vendors').update({modified_at:nowISO()}).eq('id',vid);}catch(e){}
      var v=vendors.find(function(x){return x.id===vid;});if(v)v.boothFee=fee;
      renderPayments();
    });

  el.querySelectorAll('[data-mark-paid]').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var v=vendors.find(function(x){return x.id===btn.dataset.markPaid;});if(!v)return;
      var newVal=!v.paymentReceived;
      // Update vendor payment status
      await sb.from('vendors').update({payment_received:newVal,modified_at:nowISO()}).eq('id',v.id);
      v.paymentReceived=newVal;
      // Also update the most recent invoice for this vendor
      var vInvoices=invoices.filter(function(i){return i.vendor_id===v.id;}).sort(function(a,b){return(b.created_at||'').localeCompare(a.created_at||'');});
      var inv=vInvoices[0];
      if(inv){
        if(newVal){
          // Mark invoice as paid with today's date
          await sb.from('invoices').update({status:'paid',paid_at:nowISO(),modified_at:nowISO()}).eq('id',inv.id);
          inv.status='paid';inv.paid_at=nowISO();
        } else {
          // Unmark — revert invoice to sent status
          await sb.from('invoices').update({status:'sent',paid_at:null,modified_at:nowISO()}).eq('id',inv.id);
          inv.status='sent';inv.paid_at=null;
        }
      }
      renderPayments();

      sendEmail(
        v.email,

var invoices=[];
function nextInvoiceNumber(){
  var nums=invoices.map(function(i){
    var m=(i.invoice_number||'').match(/(\d+)$/);
    return m?parseInt(m[1]):0;
  });
  var next=(nums.length?Math.max.apply(null,nums):0)+1;
  return'INV-'+String(next).padStart(4,'0');
}

async function loadInvoices(){
  try{
    var{data,error}=await sb.from('invoices').select('*').order('created_at',{ascending:false});
    if(!error&&data){
      invoices.length=0;
      data.forEach(function(row){invoices.push(row);});
    }
  }catch(e){invoices=[];}
}

function feeForBoothSize(boothSize){
  var fees=loadFeeSchedule();
  if(!boothSize)return 0;
  var n=boothSize.replace(/[\u2018\u2019\u201A\u201B]/g,"'").replace(/\s*[xX×]\s*/g,'x').trim();
  var map={"10'x10'":fees.t10x10,"10'x20'":fees.t10x20,"20'x10'":fees.t10x20,"20'x20'":fees.t20x20,"20'x30'":fees.t20x30,"30'x10'":fees.t20x30,"Food truck / trailer":fees.ttruck,"Food truck":fees.ttruck,"Trailer":fees.ttrailer,"Trailer only":fees.ttraileronly,"VAN":fees.tvan,"Bouncy Houses":fees.tbouncy,"Other":fees.tother};
  return map[n]||map[boothSize]||0;
}

function invStatusBadge(status){
  if(status==='paid')return'<span style="font-size:12px;font-weight:800;color:#27500A">✅ PAID</span>';
  if(status==='overdue')return'<span style="font-size:12px;font-weight:800;color:#791F1F">⚠️ OVERDUE</span>';
  if(status==='sent')return'<span style="font-size:12px;font-weight:800;color:#c0392b">📧 UNPAID</span>';
  return'<span style="font-size:12px;font-weight:800;color:#888">📝 DRAFT</span>';
}

function invThSort(col,label){
  var isActive=invSortCol===col;
  var icon=isActive?'<span style="font-size:11px;margin-left:4px;font-weight:800">'+(invSortDir===1?'↑':'↓')+'</span>':'<span style="font-size:11px;margin-left:4px;color:#bbb">⇅</span>';
  return'<th data-inv-sort="'+col+'" style="cursor:pointer;user-select:none;background:'+(isActive?'#e8e8e8':'#f0ede6')+';color:'+(isActive?'#1a1a1a':'#555')+'" title="Sort by '+label+'">'+label+icon+'</th>';
}
function sortInvoices(list){
  return list.slice().sort(function(a,b){
    var av,bv;
    if(invSortCol==='number'){av=a.invoice_number||'';bv=b.invoice_number||'';}
    else if(invSortCol==='vendor'){
      var va=vendors.find(function(x){return x.id===a.vendor_id;});
      var vb=vendors.find(function(x){return x.id===b.vendor_id;});
      av=(va&&va.businessName)||'';bv=(vb&&vb.businessName)||'';
    }
    else if(invSortCol==='category'){
      var va2=vendors.find(function(x){return x.id===a.vendor_id;});
      var vb2=vendors.find(function(x){return x.id===b.vendor_id;});
      av=(va2&&va2.category)||'';bv=(vb2&&vb2.category)||'';
    }
    else if(invSortCol==='amount'){av=parseFloat(a.total||0);bv=parseFloat(b.total||0);return(av-bv)*invSortDir;}
    else if(invSortCol==='status'){
      var order={paid:0,draft:1,sent:2,overdue:3};
      av=order[a.status]||1;bv=order[b.status]||1;return(av-bv)*invSortDir;
    }
    else if(invSortCol==='due'){av=a.due_date||'';bv=b.due_date||'';}
    else if(invSortCol==='sent'){av=a.sent_at||'';bv=b.sent_at||'';}
    else if(invSortCol==='paid'){av=a.paid_at||'';bv=b.paid_at||'';}
    else{av='';bv='';}
    return av.toString().localeCompare(bv.toString())*invSortDir;
  });
}

function openInvoiceModal(vendorId){
  var v=vendorId?vendors.find(function(x){return x.id===vendorId;}):null;
  // Get dates from calRows first, then fall back to selectedDates
  var vDates=vendorId
    ?Object.keys(calRows).filter(function(ds){return(calRows[ds].approved||[]).indexOf(vendorId)>-1;}).sort()
    :[];
  // Also include any dates in selectedDates not yet in calRows
  if(v&&v.selectedDates){
    v.selectedDates.forEach(function(ds){
      if(vDates.indexOf(ds)===-1)vDates.push(ds);
    });
    vDates.sort();
  }
  var feePerDate=v?feeForBoothSize(v.boothSize):0;
  // If fee is 0 and booth size isn't recognized, fall back to t10x10 fee
  if(!feePerDate){var fs=loadFeeSchedule();feePerDate=fs.t10x10||0;}

  // Find the most recently assigned tent spot size for this vendor
  var assignedBoothSize=v?v.boothSize||'':'' ;
  if(vendorId){
    vDates.forEach(function(ds){
      if(calRows[ds]&&calRows[ds].tent_assignments){
        Object.keys(calRows[ds].tent_assignments).forEach(function(sid){
          if(calRows[ds].tent_assignments[sid]===vendorId){
            var lc=window._layoutCache&&window._layoutCache[ds];
            if(lc){var sp=lc.find(function(s){return s.id===sid;});if(sp&&sp.size){assignedBoothSize=sp.size;}}
          }
        });
      }
    });
    var spotFee=feeForBoothSize(assignedBoothSize);

function generateInvoicePDF(inv){
  var html=buildInvoiceHTML(inv);
  if(!html){alert('Vendor not found.');return;}
  var win=window.open('','_blank','width=750,height=900,scrollbars=yes');
  if(win){win.document.write(html);win.document.close();}
  else{alert('Please allow pop-ups to view the invoice PDF.');}
}

function renderCommsCompose(){

  el.innerHTML=
    '<div style="background:#fff;border:.5px solid #e5e3de;border-radius:12px;padding:1.25rem">'+

    '<div class="fg"><label>Send to</label>'+
    '<select id="cRecipType" style="width:100%;border:.5px solid #d0cec7;border-radius:8px;padding:10px 12px;font-size:16px;font-weight:700;font-family:inherit">'+
      '<option value="all">All vendors with email ('+allEmails.length+')</option>'+
      '<option value="approved">Approved vendors only</option>'+
      '<option value="unpaid">Unpaid approved vendors</option>'+
      '<option value="nocontract">Missing contract</option>'+
      (dates.length?'<optgroup label="By market date">'+dates.map(function(ds){return'<option value="date:'+ds+'">Vendors for '+ds+'</option>';}).join('')+'</optgroup>':'')+
      (vendorGroups.length?'<optgroup label="By group">'+vendorGroups.map(function(g){return'<option value="group:'+g.id+'">Group: '+esc(g.name)+'</option>';}).join('')+'</optgroup>':'')+
      Object.keys(CAT_COLORS).map(function(cat){return'<option value="cat:'+cat+'">Category: '+cat.split(' / ')[0]+'</option>';}).join('')+
    '</select></div>'+

    '<div class="fg" id="cRecipPreview" style="font-size:11px;color:#888;padding:.4rem .6rem;background:#f8f7f4;border-radius:6px;margin-top:-8px"></div>'+

    '<div class="fg"><label>Subject</label><input id="cSubject" value="Elevation Bend Farmers Market" style="width:100%;border:.5px solid #d0cec7;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit"></div>'+
    '<div class="fg"><label>Message</label><textarea id="cBody" style="width:100%;height:160px;border:.5px solid #d0cec7;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;resize:vertical" placeholder="Type your message here…"></textarea></div>'+

    '<div style="display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap">'+
      '<button class="btn-s" id="cCopyEmails">📋 Copy addresses</button>'+
      '<button class="btn-p" id="cSendBtn">📧 Send Email</button>'+
    '</div></div>';

  function getRecipients(){
    var type=document.getElementById('cRecipType').value;
    var list=vendors.filter(function(v){return v.email;});
    if(type==='approved')list=list.filter(function(v){return v.status==='approved';});
    else if(type==='unpaid')list=list.filter(function(v){return v.status==='approved'&&!v.paymentReceived;});
    else if(type==='nocontract')list=list.filter(function(v){return v.status==='approved'&&!v.contractReceived;});
    else if(type.startsWith('date:')){var ds=type.slice(5);var ids=getApproved(ds);list=list.filter(function(v){return ids.indexOf(v.id)>-1;});}
    else if(type.startsWith('group:')){var gid=type.slice(6);var g=vendorGroups.find(function(x){return x.id===gid;});var mids=g?g.member_ids||[]:[];list=list.filter(function(v){return mids.indexOf(v.id)>-1;});}
    else if(type.startsWith('cat:')){var cat=type.slice(4);list=list.filter(function(v){return v.category===cat;});}
    return list;
  }

  function updatePreview(){
    var r=getRecipients();
    var prev=document.getElementById('cRecipPreview');
    if(prev)prev.textContent=r.length+' recipient'+(r.length!==1?'s':'')+': '+r.slice(0,3).map(function(v){return v.businessName;}).join(', ')+(r.length>3?' + '+(r.length-3)+' more':'');
  }

  document.getElementById('cRecipType').addEventListener('change',updatePreview);
  updatePreview();

  document.getElementById('cCopyEmails').addEventListener('click',function(){
    var r=getRecipients();
    var emails=r.map(function(v){return v.email;}).join(', ');
    navigator.clipboard.writeText(emails).then(function(){alert('Copied '+r.length+' email address'+(r.length!==1?'es':'')+' to clipboard.');}).catch(function(){alert(emails);});
  });

  document.getElementById('cSendBtn').addEventListener('click',async function(){
    var r=getRecipients();
    if(!r.length){alert('No recipients with email addresses in this selection.');return;}
    var emails=r.map(function(v){return v.email;});
    var subj=(document.getElementById('cSubject').value||'').trim();
    var body=(document.getElementById('cBody').value||'').trim();
    var btn=this;btn.disabled=true;btn.textContent='Sending…';
    var ok=await sendEmailResend({bcc:emails,subject:subj,text:body,to:'noreply@resend.dev'});
    if(!ok)sendEmail(emails.join(','),subj,body);
    btn.disabled=false;btn.textContent='📧 Send Email';
  });
}

function renderCommsLayout(){
  var el=document.getElementById('commsContent');
  var dates=getMarketDates();
  el.innerHTML=
    '<div style="background:#fff;border:.5px solid #e5e3de;border-radius:12px;padding:1.25rem">'+
    '<div style="font-size:13px;font-weight:600;margin-bottom:4px">Send market layout to vendors</div>'+
    '<div style="font-size:11px;color:#888;margin-bottom:1rem">Sends the layout image and spot assignments for a specific market date to all vendors scheduled for that day.</div>'+

    (!dates.length?'<div class="empty">No market dates scheduled yet.</div>':
      '<div class="fg"><label>Select market date</label>'+
      '<select id="layoutEmailDate" style="width:100%;max-width:220px;border:.5px solid #d0cec7;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit">'+
        dates.map(function(ds){return'<option value="'+ds+'">'+ds+'</option>';}).join('')+
      '</select></div>'+
      '<div class="fg"><label>Additional message (optional)</label>'+
      '<textarea id="layoutEmailMsg" style="width:100%;height:80px;border:.5px solid #d0cec7;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;resize:vertical" placeholder="e.g. Please arrive by 7am for setup. Your spot number is in the layout below."></textarea></div>'+
      '<div id="layoutEmailPreview" style="margin:.75rem 0;padding:.75rem;background:#f8f7f4;border-radius:8px;border:.5px solid #e5e3de;font-size:11px;color:#888"></div>'+
      '<div style="display:flex;gap:8px;flex-wrap:wrap">'+
        '<button class="btn-blue" id="previewLayoutEmail">👁 Preview email</button>'+
        '<button class="btn-p" id="sendLayoutEmail">📧 Send to all vendors for this date</button>'+
      '</div>')+
    '</div>';

  if(!dates.length)return;

  function getLayoutRecips(ds){
    var ids=getApproved(ds);
    return vendors.filter(function(v){return ids.indexOf(v.id)>-1&&v.email;});
  }

  function buildLayoutEmailBody(ds){
    var ta=getTentAssignments(ds);
    // Find spot number for each vendor from layout cache
    var lspots=window._layoutCache&&window._layoutCache[ds]?window._layoutCache[ds]:[];
    var spotByVid={};
    lspots.forEach(function(sp){var vid=ta[sp.id];if(vid)spotByVid[vid]='Spot '+sp.num+(sp.size?' ('+sp.size+')':'');});
    var recips=getLayoutRecips(ds);
    var lines=['Market Layout — '+ds,'','Your spot assignment:'];
    recips.forEach(function(v){lines.push('  '+esc(v.businessName||v.contactName)+': '+(spotByVid[v.id]||'TBD'));});
    lines.push('','Please arrive by your scheduled setup time. Contact us with any questions.');
    var msg=(document.getElementById('layoutEmailMsg')||{}).value||'';
    if(msg.trim())lines.splice(1,0,'',msg.trim());
    return lines.join('\n');
  }

  var dateEl=document.getElementById('layoutEmailDate');
  if(dateEl){
    dateEl.addEventListener('change',function(){
      var ds=this.value;
      var r=getLayoutRecips(ds);
      var prev=document.getElementById('layoutEmailPreview');
      if(prev)prev.textContent=r.length+' vendor'+(r.length!==1?'s':'')+' with email for '+ds+': '+r.slice(0,4).map(function(v){return v.businessName;}).join(', ')+(r.length>4?' + '+(r.length-4)+' more':'');
    });
    dateEl.dispatchEvent(new Event('change'));
  }

  document.getElementById('previewLayoutEmail').addEventListener('click',function(){
    var ds=(document.getElementById('layoutEmailDate')||{}).value;
    if(!ds)return;
    alert('Subject: Market Layout for '+ds+'\n\n'+buildLayoutEmailBody(ds));
  });

  document.getElementById('sendLayoutEmail').addEventListener('click',async function(){
    var ds=(document.getElementById('layoutEmailDate')||{}).value;if(!ds)return;
    var recips=getLayoutRecips(ds);
    if(!recips.length){alert('No vendors with email addresses for '+ds+'.');return;}
    var btn=this;btn.disabled=true;btn.textContent='Sending…';
    var ids=recips.map(function(v){return v.id;});
    await sendLayoutToVendor(ds,ids);
    btn.disabled=false;btn.textContent='📧 Send to all vendors for this date';
  });
}

  // ── CSV file input — clean handlers, no double-click conflict ──────────
  function handleCSVFile(file){
    if(!file)return;
    if(!file.name.match(/\.csv$/i)&&file.type!=='text/csv'){
      document.getElementById('csvImportStatus').innerHTML='<span style="color:#791F1F">Please select a .csv file.</span>';
      return;
    }
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        csvData=parseCSV(ev.target.result);
        var statusEl=document.getElementById('csvImportStatus');
        var runBtn=document.getElementById('runImportBtn');
        var dropZone=document.getElementById('csvDropZone');
        if(csvData.length<2){
          statusEl.innerHTML='<span style="color:#791F1F">CSV appears empty — check the file and try again.</span>';
          return;
        }
        var headers=csvData[0].map(function(h){return(h||'').trim().toLowerCase();});
        var hasBizCol=headers.some(function(h){return h.indexOf('business')>-1||h.indexOf('farm name')>-1||h==='ma'||h==='name'||h==='vendor name';});
        // Also accept first column as business name if it has data
        if(!hasBizCol&&csvData.length>1&&csvData[1][0]){hasBizCol=true;}
        if(!hasBizCol){
          statusEl.innerHTML='<span style="color:#791F1F">Missing required column: "Business Name" or "Business / Farm Name". Found columns: '+csvData[0].slice(0,5).join(', ')+'</span>';
          return;
        }
        var count=csvData.length-1;
        statusEl.innerHTML='<span style="color:#27500A;font-weight:600">✓ Found '+count+' vendor'+(count!==1?'s':'')+' ready to import — click the button below.</span>';
        if(dropZone){dropZone.style.borderColor='#22c55e';dropZone.style.background='#EAF3DE';}
        if(runBtn){
          runBtn.style.display='';
          // Attach click handler directly to this button instance every time
          runBtn.onclick=null; // clear any old handler
          runBtn.onclick=async function(){
            runBtn.disabled=true;runBtn.textContent='Importing…';
            statusEl.innerHTML='<span style="color:#a16207">⏳ Building records…</span>';
            try{
            var hdrs=csvData[0].map(function(h){return h.trim().toLowerCase();});
            // Direct column mapping from the known form export format
            // Columns: Submission date(0), Business/Farm Name(1), Primary Contact Name(2),
            // Email(3), Phone(4), City/Region(5), Website/Social(6), Category(7), Other(8),
            // Products(9), Local(10), Price range(11), Licenses(12), Explain(13),
            // Prepared food(14), Liability(15), Booth size(16), Own setup(17), Explain2(18),
            // Electricity(19), Attendance(20), Months(21), Why join(22), Values(23),
            // Additional(24), Photos(25)
            function getColIdx(name){return hdrs.indexOf(name.toLowerCase().trim());}
            function colIdx(row,idx){return idx>-1&&idx<row.length?(row[idx]||'').trim():'';}
            function colByName(row,name){var i=getColIdx(name);return colIdx(row,i);}

            // Find business name column index once
            var bizIdx=-1;
            var bizCandidates=['business / farm name','business name','businessname','farm name','ma','name','vendor name'];
            for(var bi=0;bi<bizCandidates.length;bi++){var bi2=getColIdx(bizCandidates[bi]);if(bi2>-1){bizIdx=bi2;break;}}
            // If still not found, try partial match
            if(bizIdx===-1){for(var bi=0;bi<hdrs.length;bi++){if(hdrs[bi].indexOf('business')>-1||hdrs[bi].indexOf('farm name')>-1){bizIdx=bi;break;}}}
            // Last resort: use first column
            if(bizIdx===-1)bizIdx=0;

            function mapCategory(raw){
              if(!raw)return'Other';
              var r=raw.toLowerCase();
              if(r.indexOf('farm')>-1||r.indexOf('produce')>-1||r.indexOf('vegetable')>-1||r.indexOf('fruit')>-1)return'Farm / Produce Grower';
              if(r.indexOf('ranch')>-1||r.indexOf('egg')>-1||r.indexOf('meat')>-1||r.indexOf('dairy')>-1)return'Rancher / Eggs / Meat / Dairy';
              if(r.indexOf('baked')>-1||r.indexOf('bakery')>-1||r.indexOf('bread')>-1||r.indexOf('pastry')>-1)return'Baked Goods';
              if(r.indexOf('specialty food')>-1||r.indexOf('packaged')>-1||r.indexOf('jam')>-1||r.indexOf('sauce')>-1||r.indexOf('honey')>-1)return'Specialty Food / Packaged Goods';
              if(r.indexOf('prepared')>-1||r.indexOf('hot food')>-1||r.indexOf('food truck')>-1)return'Prepared Food Vendor';
              if(r.indexOf('artisan')>-1||r.indexOf('maker')>-1||r.indexOf('craft')>-1||r.indexOf('jewelry')>-1||r.indexOf('pottery')>-1)return'Artisan / Maker';
              if(r.indexOf('flower')>-1||r.indexOf('plant')>-1||r.indexOf('herbal')>-1||r.indexOf('herb')>-1||r.indexOf('botanical')>-1)return'Flowers / Plants / Herbal Goods';
              return'Other';
            }
            function mapBoothSize(raw){
              if(!raw)return'';
              var r=raw.replace(/['']/g,"'").replace(/\s+/g,' ').trim().toLowerCase();
              if(r.indexOf('truck')>-1||r.indexOf('trailer')>-1||r==='van')return'Food truck / trailer';
              var d=r.replace(/'/g,'').replace(/\s*x\s*/gi,'x').replace(/\s+/g,'');
              if(d.indexOf('10x20')>-1)return"10'x20'";
              if(d.indexOf('20x30')>-1||d.indexOf('30x10')>-1)return"20'x30'";
              if(d.indexOf('20x20')>-1)return"20'x20'";
              if(d.indexOf('10x10')>-1||d==='1010')return"10'x10'";
              return raw.trim();
            }
            var CAT_VALID=['Farm / Produce Grower','Rancher / Eggs / Meat / Dairy','Baked Goods','Specialty Food / Packaged Goods','Prepared Food Vendor','Artisan / Maker','Flowers / Plants / Herbal Goods','Other'];
            var newRows=[],updatedIds=[],skipped=0;
            for(var i=1;i<csvData.length;i++){
              var row=csvData[i];
              if(!row.length||!row.join('').trim())continue;
              var bizName=bizIdx>-1?colIdx(row,bizIdx):'';
              if(!bizName){skipped++;continue;}
              var email=colByName(row,'email');
              var rawCat=colByName(row,'(select all that apply)')||colByName(row,'category')||colByName(row,'vendor type');
              var cat=mapCategory(rawCat);
              var appStatus=colByName(row,'status');
              if(['approved','pending','waitlist'].indexOf(appStatus)===-1)appStatus='pending';
              var vs=colByName(row,'vendor status');
              if(['active','inwork','inactive'].indexOf(vs)===-1)vs='active';
              var existing=null;
              // Match by business name first (most reliable since emails may be bulk-updated)
              existing=vendors.find(function(v){return v.businessName&&v.businessName.toLowerCase()===bizName.toLowerCase();});
              // Only fall back to email match if email looks unique (not a shared/admin email)
              if(!existing&&email){var emailCount=vendors.filter(function(v){return v.email&&v.email.toLowerCase()===email.toLowerCase();}).length;if(emailCount===1)existing=vendors.find(function(v){return v.email&&v.email.toLowerCase()===email.toLowerCase();});}
              var rowId=existing?existing.id:uid();
              var dbRow={
                id:rowId,
                status:appStatus,
                vendor_status:vs,
                business_name:bizName,
                contact_name:colByName(row,'primary contact name')||colByName(row,'contact name')||colByName(row,'contact')||(existing?existing.contactName||'':''),
                email:email||(existing?existing.email||'':''),
                phone:colByName(row,'phone')||(existing?existing.phone||'':''),
                website:colByName(row,'website and/or social media links')||colByName(row,'website'),
                social:colByName(row,'website and/or social media links')||colByName(row,'social'),
                category:cat,
                booth_size:mapBoothSize(colByName(row,'booth size requested')||colByName(row,'booth size'))||"10'x10'",
                products:colByName(row,'please describe your products in detail (include ingredients/materials, sourcing, and what makes your product unique)')||colByName(row,'products'),
                notes:colByName(row,'anything else we should know about you or your business?')||colByName(row,'notes'),
                licenses:colByName(row,'do you hold all required licenses and permits for your products?')||colByName(row,'licenses'),
                electricity:colByName(row,'electricity needed?')||colByName(row,'electricity'),
                local:colByName(row,'are all products locally grown, made, or produced?')||colByName(row,'local'),
                own_setup:colByName(row,'will you bring your own tent, table, and display?')||colByName(row,'own setup'),
                liability:colByName(row,'do you carry general liability insurance?')||colByName(row,'liability'),
                attendance:colByName(row,'how often would you like to attend?')||colByName(row,'attendance'),
                months:colByName(row,'months or dates interested in:')||colByName(row,'months or dates interested in')||colByName(row,'months'),
                why_join:colByName(row,'why do you want to be part of elevation farmers market?')||colByName(row,'why join'),
                values:colByName(row,'what values guide your business?')||colByName(row,'values'),
                additional_info:colByName(row,'anything else we should know about you or your business?')||colByName(row,'additional info'),
                price_range:existing?(existing.priceRange||[]):[],
                photos:existing?(existing.photos||[]):[],
                food_docs:existing?(existing.foodDocs||[]):[],
                selected_dates:existing?(existing.selectedDates||[]):[],
                contract_received:(function(){var raw=colByName(row,'contract signed')||colByName(row,'contract received')||colByName(row,'insurance')||'';var v=raw.trim().toLowerCase();if(!v||v==='no'||v==='false'||v==='0')return existing?existing.contractReceived||false:false;return true;}()),
                payment_received:existing?existing.paymentReceived||false:false,
                booth_fee:existing?existing.boothFee||0:0,
                status:existing?existing.status||appStatus:appStatus,
                vendor_status:existing?existing.vendorStatus||vs:vs,
                modified_at:nowISO()
              };
              var subDate=colByName(row,'submission date');
              var createdAt=nowISO();
              if(subDate){try{var d=new Date(subDate);if(!isNaN(d.getTime()))createdAt=d.toISOString();}catch(e){}}
              if(!existing)dbRow.created_at=createdAt;
              newRows.push(dbRow);
              if(existing)updatedIds.push(rowId);
            }
            if(!newRows.length){
              console.log('Import: no rows found. csvData length:', csvData.length, 'bizIdx:', bizIdx, 'headers:', hdrs.slice(0,5));
              statusEl.innerHTML='<span style="color:#791F1F">No valid rows found. bizIdx='+bizIdx+' headers='+hdrs.slice(0,3).join('|')+'</span>';
              runBtn.disabled=false;runBtn.textContent='📥 Import vendors';return;
            }
            // Deduplicate by ID — keep last occurrence if CSV has duplicate rows
            var seen={};
            newRows=newRows.filter(function(r){
              if(seen[r.id])return false;
              seen[r.id]=true;return true;
            });
            statusEl.innerHTML='<span style="color:#a16207">⏳ Saving '+newRows.length+' vendors…</span>';
            console.log('Import: attempting to save',newRows.length,'rows');
            console.log('Sample row:', JSON.stringify(newRows[0]));
            var newOnly=newRows.filter(function(r){return updatedIds.indexOf(r.id)===-1;});
            var existingOnly=newRows.filter(function(r){return updatedIds.indexOf(r.id)>-1;});
            var CHUNK=5,errors=0,errorMsg='';
            // Update existing vendors
            for(var c=0;c<existingOnly.length;c+=CHUNK){
              var chunk=existingOnly.slice(c,c+CHUNK);
              var res=await sb.from('vendors').upsert(chunk,{onConflict:'id'});
              if(res.error){console.error('Update chunk error:',res.error);errorMsg=res.error.message;errors++;}
              statusEl.innerHTML='<span style="color:#a16207">⏳ Updating '+(Math.min(c+CHUNK,existingOnly.length))+'/'+existingOnly.length+'…</span>';
            }
            // Insert new vendors
            for(var c=0;c<newOnly.length;c+=CHUNK){
              var chunk=newOnly.slice(c,c+CHUNK);
              var res=await sb.from('vendors').insert(chunk);
              if(res.error){
                console.error('Insert chunk error:',res.error,'sample:',JSON.stringify(chunk[0]));
                // Fallback to upsert if insert fails
                res=await sb.from('vendors').upsert(chunk,{onConflict:'id'});
                if(res.error){errorMsg=res.error.message;errors++;}
              }
              statusEl.innerHTML='<span style="color:#a16207">⏳ Adding new '+(Math.min(c+CHUNK,newOnly.length))+'/'+newOnly.length+'…</span>';
            }
            var created=newRows.length-updatedIds.length,updated=updatedIds.length;
            runBtn.disabled=false;runBtn.textContent='📥 Import vendors';
            if(errors){
              statusEl.innerHTML='<span style="color:#791F1F">⚠️ '+errors+' chunk error(s): '+esc(errorMsg)+' — check browser console for details</span>';
            } else {
              statusEl.innerHTML='<span style="color:#27500A;font-weight:600">✅ Done! Created: '+created+' · Updated: '+updated+' · Skipped: '+skipped+'</span>';
              csvData=[];
              if(dropZone){dropZone.style.borderColor='#d0cec7';dropZone.style.background='';}
              runBtn.style.display='none';
              await loadData();
            }
            }catch(importErr){
              console.error('Import error:', importErr);
              statusEl.innerHTML='<span style="color:#791F1F">Import error: '+esc(importErr.message||String(importErr))+'</span>';
              runBtn.disabled=false;runBtn.textContent='📥 Import vendors';
            }
          };
        }
      }catch(err){
        document.getElementById('csvImportStatus').innerHTML='<span style="color:#791F1F">Error reading file: '+esc(err.message)+'</span>';
      }
    };
    reader.onerror=function(){
      document.getElementById('csvImportStatus').innerHTML='<span style="color:#791F1F">Failed to read file.</span>';
    };
    reader.readAsText(file);
  }

  // ── Category color editor ─────────────────────────────────────────────
  // Helper: derive bg and text from a hex dot color
  function hexToColorSet(hex){
    // bg = very light tint (hex at 15% opacity on white)
    // text = darkened version
    // border = the hex itself
    function hexToRgb(h){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return{r,g,b};}
    function toHex(n){return Math.round(n).toString(16).padStart(2,'0');}
    var rgb=hexToRgb(hex);
    var bgR=Math.round(rgb.r*0.15+255*0.85),bgG=Math.round(rgb.g*0.15+255*0.85),bgB=Math.round(rgb.b*0.15+255*0.85);
    var bg='#'+toHex(bgR)+toHex(bgG)+toHex(bgB);
    var textR=Math.round(rgb.r*0.45),textG=Math.round(rgb.g*0.45),textB=Math.round(rgb.b*0.45);
    var text='#'+toHex(textR)+toHex(textG)+toHex(textB);
    return{bg:bg,border:hex,text:text,dot:hex};
  }

// ── CSV parser (handles quoted fields) ────────────────────────────────────
function parseCSV(text){
  var rows=[],row=[],cur='',inQ=false;
  for(var i=0;i<text.length;i++){
    var ch=text[i];
    if(ch==='"'){
      if(inQ&&text[i+1]==='"'){cur+='"';i++;}
      else inQ=!inQ;
    } else if(ch===','&&!inQ){
      row.push(cur);cur='';
    } else if((ch==='\n'||ch==='\r')&&!inQ){
      if(ch==='\r'&&text[i+1]==='\n')i++;
      row.push(cur);cur='';
      if(row.join('').trim())rows.push(row);
      row=[];
    } else {
      cur+=ch;
    }
  }
  if(cur||row.length){row.push(cur);if(row.join('').trim())rows.push(row);}
  return rows;
}

// ── sendEmail — swap this body for Gmail API when ready ───────────────────
// TO SWITCH TO GMAIL API: replace the window.open line with a fetch() call
// to your Gmail API endpoint with the same to/subject/body parameters.
// ── Email via Resend ───────────────────────────────────────────────────────
async function sendEmailResend(opts){
  // opts: { to, bcc, subject, text, attachments }
  try{
    var res=await fetch(SUPABASE_FN_URL+'/send-email',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPA_ANON_KEY||SUPA_KEY,'Authorization':'Bearer '+(SUPA_ANON_KEY||SUPA_KEY)},
      body:JSON.stringify(opts)
    });
    var data=await res.json();
    if(!data.success)console.warn('Resend error:',data.error);
    return data.success;
  }catch(e){
    console.warn('Resend failed, falling back to Gmail:',e);
    return false;
  }
}

function sendEmail(to,subject,body){
  var isBulk=to&&to.indexOf(',')>-1;
  // Try Resend first
  var opts=isBulk
    ?{bcc:to.split(',').map(function(e){return e.trim();}),subject:subject,text:body}
    :{to:to,subject:subject,text:body};
  sendEmailResend(opts).then(function(ok){
    if(!ok){
      // Fallback to Gmail compose
      var url='https://mail.google.com/mail/?view=cm&to='+encodeURIComponent(to)+'&su='+encodeURIComponent(subject)+'&body='+encodeURIComponent(body);
      var a=document.createElement('a');a.href=url;a.target='_blank';a.rel='noopener';
      document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a);},100);
    } else {
      // Show brief confirmation
      var t=document.createElement('div');
      t.style.cssText='position:fixed;bottom:24px;right:24px;background:#27500A;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2)';
      t.textContent='✅ Email sent via Resend';
      document.body.appendChild(t);
      setTimeout(function(){document.body.removeChild(t);},3000);
    }
  });
}
