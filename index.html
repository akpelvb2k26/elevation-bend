<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elevation Bend — Farmers Market</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#ffffff;color:#1a1a1a;min-height:100vh}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
.auth-card{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,.1)}
.auth-logo{font-size:22px;font-weight:700;margin-bottom:4px}
.auth-sub{font-size:12px;color:#888;margin-bottom:1.75rem}
.auth-title{font-size:16px;font-weight:600;margin-bottom:1.25rem}
.auth-fg{margin-bottom:.85rem}
.auth-fg label{font-size:13px;color:#555;display:block;margin-bottom:4px;font-weight:700}
.auth-fg input{width:100%;border:1px solid #d0cec7;border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;outline:none}
.auth-fg input:focus{border-color:#22c55e;box-shadow:0 0 0 3px #dcfce7}
.auth-btn{width:100%;background:#1a1a1a;color:#fff;border:none;padding:11px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-err{background:#FCEBEB;color:#791F1F;border-radius:8px;padding:.75rem 1rem;font-size:12px;margin-bottom:.85rem;display:none}
.auth-footer{text-align:center;font-size:12px;color:#888;margin-top:1rem}
.auth-link{color:#1a1a1a;font-weight:500;cursor:pointer;text-decoration:underline}
#app-screen{display:none;padding:.75rem;max-width:980px;margin:0 auto}
.env-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:8px;margin-bottom:.75rem}
.env-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.env-label{font-size:12px;font-weight:700;flex:1;color:#15803d}
.env-user{font-size:10px;color:#15803d}
.signout-btn{font-size:10px;padding:4px 9px;border-radius:6px;border:.5px solid #639922;background:#fff;color:#27500A;cursor:pointer;font-family:inherit}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:8px}
.hdr-title{font-size:16px;font-weight:700}
.hdr-sub{font-size:11px;color:#888;margin-top:1px}
nav{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;margin-bottom:.85rem;background:#f0ede6;border-radius:8px;padding:3px}
.nb{background:none;border:none;padding:9px 4px;font-size:13px;font-weight:800;color:#888;cursor:pointer;border-radius:6px;text-align:center;font-family:inherit;white-space:nowrap;letter-spacing:-.01em}
.nb.active{background:#fff;color:#1a1a1a;border:.5px solid #e5e3de;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(78px,1fr));gap:5px;margin-bottom:.85rem}
.stat{background:#fff;border:.5px solid #e5e3de;border-radius:10px;padding:.5rem .65rem}
.sl{font-size:11px;color:#888;margin-bottom:1px;text-transform:uppercase;letter-spacing:.03em;font-weight:700}
.sv{font-size:18px;font-weight:800}
.vrow{background:#fff;border:.5px solid #e5e3de;border-radius:10px;padding:1.1rem;margin-bottom:8px}
.vrow.vstatus-active{border-left:3px solid #22c55e}
.vrow.vstatus-inwork{border-left:3px solid #eab308}
.vrow.vstatus-inactive{border-left:3px solid #9ca3af;opacity:.8}
.vname{font-size:20px;font-weight:700}
.vmeta{font-size:16px;color:#888;margin-top:3px;font-weight:500}
.vdates{font-size:14px;color:#888;margin-top:4px}
.vtags{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.tg{background:#EAF3DE;color:#27500A}.tb{background:#E6F1FB;color:#0C447C}
.tw{background:#FAEEDA;color:#633806}.tr{background:#FCEBEB;color:#791F1F}.tgr{background:#f0ede6;color:#555}
.tag-vs-active{background:#dcfce7;color:#15803d}.tag-vs-inwork{background:#fef9c3;color:#a16207}.tag-vs-inactive{background:#f3f4f6;color:#6b7280}
.tag-contract{background:#E6F1FB;color:#0C447C}.tag-payment{background:#EAF3DE;color:#27500A}
.vs-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle}
.vactions{display:flex;align-items:center;gap:4px;margin-top:7px;flex-wrap:wrap}
.vactions select{font-size:10px;padding:3px 5px;border-radius:5px;border:.5px solid #d0cec7;background:#f8f7f4;font-family:inherit}
.iBtn{background:none;border:.5px solid #e5e3de;border-radius:6px;padding:4px 7px;font-size:12px;cursor:pointer;color:#888}
.iBtn:hover{background:#f0ede6}
.glabel{font-size:12px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin:.65rem 0 .3rem;padding-left:2px}
.empty{text-align:center;padding:2rem .5rem;color:#aaa;font-size:12px;background:#fff;border:.5px solid #e5e3de;border-radius:10px}
.btn-p{background:#1a1a1a;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:700;white-space:nowrap}
.btn-p:hover{background:#333}.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-s{background:#fff;border:.5px solid #d0cec7;color:#555;padding:7px 13px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-s:hover{background:#f0ede6}
.btn-g{background:#dcfce7;border:.5px solid #22c55e;color:#15803d;padding:7px 13px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-blue{background:#E6F1FB;border:.5px solid #378ADD;color:#0C447C;padding:7px 13px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-amber{background:#FAEEDA;border:.5px solid #BA7517;color:#633806;padding:7px 13px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-danger{background:#FCEBEB;border:.5px solid #f09595;color:#791F1F;padding:7px 13px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.cal-wrap{background:#fff;border:.5px solid #e5e3de;border-radius:12px;padding:.85rem}
.cal-nav{display:flex;align-items:center;gap:8px;margin-bottom:.65rem}
.cal-nav span{font-size:13px;font-weight:600;flex:1;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.chd{text-align:center;font-size:10px;color:#888;padding:3px 0;font-weight:600}
.cday{text-align:center;font-size:11px;padding:8px 2px;border-radius:8px;border:.5px solid transparent;cursor:pointer;font-weight:500;min-height:38px}
.cday:hover{background:#f0ede6}
.cday.has-vendors{background:#EAF3DE;border-color:#639922;color:#27500A}
.cday.cother{color:#ccc}.cday.ctoday{box-shadow:0 0 0 2px #378ADD}.cday.selected-day{box-shadow:0 0 0 2.5px #1a1a1a}
.day-count{font-size:8px;display:block;font-weight:400}
.day-report{background:#fff;border:.5px solid #e5e3de;border-radius:12px;margin-top:.85rem;overflow:hidden}
.day-report-header{padding:.85rem 1rem;background:#f8f7f4;border-bottom:.5px solid #e5e3de;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.day-vendor-card{padding:.85rem 1rem;border-bottom:.5px solid #e5e3de;cursor:pointer;display:flex;align-items:flex-start;gap:10px}
.day-vendor-card:hover{background:#f8f7f4}
.day-vendor-card:last-child{border-bottom:none}
.dvc-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.tent-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;padding:.85rem 1rem;background:#fff;border:.5px solid #e5e3de;border-radius:10px;flex-wrap:wrap;gap:8px}
.tent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:.5rem}
.tcell{border:.5px solid #e5e3de;border-radius:10px;padding:.65rem .75rem;min-height:96px;background:#fff;position:relative}
.tcell.tocc{background:#EAF3DE;border-color:#639922}
.tnum{font-size:11px;font-weight:900;color:#555;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;padding-right:22px;font-family:"Arial Black",Arial,sans-serif}
.tvname{font-size:13px;font-weight:700;margin-top:4px}
.tvmeta{font-size:10px;color:#888;margin-top:2px}
.tassign{width:100%;margin-top:8px;background:#f8f7f4;border:.5px solid #d0cec7;border-radius:6px;padding:5px 8px;font-size:11px;cursor:pointer;color:#888;font-family:inherit;text-align:left}
.tassign:hover{background:#f0ede6;color:#1a1a1a}
.layout-datebar{display:flex;align-items:center;gap:8px;padding:.6rem .85rem;background:#f8f7f4;border:.5px solid #e5e3de;border-radius:10px;margin-bottom:.75rem;flex-wrap:wrap}
.layout-badge{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:500}
.badge-saved{background:#EAF3DE;color:#27500A;border:.5px solid #639922}
.badge-unsaved{background:#FAEEDA;color:#633806;border:.5px solid #BA7517}
.badge-empty{background:#f0ede6;color:#888;border:.5px solid #d0cec7}
.layout-toolbar{display:flex;align-items:center;gap:6px;padding:.6rem .85rem;background:#fff;border:.5px solid #e5e3de;border-radius:10px;margin-bottom:.75rem;flex-wrap:wrap}
.canvas-outer{overflow:auto;background:#f0ede6;border:.5px solid #e5e3de;border-radius:10px;cursor:default}
#layoutCanvas{position:relative;width:4000px;height:2400px}
.grid-dot{position:absolute;width:2px;height:2px;border-radius:50%;background:#d0cec7;pointer-events:none}
.lspot{position:absolute;border:2px solid #d0cec7;border-radius:10px;background:#fff;cursor:grab;user-select:none;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:4px 4px;touch-action:none}
.lspot:hover{border-color:#378ADD;z-index:10}
.lspot.dragging{cursor:grabbing;z-index:100;opacity:.88;border-color:#378ADD;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.lspot.lsel{border-color:#639922;box-shadow:0 0 0 2.5px #c0dd97;z-index:20}
.lspot.locc{background:#EAF3DE;border-color:#639922}
.lspot.ltruck{border-style:dashed}
.lspot-del{position:absolute;top:-7px;right:-7px;width:18px;height:18px;border-radius:50%;background:#791F1F;border:1.5px solid #fff;color:#fff;font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:30;font-family:inherit;line-height:1}
.lspot:hover .lspot-del,.lspot.lsel .lspot-del{display:flex}
.lspot-num{font-size:18px;font-weight:900;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;font-family:"Arial Black",Arial,sans-serif}
.lspot-size{font-size:13px;font-weight:900;color:#aaa;margin-bottom:2px;font-family:"Arial Black",Arial,sans-serif}
.lspot-vendor{font-size:14px;font-weight:900;color:#27500A;max-width:95%;overflow:hidden;text-overflow:ellipsis;white-space:normal;word-break:break-word;font-family:"Arial Black",Arial,sans-serif;line-height:1.2;text-align:center}
.lspot-cat{font-size:14px;font-weight:900;color:#1a1a1a;max-width:95%;overflow:hidden;text-overflow:ellipsis;white-space:normal;word-break:break-word;font-family:"Arial Black",Arial,sans-serif;line-height:1.2;text-align:center}
.layout-legend{display:flex;gap:12px;padding:.45rem .85rem;font-size:10px;color:#888;flex-wrap:wrap;align-items:center}
.ll{display:flex;align-items:center;gap:4px}
.ls{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.report-table{width:100%;border-collapse:collapse;font-size:12px}
.report-table th{text-align:left;padding:8px 10px;font-weight:800;color:#555;border-bottom:.5px solid #e5e3de;font-size:12px;text-transform:uppercase;background:#f8f7f4}
.report-table td{padding:9px 10px;border-bottom:.5px solid #f0ede6;vertical-align:middle;font-size:13px}
.report-table tr:hover td{background:#f8f7f4;cursor:pointer}
.report-wrap{background:#fff;border:.5px solid #e5e3de;border-radius:12px;overflow:hidden;margin-bottom:.85rem}
.sched-approved{background:#EAF3DE;color:#27500A;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;display:inline-block;border:.5px solid #639922}
.sched-waitlist{background:#FEF9C3;color:#A16207;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;display:inline-block;border:.5px solid #EAB308}
.sched-pending{background:#FDECEA;color:#9B3A2E;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;display:inline-block;border:.5px solid #F1948A}
.sched-issue{background:#FCEBEB;color:#791F1F;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;display:inline-block;border:.5px solid #e08080}
.overlay{background:rgba(0,0,0,.4);position:fixed;inset:0;z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:1.5rem 1rem;overflow-y:auto}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:100%;margin:auto}
.modal.sm{max-width:380px}.modal.md{max-width:560px}.modal.lg{max-width:720px}.modal.xl{max-width:1000px}
.mtitle{font-size:16px;font-weight:800;margin-bottom:.85rem;padding-bottom:.6rem;border-bottom:.5px solid #e5e3de}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:.85rem;padding-top:.75rem;border-top:.5px solid #e5e3de;flex-wrap:wrap}
#fPrevBtn:focus,#fNextBtn:focus{outline:none;box-shadow:none}
.vform-subnav{display:flex;gap:0;border-bottom:.5px solid #e5e3de;background:#f8f7f4;overflow-x:auto;scrollbar-width:none}
.vform-subnav::-webkit-scrollbar{display:none}
.fsnb{background:none;border:none;border-bottom:2.5px solid transparent;padding:.6rem .85rem;font-size:15px;font-weight:800;color:#888;cursor:pointer;font-family:inherit;white-space:nowrap;display:flex;align-items:center;gap:5px}
.fsnb:hover{color:#1a1a1a;background:#fff}
.fsnb.active{color:#1a1a1a;border-bottom-color:#1a1a1a;background:#fff}
.fsnb.done .fsnb-dot{background:#22c55e}
.fsnb-dot{width:6px;height:6px;border-radius:50%;background:#d0cec7;flex-shrink:0}
.fsnb.active .fsnb-dot{background:#1a1a1a}
.progress-bar{height:3px;background:#f0ede6}
.progress-fill{height:3px;background:#22c55e;transition:width .25s}
.fpanel{display:none;padding:1.1rem 1.25rem;min-height:320px;overflow-y:visible}
.fpanel.active{display:block}
.fsec-title{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.85rem;padding-bottom:.4rem;border-bottom:.5px solid #e5e3de}
.fg{margin-bottom:.75rem}
.fg label{font-size:13px;color:#555;display:block;margin-bottom:4px;font-weight:700}
.fg input,.fg select,.fg textarea{width:100%;border:.5px solid #d0cec7;border-radius:8px;padding:8px 10px;font-size:13px;background:#fff;color:#1a1a1a;font-family:inherit;outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#22c55e}
.fg textarea{height:60px;resize:vertical}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.req{color:#E24B4A}
.rg{display:flex;flex-direction:column;gap:5px}
.ropt{display:flex;flex-direction:row;align-items:center;gap:8px;padding:7px 10px;border:.5px solid #e5e3de;border-radius:8px;cursor:pointer;background:#fff}
.ropt input[type=radio]{flex-shrink:0;width:15px;height:15px;accent-color:#22c55e;margin:0}
.ropt span{font-size:12px;line-height:1.3;flex:1}
.ropt.sel{border-color:#22c55e;background:#dcfce7}
.ropt input[type=radio]{margin-top:2px;flex-shrink:0;accent-color:#22c55e}
.ropt span{font-size:12px}
.copt{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;border:.5px solid #e5e3de;border-radius:8px;cursor:pointer;background:#fff}
.copt span{font-size:12px;flex:1}
.copt input[type=checkbox]{margin-top:2px;flex-shrink:0;accent-color:#22c55e;width:14px;height:14px}
.sub-field{margin-top:6px;padding-left:14px;border-left:2px solid #d0cec7}
.sub-field textarea{width:100%;border:.5px solid #d0cec7;border-radius:8px;padding:6px 8px;font-size:12px;font-family:inherit;height:48px;resize:vertical}
.vs-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:4px}
.vs-card{border:1.5px solid #e5e3de;border-radius:8px;padding:10px 8px;text-align:center;cursor:pointer;background:#fff}
.vs-card.sel-active{border-color:#22c55e;background:#dcfce7}
.vs-card.sel-inwork{border-color:#eab308;background:#fef9c3}
.vs-card.sel-inactive{border-color:#9ca3af;background:#f3f4f6}
.vs-card-dot{width:12px;height:12px;border-radius:50%;margin:0 auto 5px}
.vs-card-label{font-size:13px;font-weight:700}
.toggle-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.toggle-card{border:1.5px solid #e5e3de;border-radius:8px;padding:10px;cursor:pointer;background:#fff;display:flex;align-items:center;gap:8px}
.toggle-card.on-contract{border-color:#22c55e;background:#EAF3DE;color:#27500A}
.toggle-card.on-payment{border-color:#27500A;background:#EAF3DE}
.toggle-card input[type=checkbox]{display:none}
.tc-label{font-size:13px;font-weight:700}
.tc-sub{font-size:10px;color:#888}
.date-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
.dc{font-size:16px;font-weight:700;padding:11px 20px;border-radius:24px;border:1.5px solid #d0cec7;background:#fff;cursor:pointer;font-family:inherit;color:#888}
.dc.on{background:#EAF3DE;border-color:#639922;color:#27500A;font-weight:800}
.info-strip{display:flex;gap:12px;flex-wrap:wrap;padding:.6rem .85rem;background:#f8f7f4;border-radius:8px;border:.5px solid #e5e3de;margin-top:.5rem}
.isl{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.04em}
.isv{font-size:11px;font-weight:600;margin-top:2px}
.form-footer{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.25rem;border-top:.5px solid #e5e3de;gap:8px;flex-wrap:wrap}
.upload-zone{border:1.5px dashed #d0cec7;border-radius:10px;padding:1rem;text-align:center;cursor:pointer;color:#aaa;font-size:12px}
.upload-zone:hover{border-color:#378ADD;background:#E6F1FB}
.notice{font-size:12px;color:#888;padding:.5rem .65rem;background:#f8f7f4;border-radius:8px;border:.5px solid #e5e3de;margin-bottom:.65rem;line-height:1.5}
.notice.warn{background:#FAEEDA;border-color:#BA7517;color:#633806}
.size-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px}
.sopt{border:1.5px solid #e5e3de;border-radius:8px;padding:8px 6px;text-align:center;cursor:pointer;background:#fff}
.sopt.sel{border-color:#378ADD;background:#E6F1FB}
.sopt-name{font-size:12px;font-weight:600}
.sopt-dim{font-size:10px;color:#888}
.hist-item{display:flex;align-items:center;justify-content:space-between;padding:.6rem .75rem;border:.5px solid #e5e3de;border-radius:8px;margin-bottom:5px;background:#fff;cursor:pointer}
.hist-item:hover{border-color:#378ADD;background:#E6F1FB}
</style>
</head>
<body>
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">Elevation Bend</div>
    <div class="auth-sub">Farmers Market — Vendor Management</div>
    <div class="auth-title" id="auth-title">Sign in to your account</div>
    <div class="auth-err" id="auth-err"></div>
    <div class="auth-fg"><label>Email</label><input type="email" id="auth-email" placeholder="you@example.com" autocomplete="email"></div>
    <div class="auth-fg"><label>Password</label><input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password"></div>
    <div class="auth-fg" id="auth-confirm-wrap" style="display:none"><label>Confirm password</label><input type="password" id="auth-confirm"></div>
    <button class="auth-btn" id="auth-btn">Sign in</button>
    <div class="auth-footer"><span id="auth-toggle-text">Don't have an account?</span> <span class="auth-link" id="auth-toggle">Sign up</span></div>
  </div>
</div>
<div id="app-screen">
  <div class="env-bar">
    <div class="env-dot"></div>
    <div style="flex:1"><div class="env-label">Elevation Bend — Live (Supabase)</div><div class="env-user" id="user-email"></div></div>
    <button class="signout-btn" id="signout-btn">Sign out</button>

async function ensureSchema(){
  // Add optional columns if they don't exist — safe to run multiple times
  var sqls=[
    "ALTER TABLE vendors ADD COLUMN IF NOT EXISTS contract_received BOOLEAN DEFAULT false",
    "ALTER TABLE vendors ADD COLUMN IF NOT EXISTS payment_received BOOLEAN DEFAULT false",
    "ALTER TABLE vendors ADD COLUMN IF NOT EXISTS notes TEXT DEFAULT ''",
    "ALTER TABLE vendors ADD COLUMN IF NOT EXISTS booth_fee NUMERIC DEFAULT 0",
    "CREATE TABLE IF NOT EXISTS vendor_groups (id TEXT PRIMARY KEY, name TEXT, member_ids TEXT[] DEFAULT '{}', created_at TIMESTAMPTZ DEFAULT NOW())",
    "ALTER TABLE vendors ADD COLUMN IF NOT EXISTS selected_dates TEXT[] DEFAULT '{}'",
    "ALTER TABLE vendors ADD COLUMN IF NOT EXISTS modified_at TIMESTAMPTZ DEFAULT NOW()",
    "ALTER TABLE invoices ADD COLUMN IF NOT EXISTS payment_method TEXT DEFAULT ''"
  ];
  for(var i=0;i<sqls.length;i++){
    try{await sb.rpc('exec_sql',{sql:sqls[i]});}catch(e){/* rpc may not exist, ignore */}
  }
}
async function loadData(){
  document.getElementById('main-content').innerHTML='<div style="text-align:center;padding:2rem;color:#888">Loading…</div>';

    var{data:td,error:te}=await sb.from('tents').select('*').order('num');
    if(te)throw te;tents=td||[];if(!tents.length)await initTentsDB();
    var{data:gd,error:ge}=await sb.from('vendor_groups').select('*').order('name');
    if(!ge)vendorGroups=(gd||[]);

    (cd||[]).forEach(function(r){calRows[r.date]={approved:r.approved_vendors||[],waitlist:r.waitlist_vendors||[],tent_assignments:r.tent_assignments||{}};});
    syncVendorDatesFromCalendar(); // keep vendor.selectedDates in sync with calendar
  }catch(e){console.error(e);}
  render();
}

  var datesByVendor={};

function sortVendorList(list){
  return list.slice().sort(function(a,b){
    var av,bv;
    if(vSortCol==='name'){av=a.businessName||'';bv=b.businessName||'';}
    else if(vSortCol==='contact'){av=a.contactName||'';bv=b.contactName||'';}
    else if(vSortCol==='category'){av=a.category||'';bv=b.category||'';}
    else if(vSortCol==='vstatus'){av=a.vendorStatus||'';bv=b.vendorStatus||'';}
    else if(vSortCol==='booth'){av=a.boothSize||'';bv=b.boothSize||'';}
    else if(vSortCol==='dates'){av=(a.selectedDates||[]).length;bv=(b.selectedDates||[]).length;return(av-bv)*vSortDir;}
    else if(vSortCol==='sched'){var so={approved:0,waitlist:1,pending:2};av=so[a.status]||2;bv=so[b.status]||2;return(av-bv)*vSortDir;}
    else if(vSortCol==='contract'){av=a.contractReceived?1:0;bv=b.contractReceived?1:0;return(bv-av)*vSortDir;}
    else if(vSortCol==='payment'){av=a.paymentReceived?1:0;bv=b.paymentReceived?1:0;return(bv-av)*vSortDir;}
    else if(vSortCol==='modified'){av=a.modifiedAt||'';bv=b.modifiedAt||'';}
    else if(vSortCol==='created'){av=a.createdAt||'';bv=b.createdAt||'';}
    else{av='';bv='';}
    return av.toString().localeCompare(bv.toString())*vSortDir;
  });
}

async function delV(id){
  if(!confirm('Remove this vendor? A backup will be saved so they can be restored later.'))return;
  var v=vendors.find(function(x){return x.id===id;});
  if(v){
    // Collect all associated data
    var vCalDates=Object.keys(calRows).filter(function(ds){
      var r=calRows[ds];return(r.approved||[]).indexOf(id)>-1||(r.waitlist||[]).indexOf(id)>-1;
    });
    var vInvoices=invoices.filter(function(inv){return inv.vendor_id===id;});
    var vTentAssignments={};
    Object.keys(calRows).forEach(function(ds){
      var ta=calRows[ds].tent_assignments||{};
      Object.keys(ta).forEach(function(sid){if(ta[sid]===id)vTentAssignments[ds]=sid;});
    });
    var archived={
      archivedAt:nowISO(),
      vendor:v,
      calendarDates:vCalDates,
      tentAssignments:vTentAssignments,
      invoices:vInvoices
    };
    var archive=loadArchive();
    // Remove any previous archive entry for same vendor id
    archive=archive.filter(function(a){return a.vendor.id!==id;});
    archive.unshift(archived);
    saveArchive(archive);
  }
  await sb.from('vendors').delete().eq('id',id);
  vendors=vendors.filter(function(v){return v.id!==id;});
  render();
}

function buildPaymentMatrix(showPaid){
  var monthPrefix=cY+'-'+String(cM+1).padStart(2,'0');
  var dates=getMarketDates().filter(function(d){return d.startsWith(monthPrefix);});
  if(!dates.length)return'<div class="empty">No market dates configured yet.</div>';

  // Build lookup: vendor+date -> invoice status
  function getInvStatus(vid,ds){
    var inv=invoices.filter(function(i){return i.vendor_id===vid&&i.dates&&i.dates.indexOf(ds)>-1;})
      .sort(function(a,b){return(b.created_at||'').localeCompare(a.created_at||'');});
    return inv[0]||null;
  }

  var sorted;
  if(showPaid){
    sorted=vendors.filter(function(v){
      return dates.some(function(ds){return getApproved(ds).indexOf(v.id)>-1;});
    }).sort(function(a,b){return(a.businessName||'').localeCompare(b.businessName||'');});
  } else {
    // Outstanding: only vendors with at least one sent/draft (unpaid) invoice
    sorted=vendors.filter(function(v){
      return invoices.some(function(i){return i.vendor_id===v.id&&(i.status==='sent'||i.status==='draft');});
    }).sort(function(a,b){return(a.businessName||'').localeCompare(b.businessName||'');});
  }

  if(!sorted.length)return'<div class="empty">'+(showPaid?'No paid invoices yet.':'No outstanding invoices.')+'</div>';

  var html=
    '<div style="font-size:11px;color:#888;margin-bottom:.5rem">'+
      (showPaid?'✅ Green = paid for that date · click vendor row to open their record':'⚠️ Vendors with sent/draft invoices not yet paid · click row to open vendor form')+
    '</div>'+
    '<div style="overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 220px)">'+
    '<table class="report-table" style="min-width:100%;border-collapse:separate;border-spacing:0">'+
    '<thead><tr>'+
    '<th style="min-width:180px;position:sticky;top:0;left:0;background:#f8f7f4;z-index:4">Vendor</th>'+
    '<th style="min-width:70px;position:sticky;top:0;left:180px;background:#f8f7f4;z-index:4">Booth</th>'+
    dates.map(function(ds){
      var parts=ds.split('-');var m=parseInt(parts[1])-1;var d=parseInt(parts[2]);
      var mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m];
      return'<th style="min-width:54px;text-align:center;font-size:10px;white-space:nowrap;position:sticky;top:0;background:#f8f7f4;z-index:3">'+mn+'<br><strong>'+d+'</strong></th>';
    }).join('')+
    '</tr></thead><tbody>';

  sorted.forEach(function(v){
    var av=avc(v.businessName||'?');
    var rowCells=dates.map(function(ds){
      var inv=getInvStatus(v.id,ds);
      var isScheduled=getApproved(ds).indexOf(v.id)>-1;
      if(showPaid&&!isScheduled)return'<td style="text-align:center;background:#fafafa;color:#ddd;font-size:11px">–</td>';
      var isPaid=inv&&inv.status==='paid';
      var isSent=inv&&inv.status==='sent';
      var isDraft=inv&&inv.status==='draft';

      if(showPaid){
        if(!isScheduled)return'<td style="text-align:center;background:#fafafa;color:#ddd;font-size:11px">–</td>';
        if(isPaid){
          var method=inv.payment_method?'<div style="font-size:8px;color:#27500A;font-weight:700">'+esc(inv.payment_method)+'</div>':'';
          return'<td style="text-align:center;background:#EAF3DE;padding:4px 2px">'+
            '<div style="font-size:13px">✅</div>'+method+'</td>';
        } else {
          return'<td style="text-align:center;background:#f8f7f4;color:#ccc;font-size:11px">·</td>';
        }
      } else {
        // Outstanding: only show dates covered by a sent/draft invoice
        if(!inv||inv.status==='paid') return'<td style="text-align:center;background:#fafafa;color:#ddd;font-size:11px">–</td>';
        if(isSent) return'<td style="text-align:center;background:#FCEBEB;padding:4px 2px"><div style="font-size:10px;font-weight:700;color:#791F1F">📧</div><div style="font-size:8px;color:#791F1F;font-weight:600">Sent</div></td>';
        if(isDraft) return'<td style="text-align:center;background:#FCEBEB;padding:4px 2px"><div style="font-size:10px;font-weight:700;color:#791F1F">📄</div><div style="font-size:8px;color:#791F1F;font-weight:600">Draft</div></td>';
        return'<td style="text-align:center;background:#fafafa;color:#ddd;font-size:11px">–</td>';
      }
    }).join('');

    html+='<tr style="cursor:pointer" data-open-vendor="'+v.id+'">'+
      '<td style="position:sticky;left:0;background:#fff;z-index:1;min-width:180px">'+
        '<div style="display:flex;align-items:center;gap:7px">'+
          '<div style="width:26px;height:26px;border-radius:50%;background:'+av.bg+';color:'+av.text+';display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0">'+ini(v.businessName||'?')+'</div>'+
          '<div style="font-weight:600;font-size:12px">'+esc(v.businessName||'—')+'</div>'+
        '</div>'+
      '</td>'+
      '<td style="position:sticky;left:180px;background:#fff;z-index:1;font-size:11px;color:#888;min-width:70px">'+esc(v.boothSize||'—')+'</td>'+
      rowCells+
    '</tr>';
  });

  html+='</tbody></table></div>';

  setTimeout(function(){
    document.querySelectorAll('[data-open-vendor]').forEach(function(row){
      row.addEventListener('click',function(){openForm(row.dataset.openVendor);});
    });
  },0);

  return html;
}

function wireSchedulingMatrix(){
  var dates=getMarketDates();
  var sorted=vendors.slice().sort(function(a,b){return(a.businessName||'').localeCompare(b.businessName||'');});

  // Scroll buttons
  var scroller=document.getElementById('matrixScroller');
  var scrollL=document.getElementById('matrixScrollLeft');
  var scrollR=document.getElementById('matrixScrollRight');
  if(scrollL&&scroller)scrollL.addEventListener('click',function(){scroller.scrollBy({left:-300,behavior:'smooth'});});
  if(scrollR&&scroller)scrollR.addEventListener('click',function(){scroller.scrollBy({left:300,behavior:'smooth'});});

  // Column sort via event delegation
  var matrixTable=document.querySelector('#matrixScroller table');
  if(matrixTable){matrixTable.addEventListener('click',function(e){var btn=e.target.closest('[data-matrix-sort]');if(!btn)return;var col=btn.dataset.matrixSort;if(matrixSortCol===col)matrixSortDir*=-1;else{matrixSortCol=col;matrixSortDir=1;}renderCalendar();});}

  // Row click opens vendor form
  document.querySelectorAll('[data-open-vendor]').forEach(function(row){
    row.addEventListener('click',function(e){
      if(e.target.closest('[data-set-st],[data-matrix-vendor]'))return;
      openForm(row.dataset.openVendor);
    });
  });

  // Export CSV
  var expBtn=document.getElementById('matrixExportBtn');
  if(expBtn)expBtn.addEventListener('click',function(){
    var rows=[['Business Name','Status','Preferred Months'].concat(dates)];
    sorted.forEach(function(v){
      rows.push([
        v.businessName||'',
        v.status||'pending',
        v.months||''
      ].concat(dates.map(function(ds){
        return(getApproved(ds).indexOf(v.id)>-1||getWaitlist(ds).indexOf(v.id)>-1)?'X':'';
      })));
    });
    downloadCSV('eb-scheduling-matrix-'+today()+'.csv',rows);
  });

  // Status dropdowns
  document.querySelectorAll('[data-set-st]').forEach(function(sel){
    sel.addEventListener('change',function(){
      var v=sel.value;
      sel.style.background=v==='approved'?'#EAF3DE':v==='waitlist'?'#FEF9C3':v==='issue'?'#FCEBEB':'#FDECEA';
      sel.style.color=v==='approved'?'#27500A':v==='waitlist'?'#A16207':v==='issue'?'#791F1F':'#9B3A2E';
      // Update in-memory and Supabase without re-rendering
      var id=sel.dataset.setSt;
      var vendor=vendors.find(function(x){return x.id===id;});
      if(vendor){vendor.status=v;vendor.modifiedAt=nowISO();}
      sb.from('vendors').update({status:v,modified_at:nowISO()}).eq('id',id);
      renderStats();
    });
  });

  // Date checkboxes
  document.querySelectorAll('[data-matrix-vendor]').forEach(function(cb){
    cb.addEventListener('change',async function(){
      var vid=cb.dataset.matrixVendor;
      var ds=cb.dataset.matrixDate;
      var v=vendors.find(function(x){return x.id===vid;});
      if(!v)return;
      if(!calRows[ds])calRows[ds]={date:ds,approved:[],waitlist:[],tent_assignments:{}};
      if(cb.checked){
        if(calRows[ds].approved.indexOf(vid)===-1)calRows[ds].approved.push(vid);
        if(!v.selectedDates)v.selectedDates=[];
        if(v.selectedDates.indexOf(ds)===-1)v.selectedDates.push(ds);
      } else {
        calRows[ds].approved=calRows[ds].approved.filter(function(x){return x!==vid;});
        calRows[ds].waitlist=(calRows[ds].waitlist||[]).filter(function(x){return x!==vid;});
        v.selectedDates=(v.selectedDates||[]).filter(function(x){return x!==ds;});
        if(calRows[ds].tent_assignments){
          Object.keys(calRows[ds].tent_assignments).forEach(function(sid){
            if(calRows[ds].tent_assignments[sid]===vid)delete calRows[ds].tent_assignments[sid];
          });
        }
      }
      cb.closest('td').style.background=cb.checked?'#EAF3DE':'';
      await saveCalRow(ds);
      await sb.from('vendors').update({selected_dates:v.selectedDates,modified_at:nowISO()}).eq('id',vid);
    });
  });
}

function buildDayPanel(ds){
  var appV=getApproved(ds).map(function(id){return vendors.find(function(x){return x.id===id;});}).filter(Boolean);
  var wlV=getWaitlist(ds).map(function(id){return vendors.find(function(x){return x.id===id;});}).filter(Boolean);
  var ta=getTentAssignments(ds);var vendorTent={};
  Object.keys(ta).forEach(function(tid){var t=tents.find(function(x){return x.id===tid;});if(t)vendorTent[ta[tid]]='Spot '+t.num;});
  var total=appV.length+wlV.length;
  var assigned=Object.keys(ta).filter(function(k){return ta[k];}).length;
  var unassigned=appV.length-assigned;

  // Payment buckets — paid = invoice for this date is paid, outstanding = sent/draft invoice only
  var paidV=[],outstandingV=[];
  appV.concat(wlV).forEach(function(v){
    var inv=invoices.filter(function(i){
      return i.vendor_id===v.id&&i.dates&&i.dates.indexOf(ds)>-1;
    }).sort(function(a,b){return(b.created_at||'').localeCompare(a.created_at||'');});
    var latest=inv[0]||null;
    if(latest&&latest.status==='paid') paidV.push({v:v,inv:latest});
    else if(latest&&(latest.status==='sent'||latest.status==='draft')) outstandingV.push({v:v,inv:latest});
  });

  function vcard(v,isWL){
    var cc=catColor(v.category);var wasInactive=v.vendorStatus==='inactive';
    return'<div class="day-vendor-card" data-vid="'+v.id+'" style="'+(wasInactive?'opacity:.8;background:#fafafa':'')+'">'+
      '<div class="dvc-avatar" style="background:'+cc.bg+';color:'+cc.text+';border:1.5px solid '+cc.border+'">'+ini(v.businessName||'?')+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div style="font-size:13px;font-weight:600">'+esc(v.businessName||'Unnamed')+
          (wasInactive?'<span style="font-size:9px;font-weight:500;background:#FCEBEB;color:#791F1F;padding:1px 6px;border-radius:20px;margin-left:6px;vertical-align:middle">Inactive</span>':'')+
        '</div>'+
        '<div style="font-size:11px;color:#888;margin-top:2px">'+esc(v.contactName||'')+(v.phone?' · '+esc(v.phone):'')+'</div>'+
        ((v.electricity||v.boothSize)?'<div style="font-size:10px;color:#888;margin-top:2px">'+
          (v.boothSize?'⛺ '+esc(v.boothSize):'')+(v.boothSize&&v.electricity?' · ':'')+(v.electricity?'<span style="color:#dc2626;font-weight:600">⚡ '+esc(v.electricity)+'</span>':'')+
        '</div>':'')+
        '<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:5px">'+
          (isWL?'<span class="sched-waitlist">Waitlist</span>':'<span class="sched-approved">Approved</span>')+
          vsTag(v.vendorStatus||'active')+catBadge(v.category)+
          (vendorTent[v.id]?'<span class="tag tgr">⛺ '+vendorTent[v.id]+'</span>':'<span style="font-size:10px;color:#aaa;padding:2px 6px">No spot</span>')+
          (v.contractReceived?'<span class="tag tag-contract">📄</span>':'')+
        '</div>'+
      '</div>'+
    '</div>';
  }

  function payCard(item,isPaid){
    var v=item.v,inv=item.inv;
    var cc=catColor(v.category);
    var fee=inv?inv.total||0:feeForBoothSize(v.boothSize||'');
    var badge=isPaid
      ?'<span style="font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;background:#EAF3DE;color:#27500A">✅ Paid'+(inv&&inv.payment_method?' · '+esc(inv.payment_method):'')+'</span>'
      :inv
        ?inv.status==='sent'
          ?'<span style="font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;background:#E8EEFF;color:#3050C8">📧 Sent</span>'
          :'<span style="font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;background:#f0ede6;color:#888">📄 Draft</span>'
        :'<span style="font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;background:#FAEEDA;color:#633806">⚠️ No invoice</span>';
    return'<div class="day-vendor-card" data-vid="'+v.id+'">'+
      '<div class="dvc-avatar" style="background:'+cc.bg+';color:'+cc.text+';border:1.5px solid '+cc.border+'">'+ini(v.businessName||'?')+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div style="font-size:13px;font-weight:600">'+esc(v.businessName||'')+'</div>'+
        '<div style="font-size:10px;color:#888;margin-top:2px">'+esc(v.boothSize||'—')+'</div>'+
        '<div style="margin-top:4px">'+badge+'</div>'+
      '</div>'+
      '<div style="font-size:13px;font-weight:700;color:'+(isPaid?'#27500A':'#a16207')+';flex-shrink:0">'+(fee?'$'+fee.toFixed(2):'—')+'</div>'+
    '</div>';

  else{
    if(appV.length)schedCards+='<div style="padding:.45rem 1rem;font-size:10px;font-weight:700;color:#888;text-transform:uppercase;background:#f8f7f4;border-bottom:.5px solid #e5e3de">Approved ('+appV.length+')</div>'+appV.map(function(v){return vcard(v,false);}).join('');
    if(wlV.length)schedCards+='<div style="padding:.45rem 1rem;font-size:10px;font-weight:700;color:#888;text-transform:uppercase;background:#f8f7f4;border-top:.5px solid #e5e3de">Waitlist ('+wlV.length+')</div>'+wlV.map(function(v){return vcard(v,true);}).join('');
  }

  var totalPaid=paidV.reduce(function(s,x){return s+(x.inv?x.inv.total||0:0);},0);
  var totalOwed=outstandingV.reduce(function(s,x){return s+(x.inv?x.inv.total||0:0);},0);

  var paidCards=paidV.length
    ?'<div style="padding:.45rem 1rem;font-size:10px;font-weight:700;color:#27500A;text-transform:uppercase;background:#EAF3DE;border-bottom:.5px solid #c5e0a8">Paid · $'+totalPaid.toFixed(2)+'</div>'+paidV.map(function(x){return payCard(x,true);}).join('')
    :'<div style="padding:1.25rem;text-align:center;color:#aaa;font-size:12px">No paid vendors yet.</div>';

    ?'<div style="padding:.45rem 1rem;font-size:10px;font-weight:700;color:#a16207;text-transform:uppercase;background:#FAEEDA;border-bottom:.5px solid #f0cfa0">Outstanding · $'+totalOwed.toFixed(2)+'</div>'+outstandingV.map(function(x){return payCard(x,false);}).join('')
    :'<div style="padding:1.25rem;text-align:center;color:#aaa;font-size:12px">No outstanding invoices.</div>';

  var tabBtn='flex:1;padding:7px 4px;font-size:11px;font-weight:700;font-family:inherit;border:none;border-bottom:2px solid transparent;cursor:pointer;background:#f8f7f4;color:#888';
  var tabBtnActive='flex:1;padding:7px 4px;font-size:11px;font-weight:700;font-family:inherit;border:none;border-bottom:2px solid #27500A;cursor:pointer;background:#fff;color:#27500A';

  var panel='<div class="day-report">'+

      '<div>'+
        '<div style="font-size:14px;font-weight:700">📅 '+ds+'</div>'+
        '<div style="font-size:11px;color:#888;margin-top:2px">'+total+' vendor'+(total!==1?'s':'')+' · '+appV.length+' approved · '+wlV.length+' waitlisted</div>'+

// ── ASSIGNMENTS TAB ───────────────────────────────────────────────────────
// Spots come from the Layout tab for the selected date.
// Tents (vendor canopies) get assigned to those spots here.
// Auto-assign uses real XY proximity from the layout for adjacency checks.

function getSpotsForDate(ds){
  // Primary source: layout spots saved for this date (from window.storage)
  // These are the physical spots on the canvas.
  // Returns an array of {id, num, size, x, y, w, h} objects.
  return window._layoutCache&&window._layoutCache[ds]?window._layoutCache[ds]:[];
}

// Load layout spots for date into cache — Supabase first, localStorage fallback
async function ensureLayoutCache(ds){
  if(!ds)return[];
  // Always fetch fresh from Supabase — don't use stale cache
  try{
    var{data,error}=await sb.from('layouts').select('spots').eq('date',ds).single();
    if(!error&&data&&data.spots&&data.spots.length){
      return typeof data.spots==='string'?JSON.parse(data.spots):data.spots;
    }
  }catch(e){}
  // Fallback: use current layoutSpots if same date
  if(ds===layoutDate&&layoutSpots.length)return layoutSpots;
  return [];
}

function clearLayoutCache(ds){if(window._layoutCache&&ds)delete window._layoutCache[ds];}

            :spotDiff>0
              ?'<span style="font-size:11px;padding:3px 10px;border-radius:20px;background:#fef9c3;color:#a16207;font-weight:600">+'+spotDiff+' extra spot'+(spotDiff!==1?'s':'')+' (ok to leave empty)</span>'
              :'<span style="font-size:11px;padding:3px 10px;border-radius:20px;background:#FCEBEB;color:#791F1F;font-weight:600">'+Math.abs(spotDiff)+' more spot'+(Math.abs(spotDiff)!==1?'s':'')+' needed</span>')+
          (assigned>0
            ?'<span style="font-size:11px;padding:3px 10px;border-radius:20px;background:#EAF3DE;color:#27500A">⛺ '+assigned+' assigned</span>'
            :'')+
          (unassigned>0
            ?'<span style="font-size:11px;padding:3px 10px;border-radius:20px;background:#FAEEDA;color:#633806">⚠️ '+unassigned+' unassigned</span>'
            :'')+
        '</div>'+
      '</div>'+
      // Quick actions
      '<div style="display:flex;gap:6px;flex-wrap:wrap">'+
        '<button class="btn-blue" id="lapAutoAssignBtn">⚡ Auto-assign</button>'+
        '<button class="btn-amber" id="lapGoAssignBtn">⛺ Go to Assignments →</button>'+
      '</div>'+
    '</div>';

  // Auto-assign
  document.getElementById('lapAutoAssignBtn').addEventListener('click',function(){
    tentViewDate=ds;autoAssign();
  });

  // Jump to Assignments tab for this date
  document.getElementById('lapGoAssignBtn').addEventListener('click',function(){
    tentViewDate=ds;tab='tents';
    document.querySelectorAll('.nb').forEach(function(x){x.classList.remove('active');});
    document.querySelector('[data-tab="tents"]').classList.add('active');
    render();
  });
}

function renderTents(){
  console.log('renderTents START, tentViewDate:', tentViewDate);
  var el=document.getElementById('main-content');
  var dates=getMarketDates();
  console.log('dates:', dates.length, 'el:', !!el);
  if(!tentViewDate||dates.indexOf(tentViewDate)===-1)tentViewDate=dates.length?dates[0]:'';
  console.log('setting innerHTML for date:', tentViewDate);
  el.innerHTML='<div class="tent-topbar"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'+
    '<span style="font-size:11px;font-weight:600;color:#555">Market date:</span>'+
    (dates.length
      ?'<select id="tentDateSel" style="font-size:16px;font-weight:700;padding:10px 16px;border-radius:8px;border:1.5px solid #d0cec7;background:#fff;font-family:inherit;min-width:200px">'+
        dates.map(function(ds){return'<option value="'+ds+'"'+(ds===tentViewDate?' selected':'')+'>'+ds+'</option>';}).join('')+
       '</select>'
      :'<span style="font-size:12px;color:#aaa;font-style:italic">No market dates yet</span>')+
    '</div>'+
    '<div style="display:flex;gap:6px;flex-wrap:wrap">'+
      '<button class="btn-blue" id="autoAssignBtn">⚡ Auto-assign</button>'+
      '<button class="btn-g" id="sendLayoutFromAssignBtn">📤 Send Layout</button>'+
      '<button class="btn-amber" id="goLayoutFromAssignBtn">🗺 Go to Layout</button>'+
      '<button class="btn-s" id="exportAssignBtn">↓ Export CSV</button>'+
      '<button class="btn-s" id="clearTentDateBtn">Clear assignments</button>'+
    '</div></div>'+
    '<div class="notice" style="margin-bottom:.75rem">'+
      'Spots are defined in the <strong>Layout</strong> tab. Assign vendors to spots here, or use <strong>⚡ Auto-assign</strong> to fill them automatically — adjacent spots will never share the same vendor category.'+
    '</div>'+
    (dates.length&&tentViewDate?'<div id="assignContent">Loading spots…</div>':'<div class="empty">No market dates yet. Go to Calendar and schedule vendors, then define spots in the Layout tab.</div>');

  var sel=document.getElementById('tentDateSel');
  if(sel)sel.addEventListener('change',function(){tentViewDate=this.value;try{renderTents();}catch(e){console.error('renderTents error:',e);}});
  var expBtn=document.getElementById('exportAssignBtn');
  if(expBtn)expBtn.addEventListener('click',async function(){
    var spots=await ensureLayoutCache(tentViewDate);
    var ta=getTentAssignments(tentViewDate);
    var rows=[['Spot #','Size','Vendor','Category','Booth Size','Phone','Email','Contract','Electricity']];
    spots.slice().sort(function(a,b){return(a.num||0)-(b.num||0);}).forEach(function(s){
      var vid=ta[s.id];
      var v=vid?vendors.find(function(x){return x.id===vid;}):null;
      rows.push([
        s.num||'',
        s.size||"10'x10'",
        v?v.businessName||'':'Unassigned',
        v?v.category||'':'',
        v?v.boothSize||'':'',
        v?v.phone||'':'',
        v?v.email||'':'',
        v?(v.contractReceived?'Yes':'No'):'',
        v?v.electricity||'':''
      ]);
    });
    downloadCSV('eb-assignments-'+tentViewDate+'.csv',rows);
  });

  // Go to Layout button
  var glBtn=document.getElementById('goLayoutFromAssignBtn');
  if(glBtn)glBtn.addEventListener('click',function(){
    layoutDate=tentViewDate;tab='layout';
    document.querySelectorAll('.nb').forEach(function(x){x.classList.remove('active');});
    document.querySelector('[data-tab="layout"]').classList.add('active');
    render();
  });

  // Send layout button
  var slBtn=document.getElementById('sendLayoutFromAssignBtn');
  if(slBtn)slBtn.addEventListener('click',function(){if(tentViewDate)sendLayoutToVendors(tentViewDate);});

  // Load sent_at from layouts table and show badge
  (async function(){
    var badge=document.getElementById('layoutSentBadge');
    if(!badge||!tentViewDate)return;
    try{
      var{data}=await sb.from('layouts').select('sent_at,sent_count').eq('date',tentViewDate).maybeSingle();
      if(data&&data.sent_at){
        badge.style.background='#EAF3DE';badge.style.color='#27500A';
        badge.textContent='📤 Layout sent '+fmtDateMDY(data.sent_at)+(data.sent_count>1?' ('+data.sent_count+'x)':'');
      } else {
        badge.style.background='#FDECEA';badge.style.color='#9B3A2E';
        badge.textContent='⚠️ Layout not sent yet';
      }
    }catch(e){badge.style.display='none';}
  })();

  document.getElementById('clearTentDateBtn').addEventListener('click',async function(){
    if(!tentViewDate||!confirm('Clear all vendor assignments for '+tentViewDate+'?'))return;
    if(calRows[tentViewDate])calRows[tentViewDate].tent_assignments={};
    await saveCalRow(tentViewDate);renderTents();
  });

  if(dates.length&&tentViewDate){
    // Always show vendor list first, regardless of whether layout spots exist
    var approvedIds=getApproved(tentViewDate);
    var approvedVendors=approvedIds.map(function(id){return vendors.find(function(x){return x.id===id;});}).filter(Boolean);
    var ac=document.getElementById('assignContent');
    if(!ac)return;

    if(!approvedVendors.length){
      ac.innerHTML='<div class="empty">No vendors scheduled for '+tentViewDate+'. Go to the <strong>Calendar</strong> tab and add vendors to this date first.</div>';
      return;
    }

    // Render vendor list immediately without waiting for layout
    ensureLayoutCache(tentViewDate).then(async function(spots){
      var ac2=document.getElementById('assignContent');
      if(!ac2)return;
      try{
        // Load sent_vendors for this date
        try{
          var{data:layoutData}=await sb.from('layouts').select('sent_vendors').eq('date',tentViewDate).maybeSingle();
          var sv=layoutData&&layoutData.sent_vendors?layoutData.sent_vendors:{};
          approvedVendors.forEach(function(v){v.layoutSentAt=sv[v.id]||null;});
        }catch(e){approvedVendors.forEach(function(v){v.layoutSentAt=null;});}
        ac2.innerHTML=buildAssignContent(spots,approvedVendors);
        var ta=getTentAssignments(tentViewDate); // capture for batch render

        // Event delegation for spot grid
        var grid=document.getElementById('assignGridContainer');
        if(grid){
          grid.addEventListener('click',function(e){
            var a=e.target.closest('[data-assign-spot]');
            if(a){e.stopPropagation();openAssignModal(a.getAttribute('data-assign-spot'),tentViewDate,spots);}
            var u=e.target.closest('[data-unassign-spot]');
            if(u){e.stopPropagation();unassignSpot(u.getAttribute('data-unassign-spot'),tentViewDate);}
          });
        }

        // Spot grid rendered in Layout tab
      }catch(err){
        console.error('buildAssignContent error:',err);
        ac2.innerHTML='<div class="empty" style="color:#791F1F">Error loading assignments: '+esc(err.message||String(err))+'<br><button class="btn-s" style="margin-top:8px" onclick="renderTents()">Retry</button></div>';
      }
      // Event delegation for spot grid
      var grid=document.getElementById('assignGridContainer');
      if(grid){
        grid.addEventListener('click',function(e){
          var a=e.target.closest('[data-assign-spot]');
          if(a){e.stopPropagation();openAssignModal(a.getAttribute('data-assign-spot'),tentViewDate,spots);}
          var u=e.target.closest('[data-unassign-spot]');
          if(u){e.stopPropagation();unassignSpot(u.getAttribute('data-unassign-spot'),tentViewDate);}
        });
      }      // Vendor list assign buttons
      document.querySelectorAll('[data-vendor-assign]').forEach(function(btn){
        btn.addEventListener('click',function(){
          openVendorAssignModal(btn.getAttribute('data-vendor-assign'),tentViewDate,spots);
        });
      });
      // Row click opens vendor form
      document.querySelectorAll('[data-edit-vendor]').forEach(function(row){
        row.addEventListener('click',function(e){
          if(e.target.closest('[data-vendor-assign],[data-send-layout-vendor]'))return;
          openForm(row.getAttribute('data-edit-vendor'));
        });
      });

      // Assignment column sort
      document.querySelectorAll('[data-assign-sort]').forEach(function(th){
        th.addEventListener('click',function(){
          var col=th.dataset.assignSort;
          if(assignSortCol===col)assignSortDir*=-1;else{assignSortCol=col;assignSortDir=1;}
          renderTents();
        });
      });

      // Send layout to individual vendor
      document.querySelectorAll('[data-send-layout-vendor]').forEach(function(btn){
        btn.addEventListener('click',async function(){
          var vid=btn.getAttribute('data-send-layout-vendor');
          btn.disabled=true;btn.textContent='Sending…';
          await sendLayoutToVendor(tentViewDate,[vid]);
          btn.disabled=false;btn.textContent='📤 Send';
        });
      });

      // Send layout to all vendors
      var sendAllBtn=document.getElementById('sendLayoutAllBtn');
      if(sendAllBtn)sendAllBtn.addEventListener('click',async function(){
        var ids=approvedVendors.filter(function(v){return v.email;}).map(function(v){return v.id;});
        if(!ids.length){alert('No vendors with email addresses.');return;}
        sendAllBtn.disabled=true;sendAllBtn.textContent='Sending…';
        await sendLayoutToVendor(tentViewDate,ids);
        sendAllBtn.disabled=false;sendAllBtn.textContent='📤 Send layout to all';
      });
    }).catch(function(err){
      console.error('Assignments load error:',err);
      var ac3=document.getElementById('assignContent');
      if(ac3)ac3.innerHTML='<div class="empty" style="color:#791F1F">Error loading assignments: '+esc(String(err.message||err))+'<br><button class="btn-s" style="margin-top:8px" onclick="renderTents()">Retry</button></div>';
    });
  }
}

var assignSortCol='name',assignSortDir=1;

function buildAssignContent(spots,approvedVendors){
  if(!approvedVendors)approvedVendors=getApproved(tentViewDate).map(function(id){return vendors.find(function(x){return x.id===id;});}).filter(Boolean);
  var ta=getTentAssignments(tentViewDate);
  var occ=spots.filter(function(s){return ta[s.id];}).length;

  function asTh(col,label){
    var active=assignSortCol===col;var dir=active?(assignSortDir===1?'↑':'↓'):'↕';
    return'<th data-assign-sort="'+col+'"><button style="background:none;border:none;font:inherit;cursor:pointer;font-size:12px;font-weight:700;padding:0;display:flex;align-items:center;gap:4px;color:'+(active?'#1a1a1a':'#555')+'">'+label+' <span style="color:'+(active?'#1a1a1a':'#bbb')+'">'+dir+'</span></button></th>';
  }

  // Load sent_vendors from layouts table asynchronously and update UI
  sb.from('layouts').select('sent_vendors').eq('date',tentViewDate).maybeSingle().then(function(res){
    var sv=(res&&res.data&&res.data.sent_vendors)||{};
    approvedVendors.forEach(function(v){if(sv[v.id])v.layoutSentAt=sv[v.id];});
    // Re-render Layout Sent cells
    approvedVendors.forEach(function(v){
      var cell=document.querySelector('[data-layout-sent-vendor="'+v.id+'"]');
      if(cell)cell.innerHTML=v.layoutSentAt
        ?'<span style="font-size:11px;color:#0C447C;font-weight:600">📧 '+fmtDateMDY(v.layoutSentAt)+'</span>'
        :'<span style="font-size:11px;color:#aaa">—</span>';
    });
  }).catch(function(){});

  // Build reverse map: vendorId -> spotNum
  var vendorSpot={};
  Object.keys(ta).forEach(function(sid){
    var vid=ta[sid];if(!vid)return;
    var sp=spots.find(function(s){return s.id===sid;});
    if(sp)vendorSpot[vid]='Spot '+sp.num+(sp.size?' ('+sp.size+')':'');
  });

  // Sort approvedVendors
  approvedVendors=approvedVendors.slice().sort(function(a,b){
    var av,bv;
    if(assignSortCol==='category'){av=a.category||'';bv=b.category||'';}
    else if(assignSortCol==='booth'){av=a.boothSize||'';bv=b.boothSize||'';}
    else if(assignSortCol==='elec'){av=a.electricity||'';bv=b.electricity||'';}
    else if(assignSortCol==='spot'){av=vendorSpot[a.id]||'';bv=vendorSpot[b.id]||'';}
    else if(assignSortCol==='sent'){av=a.layoutSentAt||'';bv=b.layoutSentAt||'';}
    else{av=a.businessName||'';bv=b.businessName||'';}
    return av.localeCompare(bv)*assignSortDir;
  });

  var catLegend='<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:.75rem;padding:.75rem 1rem;background:#fff;border:.5px solid #e5e3de;border-radius:8px">'+
    Object.entries(CAT_COLORS).map(function(e){return'<span style="display:inline-flex;align-items:center;gap:5px;padding:4px 14px;border-radius:20px;background:'+e[1].bg+';color:'+e[1].text+';border:.5px solid '+e[1].border+';font-size:13px;font-weight:600"><span style="width:10px;height:10px;border-radius:50%;background:'+e[1].dot+';display:inline-block;flex-shrink:0"></span>'+esc(e[0])+'</span>';}).join('')+'</div>';

  // ── Vendor list for this date ─────────────────────────────────────────
  var vendorListHTML='';
  if(approvedVendors.length){
    vendorListHTML=
      '<div style="background:#fff;border:.5px solid #e5e3de;border-radius:12px;overflow:hidden;margin-bottom:1rem">'+
        '<div style="padding:.6rem .85rem;display:flex;align-items:center;justify-content:space-between;background:#f8f7f4;border-bottom:.5px solid #e5e3de">'+
          '<span style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.04em">Vendors for '+tentViewDate+' ('+approvedVendors.length+')</span>'+
          '<button class="btn-g" id="sendLayoutAllBtn" style="font-size:11px;padding:4px 12px">📤 Send layout to all</button>'+
        '</div>'+
        '<div style="overflow-x:auto"><table class="report-table">'+
          '<thead><tr>'+asTh('name','Vendor')+asTh('category','Category')+asTh('booth','Booth Size')+asTh('elec','⚡ Elec.')+asTh('spot','Spot Assignment')+asTh('sent','Layout Sent')+'<th>Action</th></tr></thead>'+
          '<tbody>'+
          approvedVendors.map(function(v){
            var cc=catColor(v.category);
            var spotLabel=vendorSpot[v.id]||'';
            var isAssigned=!!spotLabel;
            var layoutSentCell=v.layoutSentAt
              ?'<span style="font-size:11px;color:#0C447C;font-weight:600">📧 '+fmtDateMDY(v.layoutSentAt)+'</span>'
              :'<span style="font-size:11px;color:#aaa">—</span>';
            return'<tr style="cursor:pointer" data-edit-vendor="'+v.id+'">'+
              '<td><div style="display:flex;align-items:center;gap:7px">'+
                '<div style="width:26px;height:26px;border-radius:50%;background:'+cc.bg+';color:'+cc.text+';display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0">'+ini(v.businessName||'?')+'</div>'+
                '<div><div style="font-size:12px;font-weight:600">'+esc(v.businessName||'—')+'</div>'+
                '<div style="font-size:10px;color:#888">'+esc(v.contactName||'')+'</div></div>'+
              '</div></td>'+
              '<td>'+catBadge(v.category)+'</td>'+
              '<td>'+esc(v.boothSize||'—')+'</td>'+
              '<td style="text-align:center">'+(v.electricity==='Yes'?'<span style="color:#A16207;font-weight:700;font-size:13px">⚡</span>':'<span style="color:#ccc">—</span>')+'</td>'+
              '<td>'+(isAssigned
                ?'<span style="background:#EAF3DE;color:#27500A;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600">⛺ '+esc(spotLabel)+'</span>'
                :'<span style="background:#FAEEDA;color:#633806;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600">⚠️ No spot</span>')+
              '</td>'+
              '<td data-layout-sent-vendor="'+v.id+'">'+layoutSentCell+'</td>'+
              '<td>'+
                '<div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center" onclick="event.stopPropagation()">'+
                '<button class="btn-blue" style="padding:5px 10px;font-size:11px;font-weight:600" data-vendor-assign="'+v.id+'">⟷ Swap</button>'+
                (v.email?'<button class="btn-g" style="padding:5px 10px;font-size:11px" data-send-layout-vendor="'+v.id+'">Send Layout</button>':'')+
                '</div>'+
              '</td>'+
            '</tr>';
          }).join('')+
          '</tbody>'+
        '</table></div>'+
      '</div>';
  } else {
    vendorListHTML='<div class="empty" style="margin-bottom:1rem">No vendors scheduled for this date. Go to the Calendar tab and add vendors to this date first.</div>';
  }

  // ── Spot grid ─────────────────────────────────────────────────────────
  var spotGridHTML='';

  return vendorListHTML+spotGridHTML;
}

async function unassignSpot(spotId,ds){
  if(!calRows[ds])return;
  delete calRows[ds].tent_assignments[spotId];
  await saveCalRow(ds);
  refreshLayoutColors(ds);
  if(tab==='tents')renderTents();
  else{renderLayoutAssignPanel(ds);updateLayoutStats();}
}

function openVendorAssignModal(vendorId,ds,spots){
  var ta=getTentAssignments(ds);
  var approvedIds=getApproved(ds);
  var approvedVendors=approvedIds.map(function(id){return vendors.find(function(x){return x.id===id;});}).filter(Boolean).sort(function(a,b){return(a.businessName||'').localeCompare(b.businessName||'');});

  // Build spot label for a vendor
  function vendorSpotLabel(vid){
    var sid=Object.keys(ta).find(function(s){return ta[s]===vid;});
    if(!sid)return'No spot assigned';
    var sp=spots.find(function(s){return s.id===sid;});
    return sp?'Spot '+sp.num:'No spot';
  }

  var vA=vendorId?vendors.find(function(x){return x.id===vendorId;}):null;
  var spotA=vA?vendorSpotLabel(vendorId):'—';
  var ccA=vA?catColor(vA.category):{bg:'#f8f7f4',border:'#d0cec7',text:'#555'};

  document.getElementById('modal-area').innerHTML=
    '<div class="overlay" id="vaModalOverlay"><div class="modal sm" style="max-width:420px">'+
    '<div class="mtitle">⟷ Swap spots</div>'+

    // Vendor A — fixed, already selected
    '<div style="background:'+ccA.bg+';border:1.5px solid '+ccA.border+';border-radius:8px;padding:.75rem 1rem;margin-bottom:1rem">'+
      '<div style="font-size:11px;font-weight:700;color:'+ccA.text+';text-transform:uppercase;margin-bottom:4px">Selected vendor</div>'+
      '<div style="font-size:16px;font-weight:900;font-family:Arial Black,Arial,sans-serif;color:'+ccA.text+'">'+esc(vA?vA.businessName:'—')+'</div>'+
      '<div style="font-size:12px;color:'+ccA.text+';opacity:.8;margin-top:2px">'+esc(spotA)+'</div>'+
    '</div>'+

    '<div style="text-align:center;font-size:24px;color:#888;margin-bottom:.75rem">⟷</div>'+

    // Vendor B — pick who to swap with
    '<div class="fg"><label style="font-size:14px;font-weight:700">Swap with</label>'+
    '<select id="vaVendorB" style="width:100%;border:1.5px solid #d0cec7;border-radius:8px;padding:10px 12px;font-size:14px;font-weight:600;font-family:inherit">'+
      '<option value="">— Select vendor —</option>'+
      approvedVendors.filter(function(v){return v.id!==vendorId;}).map(function(v){
        return'<option value="'+v.id+'">'+esc(v.businessName||'Unnamed')+' — '+vendorSpotLabel(v.id)+'</option>';
      }).join('')+
    '</select></div>'+

    '<div id="vaSwapPreview" style="background:#EAF3DE;border:.5px solid #639922;border-radius:8px;padding:.65rem 1rem;font-size:13px;font-weight:700;color:#27500A;display:none;margin-top:.5rem;text-align:center"></div>'+

    '<div class="mfoot" id="vaFoot"></div>'+
    '</div></div>';

  document.getElementById('vaModalOverlay').addEventListener('click',function(e){if(e.target===this)closeMod();});

  document.getElementById('vaVendorB').addEventListener('change',function(){
    var vidB=this.value;
    var vB=vidB?vendors.find(function(x){return x.id===vidB;}):null;
    var preview=document.getElementById('vaSwapPreview');
    if(vB){
      preview.style.display='';
      preview.textContent=esc(vA?vA.businessName:'?')+' ('+spotA+') ⟷ '+esc(vB.businessName)+' ('+vendorSpotLabel(vidB)+')';
    } else {
      preview.style.display='none';
    }
  });

  var foot=document.getElementById('vaFoot');
  var canBtn=document.createElement('button');canBtn.className='btn-s';canBtn.textContent='Cancel';canBtn.addEventListener('click',closeMod);
  var swapBtn=document.createElement('button');swapBtn.className='btn-p';swapBtn.textContent='⟷ Swap';
  swapBtn.addEventListener('click',async function(){
    var vidB=document.getElementById('vaVendorB').value;
    if(!vidB){alert('Please select a vendor to swap with.');return;}

    if(!calRows[ds])calRows[ds]={approved:getApproved(ds),waitlist:[],tent_assignments:{}};
    var ta2=calRows[ds].tent_assignments;

    var spotIdA=Object.keys(ta2).find(function(s){return ta2[s]===vendorId;})||null;
    var spotIdB=Object.keys(ta2).find(function(s){return ta2[s]===vidB;})||null;

    if(spotIdA)ta2[spotIdA]=vidB; else if(spotIdB)delete ta2[spotIdB];
    if(spotIdB)ta2[spotIdB]=vendorId; else if(spotIdA)delete ta2[spotIdA];

    await saveCalRow(ds);
    refreshLayoutColors(ds);
    clearLayoutCache(ds);
    closeMod();
    if(tab==='tents')renderTents();
    else{renderLayoutAssignPanel(ds);updateLayoutStats();}
  });
  foot.appendChild(canBtn);foot.appendChild(swapBtn);
}

function openAssignModal(spotId,ds,spots){
  var spot=spots.find(function(s){return s.id===spotId;});if(!spot)return;
  var ta=getTentAssignments(ds);var currentVid=ta[spotId]||'';
  var avail=getApproved(ds).map(function(id){return vendors.find(function(x){return x.id===id;});}).filter(Boolean);
  if(!avail.length)avail=eligibleVendors();

// ── AUTO-ASSIGN — uses real XY proximity from layout for adjacency ────────
// Rules:
//   1. Returning vendors get the same spot they had most recently (last 5 dates)
//   2. No two adjacent spots (within 40px on canvas) get the same vendor category
//   3. Remaining vendors fill available spots respecting adjacency rule
async function autoAssign(){
  if(!tentViewDate){alert('Select a market date first.');return;}
  var v4d=getApproved(tentViewDate).map(function(id){return vendors.find(function(x){return x.id===id;});}).filter(Boolean);
  if(!v4d.length){alert('No approved vendors for this date.\nSchedule them in Calendar first.');return;}

  // Load layout spots for this date
  var layoutSpotList=await ensureLayoutCache(tentViewDate);
  if(!layoutSpotList.length){
    // Try to find most recent previous layout and copy it
    var prevDates=getMarketDates().filter(function(d){return d<tentViewDate;}).sort().reverse();
    var copied=false;
    for(var pi=0;pi<prevDates.length;pi++){
      var{data:prevLayout}=await sb.from('layouts').select('spots').eq('date',prevDates[pi]).maybeSingle();
      if(prevLayout&&prevLayout.spots&&prevLayout.spots.length){
        var srcSpots=typeof prevLayout.spots==='string'?JSON.parse(prevLayout.spots):prevLayout.spots;
        await sb.from('layouts').upsert({date:tentViewDate,spots:JSON.stringify(srcSpots),modified_at:nowISO()});
        layoutSpotList=srcSpots;
        copied=true;
        break;
      }
    }
    if(!copied){alert('No spots defined for this date and no previous layout found.\nGo to the Layout tab and define spots first.');return;}
  }

  // If there are fewer spots than vendors, auto-generate additional 10x10 spots in a grid
  var needed=v4d.length-layoutSpotList.length;
  if(needed>0){
    var sw=LSIZES['10x10'].w,sh=LSIZES['10x10'].h,gap=10;
    var cols=Math.ceil(Math.sqrt(v4d.length));
    var maxY=layoutSpotList.reduce(function(m,s){return Math.max(m,s.y+(s.h||sh));},0);
    if(maxY>0)maxY+=gap*2;
    var startNum=layoutSpotList.reduce(function(m,s){return Math.max(m,s.num||0);},0)+1;
    for(var ni=0;ni<needed;ni++){
      var col=ni%cols,row=Math.floor(ni/cols);
      layoutSpotList.push({
        id:uid(),num:startNum+ni,size:'10x10',
        x:col*(sw+gap),y:maxY+row*(sh+gap),
        w:sw,h:sh,vendorId:'',vendorName:'',vendorCat:'',vendorInactive:false
      });
    }
    await sb.from('layouts').upsert({date:tentViewDate,spots:JSON.stringify(layoutSpotList),modified_at:nowISO()});
    clearLayoutCache(tentViewDate);
  }

  // Build adjacency map using real XY positions
  var ADJACENT_THRESHOLD=120; // spots within 120px gap are considered adjacent
  function spotsAdjacent(a,b){
    var ax1=a.x,ax2=a.x+(a.w||80),ay1=a.y,ay2=a.y+(a.h||60);
    var bx1=b.x,bx2=b.x+(b.w||80),by1=b.y,by2=b.y+(b.h||60);
    // Gap between the two bounding boxes (negative means overlapping)
    var gapX=Math.max(0,Math.max(ax1,bx1)-Math.min(ax2,bx2));
    var gapY=Math.max(0,Math.max(ay1,by1)-Math.min(ay2,by2));
    // Adjacent if close horizontally AND in same horizontal band, OR close vertically AND in same vertical band
    return(gapX<=ADJACENT_THRESHOLD&&gapY<=ADJACENT_THRESHOLD);
  }
  var adjacency={};
  layoutSpotList.forEach(function(s){adjacency[s.id]=[];});
  for(var i=0;i<layoutSpotList.length;i++){
    for(var j=i+1;j<layoutSpotList.length;j++){
      var a=layoutSpotList[i],b=layoutSpotList[j];
      if(spotsAdjacent(a,b)){adjacency[a.id].push(b.id);adjacency[b.id].push(a.id);}
    }
  }

  // Load previous spot history from Supabase — up to last 5 market dates
  // This gives "returning vendor gets same spot" across devices
  var lastSpot={};
  try{
    var prevDates=getMarketDates().filter(function(d){return d<tentViewDate;}).sort().slice(-5).reverse();
    // Load layouts for previous dates from Supabase
    if(prevDates.length){
      var{data:prevLayouts}=await sb.from('layouts').select('date,spots').in('date',prevDates);
      // Build vendorId -> spotId map from most recent to oldest (from layout spots with vendorId set)
      (prevLayouts||[]).sort(function(a,b){return b.date.localeCompare(a.date);}).forEach(function(layout){
        (layout.spots||[]).forEach(function(sp){
          if(sp.vendorId&&!lastSpot[sp.vendorId])lastSpot[sp.vendorId]=sp.id;
        });
      });
    }
    // Check in-memory calRows tent_assignments as primary source (most reliable)
    // Check ALL previous dates, most recent first
    prevDates.forEach(function(d){
      var ta=getTentAssignments(d);
      Object.keys(ta).forEach(function(sid){
        var vid=ta[sid];
        if(vid&&!lastSpot[vid])lastSpot[vid]=sid;
      });
    });
    // Also check ALL market dates (not just last 5) for tent_assignments
    getMarketDates().filter(function(d){return d!==tentViewDate;}).sort().reverse().forEach(function(d){
      var ta=getTentAssignments(d);
      Object.keys(ta).forEach(function(sid){
        var vid=ta[sid];
        if(vid&&!lastSpot[vid])lastSpot[vid]=sid;
      });
    });
  }catch(e){console.warn('Could not load previous layouts:',e);}

  var spots=layoutSpotList.slice();
  var assignment={};

  // First pass: assign returning vendors to their preferred (last used) spot
  var assigned=[];
  v4d.forEach(function(v){
    var p=lastSpot[v.id];
    if(p&&spots.find(function(s){return s.id===p;})&&!assignment[p]){
      assignment[p]=v.id;assigned.push(v.id);
    }
  });

  // Second pass: place remaining vendors, avoiding same-category adjacency
  var unasgn=v4d.filter(function(v){return assigned.indexOf(v.id)===-1;});
  var sorted=spots.slice().sort(function(a,b){return a.num-b.num;});

  unasgn.forEach(function(v){
    var placed=false;
    // Try each spot; skip if it causes adjacency conflict
    for(var i=0;i<sorted.length;i++){
      var s=sorted[i];
      if(assignment[s.id])continue;
      var conflict=false;
      (adjacency[s.id]||[]).forEach(function(nid){
        if(assignment[nid]){
          var nv=vendors.find(function(x){return x.id===assignment[nid];});
          if(nv&&nv.category&&nv.category===v.category)conflict=true;
        }
      });
      if(!conflict){assignment[s.id]=v.id;placed=true;break;}
    }
    // If no conflict-free spot found, place anywhere available
    if(!placed){
      for(var i=0;i<sorted.length;i++){
        if(!assignment[sorted[i].id]){assignment[sorted[i].id]=v.id;break;}
      }
    }
  });

  // Save assignments to calRows and Supabase
  if(!calRows[tentViewDate])calRows[tentViewDate]={approved:[],waitlist:[],tent_assignments:{}};
  // Make sure approved list is populated
  v4d.forEach(function(v){if(calRows[tentViewDate].approved.indexOf(v.id)===-1)calRows[tentViewDate].approved.push(v.id);});
  calRows[tentViewDate].tent_assignments=assignment;
  await saveCalRow(tentViewDate);

  // Also write vendor assignments back into layouts.spots so the Layout tab
  // always renders the correct vendors regardless of session state.
  try{
    var updatedSpots=layoutSpotList.map(function(sp){
      var vid=assignment[sp.id]||'';
      var v=vid?vendors.find(function(x){return x.id===vid;}):null;
      return Object.assign({},sp,{
        vendorId:vid,
        vendorName:v?v.businessName:'',
        vendorCat:v?v.category:'',
        vendorInactive:v&&v.vendorStatus==='inactive'
      });
    });
    await sb.from('layouts').upsert({date:tentViewDate,spots:updatedSpots,modified_at:nowISO()});
    // Sync in-memory layoutSpots if Layout tab is on same date
    if(layoutDate===tentViewDate){
      updatedSpots.forEach(function(sp){
        var lsp=layoutSpots.find(function(s){return s.id===sp.id;});
        if(lsp){lsp.vendorId=sp.vendorId;lsp.vendorName=sp.vendorName;lsp.vendorCat=sp.vendorCat;lsp.vendorInactive=sp.vendorInactive;}
      });
    }
  }catch(e){console.warn('Could not write assignments back to layouts.spots:',e);}

  // Sync layoutDate so the Layout tab opens on the same date
  layoutDate=tentViewDate;

  refreshLayoutColors(tentViewDate);
  clearLayoutCache(tentViewDate);
  // Refresh whichever is visible
  if(tab==='tents')renderTents();
  else{renderLayoutAssignPanel(tentViewDate);updateLayoutStats();}
  var count=Object.values(assignment).filter(Boolean).length;
  var returning=v4d.filter(function(v){return lastSpot[v.id]&&assignment[lastSpot[v.id]]===v.id;}).length;
  alert('✅ Auto-assigned '+count+' vendor'+(count!==1?'s':'')+' for '+tentViewDate+'.\n\n'+
    (returning?'↩ '+returning+' vendor'+(returning!==1?'s':'')+' returned to their usual spot.\n':'')+
    '✓ Adjacent spots with the same category were avoided.'
  );
}

// ── DOCUMENT STORAGE ──────────────────────────────────────────────────────
// Documents are stored in Supabase Storage bucket "vendor-docs"
// Each file is saved as: vendor-docs/{vendorId}/{timestamp}-{filename}
// The list is stored in the vendor's `documents` JSON column

function docRow(doc){
  var ext=(doc.name||'').split('.').pop().toLowerCase();
  var icon=ext==='pdf'?'📄':['jpg','jpeg','png','gif'].includes(ext)?'🖼️':ext==='docx'||ext==='doc'?'📝':'📎';
  return'<div style="display:flex;align-items:center;gap:10px;padding:.6rem .85rem;background:#f8f7f4;border:.5px solid #e5e3de;border-radius:8px">'+
    '<span style="font-size:18px;flex-shrink:0">'+icon+'</span>'+
    '<div style="flex:1;min-width:0">'+
      '<div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(doc.name||'File')+'</div>'+
      '<div style="font-size:10px;color:#aaa">'+esc(doc.uploadedAt?fmtDate(doc.uploadedAt):'')+(doc.size?' · '+(doc.size/1024).toFixed(0)+' KB':'')+'</div>'+
    '</div>'+
    '<div style="display:flex;gap:4px">'+
      '<a href="'+esc(doc.url||'#')+'" target="_blank" class="btn-blue" style="padding:3px 8px;font-size:11px;text-decoration:none">↗ Open</a>'+
      '<button class="btn-danger" style="padding:3px 8px;font-size:11px" data-del-doc="'+esc(doc.path||'')+'">✕</button>'+
    '</div>'+
  '</div>';
}

async function loadVendorDocs(vendorId){
  var docList=document.getElementById('docList');if(!docList)return;
  // Load from Supabase storage bucket listing
  try{
    var{data,error}=await sb.storage.from('vendor-docs').list(vendorId,{sortBy:{column:'created_at',order:'desc'}});
    if(error||!data||!data.length){
      docList.innerHTML='<div style="font-size:12px;color:#aaa;text-align:center;padding:1rem">No documents uploaded yet.</div>';
      return;
    }
    var rows=await Promise.all(data.map(async function(file){
      var{data:urlData}=sb.storage.from('vendor-docs').getPublicUrl(vendorId+'/'+file.name);
      return docRow({name:file.name,url:urlData.publicUrl,path:vendorId+'/'+file.name,size:file.metadata&&file.metadata.size,uploadedAt:file.created_at});
    }));
    docList.innerHTML=rows.join('');
    // Delete handlers
    docList.querySelectorAll('[data-del-doc]').forEach(function(btn){
      btn.addEventListener('click',async function(){
        if(!confirm('Delete this document?'))return;
        var path=btn.dataset.delDoc;
        await sb.storage.from('vendor-docs').remove([path]);
        loadVendorDocs(vendorId);
      });
    });
  }catch(e){
    docList.innerHTML='<div style="font-size:12px;color:#aaa;padding:1rem">Could not load documents. Make sure the "vendor-docs" storage bucket exists in Supabase.</div>';
  }
}

function attachDocUploadHandlers(vendorId){
  if(!vendorId)return;
  var pickBtn=document.getElementById('docPickBtn');
  var fileInp=document.getElementById('docFileInput');
  var dropZone=document.getElementById('docDropZone');
  var statusEl=document.getElementById('docUploadStatus');

  async function uploadFiles(files){
    if(!files||!files.length)return;
    var total=files.length,done=0,failed=0;
    statusEl.innerHTML='<span style="color:#a16207">⏳ Uploading '+total+' file'+(total!==1?'s':'')+'…</span>';
    for(var i=0;i<files.length;i++){
      var file=files[i];
      if(file.size>5*1024*1024){alert(file.name+' is over 5MB and was skipped.');failed++;continue;}
      var path=vendorId+'/'+Date.now()+'-'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
      var{error}=await sb.storage.from('vendor-docs').upload(path,file,{upsert:false});
      if(error){console.error('Upload error:',error);failed++;}else done++;
    }
    statusEl.innerHTML=done>0
      ?'<span style="color:#27500A">✅ Uploaded '+done+' file'+(done!==1?'s':'')+(failed?' ('+failed+' failed)':'')+'</span>'
      :'<span style="color:#791F1F">Upload failed — check that the "vendor-docs" bucket exists in Supabase Storage.</span>';
    loadVendorDocs(vendorId);
    setTimeout(function(){statusEl.innerHTML='';},4000);
  }

  if(pickBtn&&fileInp){
    pickBtn.addEventListener('click',function(){fileInp.click();});
    fileInp.addEventListener('change',function(e){if(e.target.files.length)uploadFiles(Array.from(e.target.files));});
  }
  if(dropZone){
    dropZone.addEventListener('dragover',function(e){e.preventDefault();dropZone.style.borderColor='#378ADD';dropZone.style.background='#E6F1FB';});
    dropZone.addEventListener('dragleave',function(){dropZone.style.borderColor='#d0cec7';dropZone.style.background='#fafafa';});
    dropZone.addEventListener('drop',function(e){e.preventDefault();dropZone.style.borderColor='#d0cec7';dropZone.style.background='#fafafa';var f=e.dataTransfer&&e.dataTransfer.files;if(f&&f.length)uploadFiles(Array.from(f));});
  }

  // Load existing docs
  loadVendorDocs(vendorId);
}

// Generates a printable market map showing spot numbers, vendor names, and category colors.
// Opens in a new window so it can be printed or saved as PDF.
async function generateLayoutPDF(ds,recipientIds){
  var spots=await ensureLayoutCache(ds);
  var ta=getTentAssignments(ds);
  var approvedVendors=getApproved(ds).map(function(id){return vendors.find(function(x){return x.id===id;});}).filter(Boolean);

  // Build spot map
  var vendorBySpot={};
  spots.forEach(function(s){
    var vid=ta[s.id];
    var v=vid?vendors.find(function(x){return x.id===vid;}):null;
    vendorBySpot[s.id]={spot:s,vendor:v};
  });

  // If recipientIds given, email a copy to each (opens mail app)
  if(recipientIds&&recipientIds.length){
    var assigned=Object.keys(ta).filter(function(sid){return ta[sid];}).length;
    var body='Hi,\n\nPlease find below your spot assignment for the Elevation Bend Farmers Market on '+ds+'.\n\n';
    recipientIds.forEach(function(vid){
      var v=vendors.find(function(x){return x.id===vid;});
      if(!v)return;
      var spotId=Object.keys(ta).find(function(sid){return ta[sid]===vid;});
      var spot=spotId?spots.find(function(s){return s.id===spotId;}):null;
      body+=(v.businessName||'Vendor')+': '+(spot?'Spot '+spot.num:'No spot assigned')+'\n';
    });
    body+='\nSetup begins at 6:30am. Please be fully set up by 7:45am.\n\nSee you at the market!\nElevation Bend Farmers Market';
    var emails=recipientIds.map(function(vid){var v=vendors.find(function(x){return x.id===vid;});return v&&v.email?v.email:'';}).filter(Boolean).join(',');
    sendEmail(emails,'Your market spot for '+ds+' — Elevation Bend',body);
  }

  // Generate visual layout PDF
  var win=window.open('','_blank','width=900,height=700,scrollbars=yes');
  var today2=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

  // Build the spot grid HTML
  var maxX=Math.max.apply(null,spots.map(function(s){return s.x+(s.w||80);}))||800;
  var maxY=Math.max.apply(null,spots.map(function(s){return s.y+(s.h||80);}))||600;
  var scale=Math.min(1400/maxX,1000/maxY,2);

  var spotDivs=spots.map(function(s){
    var vid=ta[s.id];var v=vid?vendors.find(function(x){return x.id===vid;}):null;
    var cc=v?catColor(v.category):{bg:'#f8f7f4',border:'#d0cec7',text:'#888'};
