// ── Historical status snapshot ─────────────────────────────────────────────
// When a vendor is scheduled on a date, we snapshot their status at that time.
// Key: 'eb_snap_VENDORID_DATE' => 'active'|'inwork'|'inactive'
// This lets calendar/layout show "was active on this date" even if now inactive.
async function snapshotVendorStatus(vendorId,ds,status){
  try{await window.storage.set('eb_snap_'+vendorId+'_'+ds,status);}catch(e){}
}
async function getVendorSnap(vendorId,ds){
  try{var r=await window.storage.get('eb_snap_'+vendorId+'_'+ds);return r&&r.value?r.value:null;}catch(e){return null;}
}

function avc(n){var h=0;for(var i=0;i<(n||'').length;i++)h=(h*31+n.charCodeAt(i))%6;return{bg:AVC[Math.abs(h)],text:AVT[Math.abs(h)]};}
function ini(n){return String(n||'?').split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);}
function vsTag(vs){var c=VSC[vs||'active']||VSC.active;return'<span class="tag '+c.tagCls+'"><span class="vs-dot" style="background:'+c.dot+'"></span>'+c.label+'</span>';}
function schedTag(s){if(s==='approved')return'<span class="sched-approved">Approved</span>';if(s==='waitlist')return'<span class="sched-waitlist">Waitlist</span>';return'<span class="sched-pending">Pending</span>';}
function uid(){return'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function csvCell(v){return'"'+String(v||'').replace(/"/g,'""')+'"';}
function nowISO(){return new Date().toISOString();}
function fmtDate(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fmtDT(iso){if(!iso)return'—';var d=new Date(iso);return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
function today(){return new Date().toISOString().slice(0,10);}
function closeMod(){document.getElementById('modal-area').innerHTML='';}
function getMarketDates(){return Object.keys(calRows).sort();}
function getApproved(ds){return(calRows[ds]&&calRows[ds].approved)||[];}
function getWaitlist(ds){return(calRows[ds]&&calRows[ds].waitlist)||[];}
function getTentAssignments(ds){return(calRows[ds]&&calRows[ds].tent_assignments)||{};}
function eligibleVendors(){return vendors.filter(function(v){return v.status==='approved'&&(v.vendorStatus||'active')==='active';}).sort(function(a,b){return(a.businessName||'').localeCompare(b.businessName||'');});}
function lKey(ds){return'eb_layout_'+ds;}
function lDatesKey(){return'eb_layout_dates';}
function snapV(v){return layoutSnapOn?Math.round(v/20)*20:v;}
function getR(name){var el=document.querySelector('input[name="'+name+'"]:checked');return el?el.value:'';}

var authMode='signin';
document.getElementById('auth-toggle').addEventListener('click',function(){
  authMode=authMode==='signin'?'signup':'signin';
  document.getElementById('auth-title').textContent=authMode==='signin'?'Sign in to your account':'Create your account';
  document.getElementById('auth-btn').textContent=authMode==='signin'?'Sign in':'Sign up';
  document.getElementById('auth-toggle-text').textContent=authMode==='signin'?"Don't have an account?":'Already have an account?';
  document.getElementById('auth-toggle').textContent=authMode==='signin'?'Sign up':'Sign in';
  document.getElementById('auth-confirm-wrap').style.display=authMode==='signup'?'':'none';
  document.getElementById('auth-err').style.display='none';
});
document.getElementById('auth-email').addEventListener('keydown',function(e){if(e.key==='Enter')doAuth();});
document.getElementById('auth-password').addEventListener('keydown',function(e){if(e.key==='Enter')doAuth();});
document.getElementById('auth-btn').addEventListener('click',doAuth);
async function doAuth(){
  var email=document.getElementById('auth-email').value.trim(),password=document.getElementById('auth-password').value,confirm=document.getElementById('auth-confirm').value;
  var btn=document.getElementById('auth-btn');
  if(!email||!password){showAuthErr('Please enter email and password.');return;}
  if(authMode==='signup'&&password!==confirm){showAuthErr('Passwords do not match.');return;}
  btn.disabled=true;btn.textContent=authMode==='signin'?'Signing in…':'Creating account…';
  document.getElementById('auth-err').style.display='none';
  var result=authMode==='signin'?await sb.auth.signInWithPassword({email,password}):await sb.auth.signUp({email,password});
  if(result.error){showAuthErr(result.error.message);btn.disabled=false;btn.textContent=authMode==='signin'?'Sign in':'Sign up';}
  else if(authMode==='signup'&&!result.data.session){showAuthErr('✅ Check your email to confirm, then sign in.');btn.disabled=false;btn.textContent='Sign in';authMode='signin';}
  else{currentUser=result.data.user;enterApp();}
}
function showAuthErr(m){var e=document.getElementById('auth-err');e.textContent=m;e.style.display='block';}
document.getElementById('signout-btn').addEventListener('click',async function(){
  await sb.auth.signOut();currentUser=null;vendors=[];tents=[];calRows={};
  document.getElementById('app-screen').style.display='none';document.getElementById('auth-screen').style.display='flex';
  document.getElementById('auth-email').value='';document.getElementById('auth-password').value='';
});
async function checkSession(){var{data}=await sb.auth.getSession();if(data.session){currentUser=data.session.user;enterApp();}}
function enterApp(){document.getElementById('auth-screen').style.display='none';document.getElementById('app-screen').style.display='block';document.getElementById('user-email').textContent=currentUser.email;loadData();}

// ── DATA ──────────────────────────────────────────────────────────────────
async function loadData(){
  document.getElementById('main-content').innerHTML='<div style="text-align:center;padding:2rem;color:#888">Loading…</div>';
  try{
    var{data:vd,error:ve}=await sb.from('vendors').select('*').order('created_at',{ascending:false});
    if(ve)throw ve;vendors=(vd||[]).map(dbToV);
    var{data:td,error:te}=await sb.from('tents').select('*').order('num');
    if(te)throw te;tents=td||[];if(!tents.length)await initTentsDB();
    var{data:cd,error:ce}=await sb.from('calendar').select('*');
    if(ce)throw ce;calRows={};
    (cd||[]).forEach(function(r){calRows[r.date]={approved:r.approved_vendors||[],waitlist:r.waitlist_vendors||[],tent_assignments:r.tent_assignments||{}};});
  }catch(e){console.error(e);}
  render();
}
function dbToV(r){return{id:r.id,vendorStatus:r.vendor_status||'active',status:r.status||'pending',businessName:r.business_name||'',contactName:r.contact_name||'',email:r.email||'',phone:r.phone||'',website:r.website||'',social:r.social||'',category:r.category||'',categoryComment:r.category_comment||'',products:r.products||'',productDesc:r.product_desc||'',local:r.local_produced||'',localComment:r.local_comment||'',priceRange:r.price_range||[],licenses:r.licenses||'',licensesComment:r.licenses_comment||'',foodDocs:r.food_docs||[],liability:r.liability||'',boothSize:r.booth_size||'',ownSetup:r.own_setup||'',ownSetupComment:r.setup_comment||'',electricity:r.electricity||'',attendance:r.attendance||'',months:r.months||'',whyJoin:r.why_join||'',values:r.values||'',additionalInfo:r.additional_info||'',notes:r.notes||'',photos:r.photos||[],selectedDates:r.selected_dates||[],contractReceived:!!r.contract_received,paymentReceived:!!r.payment_received,createdAt:r.created_at||'',modifiedAt:r.modified_at||r.created_at||''};}
async function saveVendorDB(data,id){
  var row={id:id||uid(),vendor_status:data.vendorStatus||'active',status:data.status||'pending',business_name:data.businessName||'',contact_name:data.contactName||'',email:data.email||'',phone:data.phone||'',website:data.website||'',social:data.social||'',category:data.category||'',category_comment:data.categoryComment||'',products:data.products||'',product_desc:data.productDesc||'',local_produced:data.local||'',local_comment:data.localComment||'',price_range:data.priceRange||[],licenses:data.licenses||'',licenses_comment:data.licensesComment||'',food_docs:data.foodDocs||[],liability:data.liability||'',booth_size:data.boothSize||'',own_setup:data.ownSetup||'',setup_comment:data.ownSetupComment||'',electricity:data.electricity||'',attendance:data.attendance||'',months:data.months||'',why_join:data.whyJoin||'',values:data.values||'',additional_info:data.additionalInfo||'',notes:data.notes||'',photos:[],selected_dates:data.selectedDates||[],contract_received:!!data.contractReceived,payment_received:!!data.paymentReceived,modified_at:nowISO()};
  if(!id)row.created_at=nowISO();
  var{error}=await sb.from('vendors').upsert(row);
  if(error){alert('Error saving vendor: '+error.message);return null;}
  return row.id;
}
async function saveCalRow(ds){
  var row=calRows[ds];
  if(!row||(!row.approved.length&&!row.waitlist.length&&!Object.keys(row.tent_assignments||{}).length)){await sb.from('calendar').delete().eq('date',ds);delete calRows[ds];}
  else{await sb.from('calendar').upsert({date:ds,approved_vendors:row.approved||[],waitlist_vendors:row.waitlist||[],tent_assignments:row.tent_assignments||{}});}
}
async function initTentsDB(){
  var rows=[];for(var i=1;i<=6;i++)rows.push({id:'t'+i,num:i,size:"10'x10'"});
  rows.push({id:'t7',num:7,size:"20'x20'"},{id:'t8',num:8,size:"20'x20'"},{id:'t9',num:9,size:'Food truck'});
  await sb.from('tents').upsert(rows);tents=rows;
}

function setVsFilter(f){vsFilter=f;render();}

// ── VENDORS ───────────────────────────────────────────────────────────────
function renderVendors(){
  var el=document.getElementById('main-content');
  var allV=vendors.filter(function(v){return vsFilter==='all'||(v.vendorStatus||'active')===vsFilter;});
  if(!allV.length){el.innerHTML='<div class="empty">'+(vendors.length?'No vendors match this filter.':'No vendors yet. Click + New to add one.')+'</div>';return;}
  var html='';
  [['approved','Approved'],['pending','Pending'],['waitlist','Waitlist']].forEach(function(g){
    var list=allV.filter(function(v){return(v.status||'pending')===g[0];});
    if(!list.length)return;
    html+='<div class="glabel">'+g[1]+' ('+list.length+')</div>';
    list.forEach(function(v){
      var vs=v.vendorStatus||'active',calEligible=v.status==='approved'&&vs==='active';
      var sch=(v.selectedDates&&v.selectedDates.length)?'<span class="tag tb">'+v.selectedDates.length+'d</span>':'';
      html+='<div class="vrow vstatus-'+vs+'"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px"><div><div class="vname">'+esc(v.businessName||'Unnamed')+'</div><div class="vmeta">'+esc(v.contactName||'')+'</div><div class="vdates">Created: '+fmtDate(v.createdAt)+' · Modified: '+fmtDT(v.modifiedAt)+'</div></div>'+vsTag(vs)+'</div>'+
        (v.notes?'<div style="font-size:11px;color:#888;margin-top:4px;padding:5px 8px;background:#f8f7f4;border-radius:6px;border-left:2px solid #d0cec7">'+esc(v.notes)+'</div>':'')+
        '<div class="vtags" style="margin-top:5px">'+schedTag(v.status)+catBadge(v.category)+'<span class="tag tb">'+esc(v.boothSize||'—')+'</span>'+sch+(calEligible?'<span class="tag tg">📅 Eligible</span>':'')+(v.contractReceived?'<span class="tag tag-contract">📄</span>':'')+(v.paymentReceived?'<span class="tag tag-payment">💰</span>':'')+'</div>'+
        '<div class="vactions"><select onchange="setSt(\''+v.id+'\',this.value)"><option value="pending"'+(!v.status||v.status==='pending'?' selected':'')+'>Pending</option><option value="approved"'+(v.status==='approved'?' selected':'')+'>Approved</option><option value="waitlist"'+(v.status==='waitlist'?' selected':'')+'>Waitlist</option></select>'+
        '<select onchange="setVs(\''+v.id+'\',this.value)"><option value="active"'+(vs==='active'?' selected':'')+'>🟢 Active</option><option value="inwork"'+(vs==='inwork'?' selected':'')+'>🟡 In-Work</option><option value="inactive"'+(vs==='inactive'?' selected':'')+'>⚫ Inactive</option></select>'+
        '<button class="iBtn" data-edit="'+v.id+'">✏️</button><button class="iBtn" data-del="'+v.id+'">🗑️</button></div></div>';
    });
  });
  el.innerHTML=html;
  el.querySelectorAll('[data-edit]').forEach(function(b){b.addEventListener('click',function(){openForm(b.dataset.edit);});});
  el.querySelectorAll('[data-del]').forEach(function(b){b.addEventListener('click',function(){delV(b.dataset.del);});});
}
async function setSt(id,val){await sb.from('vendors').update({status:val,modified_at:nowISO()}).eq('id',id);var v=vendors.find(function(x){return x.id===id;});if(v){v.status=val;v.modifiedAt=nowISO();}render();}

// ── CALENDAR ─────────────────────────────────────────────────────────────
function renderCalendar(){
  var el=document.getElementById('main-content');
  var full=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var ds2=['Su','Mo','Tu','We','Th','Fr','Sa'];
  var first=new Date(cY,cM,1),last=new Date(cY,cM+1,0),tod=today();
  var cells='';
  for(var i=0;i<first.getDay();i++)cells+='<div class="cday cother">&nbsp;</div>';
  for(var d=1;d<=last.getDate();d++){
    var ds=cY+'-'+String(cM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var ac=getApproved(ds).length;
    var cls='cday'+(ac?' has-vendors':'')+(ds===tod?' ctoday':'')+(ds===selectedCalDay?' selected-day':'');
    cells+='<div class="'+cls+'" data-date="'+ds+'">'+d+(ac?'<span class="day-count">'+ac+'v</span>':'')+'</div>';
  }
  el.innerHTML='<div style="display:flex;gap:10px;margin-bottom:.65rem;font-size:10px;color:#888;flex-wrap:wrap"><span><span style="width:9px;height:9px;background:#EAF3DE;border:1px solid #639922;border-radius:2px;display:inline-block;margin-right:3px;vertical-align:middle"></span>Vendors scheduled</span><span style="color:#ccc">Click date to manage · '+eligibleVendors().length+' eligible (Approved + Active)</span></div>'+
    '<div class="cal-wrap"><div class="cal-nav"><button class="btn-s" style="padding:5px 10px" id="calPrev">‹</button><span>'+full[cM]+' '+cY+'</span><button class="btn-s" style="padding:5px 10px" id="calNext">›</button></div><div class="cal-grid" id="calGrid">'+ds2.map(function(d){return'<div class="chd">'+d+'</div>';}).join('')+cells+'</div></div>'+
    (selectedCalDay?buildDayPanel(selectedCalDay):'');
  document.getElementById('calPrev').addEventListener('click',function(){cM--;if(cM<0){cM=11;cY--;}renderCalendar();});
  document.getElementById('calNext').addEventListener('click',function(){cM++;if(cM>11){cM=0;cY++;}renderCalendar();});
  document.getElementById('calGrid').addEventListener('click',function(e){var cell=e.target.closest('[data-date]');if(cell){selectedCalDay=selectedCalDay===cell.dataset.date?'':cell.dataset.date;renderCalendar();}});
}
function buildDayPanel(ds){
  var appV=getApproved(ds).map(function(id){return vendors.find(function(x){return x.id===id;});}).filter(Boolean);
  var wlV=getWaitlist(ds).map(function(id){return vendors.find(function(x){return x.id===id;});}).filter(Boolean);
  var ta=getTentAssignments(ds);var vendorTent={};
  Object.keys(ta).forEach(function(tid){var t=tents.find(function(x){return x.id===tid;});if(t)vendorTent[ta[tid]]='Spot '+t.num;});
  var total=appV.length+wlV.length;
  var header='<div class="day-report-header"><div><div style="font-size:14px;font-weight:700">📅 '+ds+'</div><div style="font-size:11px;color:#888;margin-top:2px">'+total+' vendor'+(total!==1?'s':'')+' · '+appV.length+' approved · '+wlV.length+' waitlisted</div></div><div style="display:flex;gap:6px;flex-wrap:wrap"><button class="btn-blue" id="manageDayBtn">+ Manage vendors</button><button class="btn-s" style="font-size:11px" id="closeDayBtn">✕ Close</button></div></div>';
  function vcard(v,isWL){var av=avc(v.businessName||'?');
    var cc=catColor(v.category);var wasInactive=v.vendorStatus==='inactive';

async function autoAssign(){
  if(!tentViewDate){alert('Select a market date first.');return;}
  var v4d=getApproved(tentViewDate).map(function(id){return vendors.find(function(x){return x.id===id;});}).filter(Boolean);
  if(!v4d.length){alert('No approved vendors for this date. Schedule them in Calendar first.');return;}
  if(!tents.length){alert('No tent spots defined. Add spots first.');return;}
  var spots=tents.slice(),assignment={},lastSpot={};
  var allDates=getMarketDates().filter(function(d){return d!==tentViewDate;}).sort();
  v4d.forEach(function(v){for(var i=allDates.length-1;i>=0;i--){var ta=getTentAssignments(allDates[i]);var f=Object.keys(ta).find(function(tid){return ta[tid]===v.id;});if(f){lastSpot[v.id]=f;break;}}});
  var assigned=[];
  v4d.forEach(function(v){var p=lastSpot[v.id];if(p&&spots.find(function(s){return s.id===p;})&&!assignment[p]){assignment[p]=v.id;assigned.push(v.id);}});
  var unasgn=v4d.filter(function(v){return assigned.indexOf(v.id)===-1;});
  var nums=spots.map(function(t){return t.num;}).sort(function(a,b){return a-b;});
  unasgn.forEach(function(v){var placed=false;for(var i=0;i<spots.length;i++){var s=spots[i];if(assignment[s.id])continue;var idx=nums.indexOf(s.num),conflict=false;[nums[idx-1],nums[idx+1]].forEach(function(nn){if(!nn)return;var ns=spots.find(function(x){return x.num===nn;});if(ns&&assignment[ns.id]){var nv=vendors.find(function(x){return x.id===assignment[ns.id];});if(nv&&nv.category&&nv.category===v.category)conflict=true;}});if(!conflict){assignment[s.id]=v.id;placed=true;break;}}if(!placed){for(var i=0;i<spots.length;i++){if(!assignment[spots[i].id]){assignment[spots[i].id]=v.id;break;}}}});
  if(!calRows[tentViewDate])calRows[tentViewDate]={approved:getApproved(tentViewDate),waitlist:[],tent_assignments:{}};
  calRows[tentViewDate].tent_assignments=assignment;await saveCalRow(tentViewDate);renderTents();
  alert('✅ Auto-assigned '+Object.values(assignment).filter(Boolean).length+' vendors for '+tentViewDate+'.');
}

async function loadLayoutForDate(ds){

function addLayoutSpot(data){
  var dims=LSIZES[data.size]||LSIZES['10x10'];
  var sp={id:data.id||uid(),num:data.num||getNextLayoutNum(),size:data.size||'10x10',x:data.x||60,y:data.y||60,w:data.w||dims.w,h:data.h||dims.h,vendorName:data.vendorName||'',vendorCat:data.vendorCat||''};
  layoutSpots.push(sp);renderLayoutSpot(sp);return sp;

function getNextLayoutNum(){var used=new Set(layoutSpots.map(function(s){return s.num;}));var n=1;while(used.has(n))n++;return n;}
function renderLayoutSpot(sp){
  var existing=document.getElementById('ls-'+sp.id);if(existing)existing.remove();
  var el=document.createElement('div');
  el.id='ls-'+sp.id;
  el.className='lspot'+(sp.size==='truck'?' ltruck':'')+(layoutSelectedIds.has(sp.id)?' lsel':'');
  el.style.cssText='left:'+sp.x+'px;top:'+sp.y+'px;width:'+sp.w+'px;height:'+sp.h+'px';
  if(sp.vendorName){var lcc=catColor(sp.vendorCat);el.style.background=lcc.bg;el.style.borderColor=lcc.border;el.style.borderWidth='1.5px';}
  var dims=LSIZES[sp.size]||LSIZES['10x10'];
  var wasInactive=sp.vendorInactive;
  el.innerHTML='<button class="lspot-del" title="Remove from this date only">×</button><div class="lspot-num">Spot '+sp.num+'</div><div class="lspot-size">'+dims.label+'</div>'+(sp.vendorName?'<div class="lspot-vendor" style="color:'+(sp.vendorCat?catColor(sp.vendorCat).text:'#27500A')+'">'+esc(sp.vendorName)+'</div>'+(wasInactive?'<div style="font-size:8px;color:#791F1F;font-weight:600">⚠️ Inactive</div>':'<div class="lspot-cat">'+esc(sp.vendorCat)+'</div>'):'');
  document.getElementById('layoutCanvas').appendChild(el);
  // ── Delete removes from THIS date's layout only — no Supabase, no global effect ──
  el.querySelector('.lspot-del').addEventListener('click',function(e){e.stopPropagation();removeLayoutSpotLocal(sp.id);markLayoutUnsaved();updateLayoutStats();updateLayoutToolbar();});
  el.addEventListener('click',function(e){
    if(e.target.classList.contains('lspot-del'))return;
    if(!e.ctrlKey&&!e.metaKey){layoutSelectedIds.clear();layoutSpots.forEach(function(s){var se=document.getElementById('ls-'+s.id);if(se)se.classList.remove('lsel');});}
    if(layoutSelectedIds.has(sp.id)){layoutSelectedIds.delete(sp.id);el.classList.remove('lsel');}else{layoutSelectedIds.add(sp.id);el.classList.add('lsel');}
    updateLayoutToolbar();
  });
  el.addEventListener('mousedown',function(e){
    if(e.target.classList.contains('lspot-del'))return;e.preventDefault();
    if(!layoutSelectedIds.has(sp.id)){layoutSelectedIds.clear();layoutSpots.forEach(function(s){var se=document.getElementById('ls-'+s.id);if(se)se.classList.remove('lsel');});layoutSelectedIds.add(sp.id);el.classList.add('lsel');updateLayoutToolbar();}
    var startX=e.clientX,startY=e.clientY,moved=false;
    var orig={};layoutSelectedIds.forEach(function(sid){var s=layoutSpots.find(function(x){return x.id===sid;});if(s)orig[sid]={x:s.x,y:s.y};});
    el.classList.add('dragging');
    function onMove(ev){moved=true;var dx=ev.clientX-startX,dy=ev.clientY-startY;layoutSelectedIds.forEach(function(sid){var s=layoutSpots.find(function(x){return x.id===sid;});if(!s)return;var o=orig[sid];s.x=Math.max(0,snapV(o.x+dx));s.y=Math.max(0,snapV(o.y+dy));var se=document.getElementById('ls-'+sid);if(se){se.style.left=s.x+'px';se.style.top=s.y+'px';}});}
    function onUp(){el.classList.remove('dragging');if(moved)markLayoutUnsaved();document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);}
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
  });
}
// KEY: only removes from local array + DOM — no Supabase delete, no global effect
function removeLayoutSpotLocal(id){
  layoutSpots=layoutSpots.filter(function(s){return s.id!==id;});
  layoutSelectedIds.delete(id);

}
async function saveLayoutForDate(){
  if(!layoutDate){alert('Select a market date first.');return;}
  var btn=document.getElementById('saveLayoutBtn');if(btn){btn.disabled=true;btn.textContent='Saving…';}
  try{
    var payload=JSON.stringify(layoutSpots.map(function(s){return{id:s.id,num:s.num,size:s.size,x:s.x,y:s.y,w:s.w,h:s.h,vendorName:s.vendorName,vendorCat:s.vendorCat};}));
    await window.storage.set(lKey(layoutDate),payload);
    var dr=await window.storage.get(lDatesKey());var dl=dr&&dr.value?JSON.parse(dr.value):[];
    if(dl.indexOf(layoutDate)===-1){dl.push(layoutDate);dl.sort();}
    await window.storage.set(lDatesKey(),JSON.stringify(dl));
    layoutUnsaved=false;updateLayoutBadge('saved');
    if(btn){btn.textContent='✅ Saved!';setTimeout(function(){btn.textContent='💾 Save layout for date';btn.disabled=false;},1500);}
  }catch(e){alert('Save failed: '+e.message);if(btn){btn.disabled=false;btn.textContent='💾 Save layout for date';}}
}

async function saveV(){
  var biz=((document.getElementById('f_biz')||{}).value||'').trim();
  var contact=((document.getElementById('f_contact')||{}).value||'').trim();
  if(!biz||!contact){alert('Business name and primary contact are required (Business tab).');return;}
  var btn=document.getElementById('fSaveBtn');if(btn){btn.disabled=true;btn.textContent='Saving…';}
  var cat=getR('category');
  var newDates=Array.from(document.querySelectorAll('#fDateChips .dc.on')).map(function(c){return c.dataset.ds;});
  var existing=eId?vendors.find(function(v){return v.id===eId;}):null;
  var oldDates=existing?existing.selectedDates||[]:[];
  var data={vendorStatus:getR('vendorStatus')||'active',status:((document.getElementById('fAppStatus')||{}).value||'pending'),contractReceived:!!((document.getElementById('fcb-contract')||{}).checked),paymentReceived:!!((document.getElementById('fcb-payment')||{}).checked),selectedDates:newDates,businessName:biz,contactName:contact,email:((document.getElementById('f_email')||{}).value||'').trim(),phone:((document.getElementById('f_phone')||{}).value||'').trim(),website:((document.getElementById('f_web')||{}).value||'').trim(),social:((document.getElementById('f_social')||{}).value||'').trim(),category:cat,categoryComment:cat==='Other'?((document.getElementById('cmt_category')||{}).value||''):'',products:((document.getElementById('f_products')||{}).value||'').trim(),productDesc:((document.getElementById('f_prodDesc')||{}).value||'').trim(),local:getR('local'),localComment:((document.getElementById('cmt_local')||{}).value||''),priceRange:Array.from(document.querySelectorAll('#priceChecks input:checked')).map(function(c){return c.value;}),licenses:getR('licenses'),licensesComment:((document.getElementById('cmt_licenses')||{}).value||''),foodDocs:Array.from(document.querySelectorAll('#fdChecks input:checked')).map(function(c){return c.value;}),liability:getR('liability'),boothSize:getR('boothSize'),ownSetup:getR('ownSetup'),ownSetupComment:((document.getElementById('cmt_ownSetup')||{}).value||''),electricity:getR('electricity'),attendance:getR('attendance'),months:((document.getElementById('f_months')||{}).value||'').trim(),whyJoin:((document.getElementById('f_whyJoin')||{}).value||'').trim(),values:((document.getElementById('f_values')||{}).value||'').trim(),additionalInfo:((document.getElementById('f_addl')||{}).value||'').trim(),notes:((document.getElementById('f_notes')||{}).value||'').trim(),photos:[]};
  var savedId=await saveVendorDB(data,eId);
  if(savedId){
    for(var i=0;i<newDates.length;i++){var ds=newDates[i];if(oldDates.indexOf(ds)===-1){if(!calRows[ds])calRows[ds]={approved:[],waitlist:[],tent_assignments:{}};if(calRows[ds].approved.indexOf(savedId)===-1)calRows[ds].approved.push(savedId);await saveCalRow(ds);}}
    for(var i=0;i<oldDates.length;i++){var ds=oldDates[i];if(newDates.indexOf(ds)===-1&&calRows[ds]){calRows[ds].approved=calRows[ds].approved.filter(function(x){return x!==savedId;});await saveCalRow(ds);}}
    await loadData();closeMod();
  }else{if(btn){btn.disabled=false;btn.textContent='✓ Save vendor';}}
}
