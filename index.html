<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elevation Bend — Farmers Market</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#ffffff;color:#1a1a1a;min-height:100vh}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
.auth-card{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,.1)}
.auth-logo{font-size:22px;font-weight:700;margin-bottom:4px}
.auth-sub{font-size:12px;color:#888;margin-bottom:1.75rem}
.auth-title{font-size:16px;font-weight:600;margin-bottom:1.25rem}
.auth-fg{margin-bottom:.85rem}
.auth-fg label{font-size:13px;color:#555;display:block;margin-bottom:4px;font-weight:700}
.auth-fg input{width:100%;border:1px solid #d0cec7;border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;outline:none}
.auth-fg input:focus{border-color:#22c55e;box-shadow:0 0 0 3px #dcfce7}
.auth-btn{width:100%;background:#1a1a1a;color:#fff;border:none;padding:11px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-err{background:#FCEBEB;color:#791F1F;border-radius:8px;padding:.75rem 1rem;font-size:12px;margin-bottom:.85rem;display:none}
.auth-footer{text-align:center;font-size:12px;color:#888;margin-top:1rem}
.auth-link{color:#1a1a1a;font-weight:500;cursor:pointer;text-decoration:underline}
#app-screen{display:none;padding:.75rem;max-width:980px;margin:0 auto}
.env-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:8px;margin-bottom:.75rem}
.env-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.env-label{font-size:12px;font-weight:700;flex:1;color:#15803d}
.env-user{font-size:10px;color:#15803d}
.signout-btn{font-size:10px;padding:4px 9px;border-radius:6px;border:.5px solid #639922;background:#fff;color:#27500A;cursor:pointer;font-family:inherit}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:8px}
.hdr-title{font-size:16px;font-weight:700}

nav{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;margin-bottom:.85rem;background:#f0ede6;border-radius:8px;padding:3px}
.nb{background:none;border:none;padding:9px 4px;font-size:13px;font-weight:800;color:#888;cursor:pointer;border-radius:6px;text-align:center;font-family:inherit;white-space:nowrap;letter-spacing:-.01em}
.nb.active{background:#fff;color:#1a1a1a;border:.5px solid #e5e3de;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(78px,1fr));gap:5px;margin-bottom:.85rem}
.stat{background:#fff;border:.5px solid #e5e3de;border-radius:10px;padding:.5rem .65rem}
.sl{font-size:11px;color:#888;margin-bottom:1px;text-transform:uppercase;letter-spacing:.03em;font-weight:700}
.sv{font-size:18px;font-weight:800}
.vrow{background:#fff;border:.5px solid #e5e3de;border-radius:10px;padding:.75rem;margin-bottom:6px}
.vrow.vstatus-active{border-left:3px solid #22c55e}
.vrow.vstatus-inwork{border-left:3px solid #eab308}
.vrow.vstatus-inactive{border-left:3px solid #9ca3af;opacity:.8}
.vname{font-size:14px;font-weight:700}
.vmeta{font-size:12px;color:#888;margin-top:2px;font-weight:500}
.vdates{font-size:10px;color:#888;margin-top:3px}
.vtags{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.tg{background:#EAF3DE;color:#27500A}.tb{background:#E6F1FB;color:#0C447C}
.tw{background:#FAEEDA;color:#633806}.tr{background:#FCEBEB;color:#791F1F}.tgr{background:#f0ede6;color:#555}
.tag-vs-active{background:#dcfce7;color:#15803d}.tag-vs-inwork{background:#fef9c3;color:#a16207}.tag-vs-inactive{background:#f3f4f6;color:#6b7280}
.tag-contract{background:#E6F1FB;color:#0C447C}.tag-payment{background:#EAF3DE;color:#27500A}
.vs-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle}
.vactions{display:flex;align-items:center;gap:4px;margin-top:7px;flex-wrap:wrap}
.vactions select{font-size:10px;padding:3px 5px;border-radius:5px;border:.5px solid #d0cec7;background:#f8f7f4;font-family:inherit}
.iBtn{background:none;border:.5px solid #e5e3de;border-radius:6px;padding:4px 7px;font-size:12px;cursor:pointer;color:#888}
.iBtn:hover{background:#f0ede6}
.glabel{font-size:12px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin:.65rem 0 .3rem;padding-left:2px}
.empty{text-align:center;padding:2rem .5rem;color:#aaa;font-size:12px;background:#fff;border:.5px solid #e5e3de;border-radius:10px}
.btn-p{background:#1a1a1a;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:700;white-space:nowrap}
.btn-p:hover{background:#333}.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-s{background:#fff;border:.5px solid #d0cec7;color:#555;padding:7px 13px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-s:hover{background:#f0ede6}
.btn-g{background:#dcfce7;border:.5px solid #22c55e;color:#15803d;padding:7px 13px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-blue{background:#E6F1FB;border:.5px solid #378ADD;color:#0C447C;padding:7px 13px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-amber{background:#FAEEDA;border:.5px solid #BA7517;color:#633806;padding:7px 13px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-danger{background:#FCEBEB;border:.5px solid #f09595;color:#791F1F;padding:7px 13px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.cal-wrap{background:#fff;border:.5px solid #e5e3de;border-radius:12px;padding:.85rem}
.cal-nav{display:flex;align-items:center;gap:8px;margin-bottom:.65rem}
.cal-nav span{font-size:13px;font-weight:600;flex:1;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.chd{text-align:center;font-size:10px;color:#888;padding:3px 0;font-weight:600}
.cday{text-align:center;font-size:11px;padding:8px 2px;border-radius:8px;border:.5px solid transparent;cursor:pointer;font-weight:500;min-height:38px}
.cday:hover{background:#f0ede6}
.cday.has-vendors{background:#EAF3DE;border-color:#639922;color:#27500A}
.cday.cother{color:#ccc}.cday.ctoday{box-shadow:0 0 0 2px #378ADD}.cday.selected-day{box-shadow:0 0 0 2.5px #1a1a1a}
.day-count{font-size:8px;display:block;font-weight:400}
.day-report{background:#fff;border:.5px solid #e5e3de;border-radius:12px;margin-top:.85rem;overflow:hidden}
.day-report-header{padding:.85rem 1rem;background:#f8f7f4;border-bottom:.5px solid #e5e3de;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.day-vendor-card{padding:.85rem 1rem;border-bottom:.5px solid #e5e3de;cursor:pointer;display:flex;align-items:flex-start;gap:10px}
.day-vendor-card:hover{background:#f8f7f4}
.day-vendor-card:last-child{border-bottom:none}
.dvc-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.tent-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;padding:.85rem 1rem;background:#fff;border:.5px solid #e5e3de;border-radius:10px;flex-wrap:wrap;gap:8px}
.tent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:.5rem}
.tcell{border:.5px solid #e5e3de;border-radius:10px;padding:.65rem .75rem;min-height:96px;background:#fff;position:relative}
.tcell.tocc{background:#EAF3DE;border-color:#639922}
.tnum{font-size:9px;font-weight:700;color:#aaa;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;padding-right:22px}
.tvname{font-size:13px;font-weight:700;margin-top:4px}
.tvmeta{font-size:10px;color:#888;margin-top:2px}
.tassign{width:100%;margin-top:8px;background:#f8f7f4;border:.5px solid #d0cec7;border-radius:6px;padding:5px 8px;font-size:11px;cursor:pointer;color:#888;font-family:inherit;text-align:left}
.tassign:hover{background:#f0ede6;color:#1a1a1a}
.layout-datebar{display:flex;align-items:center;gap:8px;padding:.6rem .85rem;background:#f8f7f4;border:.5px solid #e5e3de;border-radius:10px;margin-bottom:.75rem;flex-wrap:wrap}
.layout-badge{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:500}
.badge-saved{background:#EAF3DE;color:#27500A;border:.5px solid #639922}
.badge-unsaved{background:#FAEEDA;color:#633806;border:.5px solid #BA7517}
.badge-empty{background:#f0ede6;color:#888;border:.5px solid #d0cec7}
.layout-toolbar{display:flex;align-items:center;gap:6px;padding:.6rem .85rem;background:#fff;border:.5px solid #e5e3de;border-radius:10px;margin-bottom:.75rem;flex-wrap:wrap}
.canvas-outer{overflow:auto;background:#f0ede6;border:.5px solid #e5e3de;border-radius:10px;cursor:default}
#layoutCanvas{position:relative;width:1400px;height:900px}
.grid-dot{position:absolute;width:2px;height:2px;border-radius:50%;background:#d0cec7;pointer-events:none}
.lspot{position:absolute;border:1.5px solid #d0cec7;border-radius:8px;background:#fff;cursor:grab;user-select:none;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:5px 4px;touch-action:none}
.lspot:hover{border-color:#378ADD;z-index:10}
.lspot.dragging{cursor:grabbing;z-index:100;opacity:.88;border-color:#378ADD;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.lspot.lsel{border-color:#639922;box-shadow:0 0 0 2.5px #c0dd97;z-index:20}
.lspot.locc{background:#EAF3DE;border-color:#639922}
.lspot.ltruck{border-style:dashed}
.lspot-del{position:absolute;top:-7px;right:-7px;width:18px;height:18px;border-radius:50%;background:#791F1F;border:1.5px solid #fff;color:#fff;font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:30;font-family:inherit;line-height:1}
.lspot:hover .lspot-del,.lspot.lsel .lspot-del{display:flex}
.lspot-num{font-size:9px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.04em;padding-right:20px;margin-bottom:2px}
.lspot-size{font-size:8px;color:#bbb;margin-bottom:3px}
.lspot-vendor{font-size:10px;font-weight:600;color:#27500A;max-width:90%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lspot-cat{font-size:9px;color:#3B6D11;max-width:90%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.layout-legend{display:flex;gap:12px;padding:.45rem .85rem;font-size:10px;color:#888;flex-wrap:wrap;align-items:center}
.ll{display:flex;align-items:center;gap:4px}
.ls{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.report-table{width:100%;border-collapse:collapse;font-size:12px}
.report-table th{text-align:left;padding:8px 10px;font-weight:800;color:#555;border-bottom:.5px solid #e5e3de;font-size:12px;text-transform:uppercase;background:#f8f7f4}
.report-table td{padding:9px 10px;border-bottom:.5px solid #f0ede6;vertical-align:middle;font-size:13px}
.report-table tr:hover td{background:#f8f7f4;cursor:pointer}
.report-wrap{background:#fff;border:.5px solid #e5e3de;border-radius:12px;overflow:hidden;margin-bottom:.85rem}
.sched-approved{background:#EAF3DE;color:#27500A;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;display:inline-block}
.sched-waitlist{background:#FAEEDA;color:#633806;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;display:inline-block}
.sched-pending{background:#f0ede6;color:#555;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;display:inline-block}
.overlay{background:rgba(0,0,0,.4);position:fixed;inset:0;z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:1.5rem 1rem;overflow-y:auto}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:100%;margin:auto}
.modal.sm{max-width:380px}.modal.md{max-width:500px}.modal.lg{max-width:640px}
.mtitle{font-size:16px;font-weight:800;margin-bottom:.85rem;padding-bottom:.6rem;border-bottom:.5px solid #e5e3de}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:.85rem;padding-top:.75rem;border-top:.5px solid #e5e3de;flex-wrap:wrap}
.vform-subnav{display:flex;gap:0;border-bottom:.5px solid #e5e3de;background:#f8f7f4;overflow-x:auto;scrollbar-width:none}
.vform-subnav::-webkit-scrollbar{display:none}
.fsnb{background:none;border:none;border-bottom:2.5px solid transparent;padding:.6rem .85rem;font-size:13px;font-weight:700;color:#888;cursor:pointer;font-family:inherit;white-space:nowrap;display:flex;align-items:center;gap:5px}
.fsnb:hover{color:#1a1a1a;background:#fff}
.fsnb.active{color:#1a1a1a;border-bottom-color:#1a1a1a;background:#fff}
.fsnb.done .fsnb-dot{background:#22c55e}
.fsnb-dot{width:6px;height:6px;border-radius:50%;background:#d0cec7;flex-shrink:0}
.fsnb.active .fsnb-dot{background:#1a1a1a}
.progress-bar{height:3px;background:#f0ede6}
.progress-fill{height:3px;background:#22c55e;transition:width .25s}
.fpanel{display:none;padding:1.1rem 1.25rem;min-height:320px;max-height:55vh;overflow-y:auto}
.fpanel.active{display:block}
.fsec-title{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.85rem;padding-bottom:.4rem;border-bottom:.5px solid #e5e3de}
.fg{margin-bottom:.75rem}
.fg label{font-size:13px;color:#555;display:block;margin-bottom:4px;font-weight:700}
.fg input,.fg select,.fg textarea{width:100%;border:.5px solid #d0cec7;border-radius:8px;padding:8px 10px;font-size:13px;background:#fff;color:#1a1a1a;font-family:inherit;outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#22c55e}
.fg textarea{height:60px;resize:vertical}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.req{color:#E24B4A}
.rg{display:flex;flex-direction:column;gap:5px}
.ropt{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;border:.5px solid #e5e3de;border-radius:8px;cursor:pointer;background:#fff}
.ropt.sel{border-color:#22c55e;background:#dcfce7}
.ropt input[type=radio]{margin-top:2px;flex-shrink:0;accent-color:#22c55e}
.ropt span{font-size:12px}
.copt{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;border:.5px solid #e5e3de;border-radius:8px;cursor:pointer;background:#fff}
.copt span{font-size:12px;flex:1}
.copt input[type=checkbox]{margin-top:2px;flex-shrink:0;accent-color:#22c55e;width:14px;height:14px}
.sub-field{margin-top:6px;padding-left:14px;border-left:2px solid #d0cec7}
.sub-field textarea{width:100%;border:.5px solid #d0cec7;border-radius:8px;padding:6px 8px;font-size:12px;font-family:inherit;height:48px;resize:vertical}
.vs-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:4px}
.vs-card{border:1.5px solid #e5e3de;border-radius:8px;padding:10px 8px;text-align:center;cursor:pointer;background:#fff}
.vs-card.sel-active{border-color:#22c55e;background:#dcfce7}
.vs-card.sel-inwork{border-color:#eab308;background:#fef9c3}
.vs-card.sel-inactive{border-color:#9ca3af;background:#f3f4f6}
.vs-card-dot{width:12px;height:12px;border-radius:50%;margin:0 auto 5px}
.vs-card-label{font-size:13px;font-weight:700}
.toggle-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.toggle-card{border:1.5px solid #e5e3de;border-radius:8px;padding:10px;cursor:pointer;background:#fff;display:flex;align-items:center;gap:8px}
.toggle-card.on-contract{border-color:#0C447C;background:#E6F1FB}
.toggle-card.on-payment{border-color:#27500A;background:#EAF3DE}
.toggle-card input[type=checkbox]{display:none}
.tc-label{font-size:13px;font-weight:700}
.tc-sub{font-size:10px;color:#888}
.date-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.dc{font-size:11px;padding:5px 10px;border-radius:20px;border:.5px solid #d0cec7;background:#fff;cursor:pointer;font-family:inherit;color:#888}
.dc.on{background:#EAF3DE;border-color:#639922;color:#27500A;font-weight:600}
.info-strip{display:flex;gap:12px;flex-wrap:wrap;padding:.6rem .85rem;background:#f8f7f4;border-radius:8px;border:.5px solid #e5e3de;margin-top:.5rem}
.isl{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.04em}
.isv{font-size:11px;font-weight:600;margin-top:2px}
.form-footer{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.25rem;border-top:.5px solid #e5e3de;gap:8px;flex-wrap:wrap}
.upload-zone{border:1.5px dashed #d0cec7;border-radius:10px;padding:1rem;text-align:center;cursor:pointer;color:#aaa;font-size:12px}
.upload-zone:hover{border-color:#378ADD;background:#E6F1FB}
.notice{font-size:12px;color:#888;padding:.5rem .65rem;background:#f8f7f4;border-radius:8px;border:.5px solid #e5e3de;margin-bottom:.65rem;line-height:1.5}
.notice.warn{background:#FAEEDA;border-color:#BA7517;color:#633806}
.size-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px}
.sopt{border:1.5px solid #e5e3de;border-radius:8px;padding:8px 6px;text-align:center;cursor:pointer;background:#fff}
.sopt.sel{border-color:#378ADD;background:#E6F1FB}
.sopt-name{font-size:12px;font-weight:600}
.sopt-dim{font-size:10px;color:#888}
.hist-item{display:flex;align-items:center;justify-content:space-between;padding:.6rem .75rem;border:.5px solid #e5e3de;border-radius:8px;margin-bottom:5px;background:#fff;cursor:pointer}
.hist-item:hover{border-color:#378ADD;background:#E6F1FB}
</style>
</head>
<body>
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">Elevation Bend</div>
    <div class="auth-sub">Farmers Market — Vendor Management</div>
    <div class="auth-title" id="auth-title">Sign in to your account</div>
    <div class="auth-err" id="auth-err"></div>
    <div class="auth-fg"><label>Email</label><input type="email" id="auth-email" placeholder="you@example.com" autocomplete="email"></div>
    <div class="auth-fg"><label>Password</label><input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password"></div>
    <div class="auth-fg" id="auth-confirm-wrap" style="display:none"><label>Confirm password</label><input type="password" id="auth-confirm"></div>
    <button class="auth-btn" id="auth-btn">Sign in</button>
    <div class="auth-footer"><span id="auth-toggle-text">Don't have an account?</span> <span class="auth-link" id="auth-toggle">Sign up</span></div>
  </div>
</div>
<div id="app-screen">
  <div class="env-bar">
    <div class="env-dot"></div>
    <div style="flex:1"><div class="env-label">Elevation Bend — Live (Supabase)</div><div class="env-user" id="user-email"></div></div>
    <button class="signout-btn" id="signout-btn">Sign out</button>
  </div>
  <div class="hdr">
    <div><div class="hdr-title">Elevation Bend</div><div class="hdr-sub">Farmers Market Vendors</div></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn-g" id="exportBtn">↓ Export</button>
      <button class="btn-p" id="newBtn">+ New vendor</button>
    </div>
  </div>
  <nav>
    <button class="nb active" data-tab="vendors">Vendors</button>
    <button class="nb" data-tab="calendar">Calendar</button>
    <button class="nb" data-tab="tents">Assignments</button>
    <button class="nb" data-tab="layout">Layout</button>
    <button class="nb" data-tab="reports">Reports</button>
    <button class="nb" data-tab="waitlist">Waitlist</button>
    <button class="nb" data-tab="payments">Payments</button>
    <button class="nb" data-tab="comms">Comms</button>
    <button class="nb" data-tab="manage">Manage</button>
  </nav>
  <div id="stats-bar"></div>
  <div id="filter-bar"></div>
  <div id="main-content"></div>
  <div id="modal-area"></div>
</div>
<script>
// ── Environment detection — salmon bg in live, light gray in dev ──────────

// Mirrors the window.storage API used in layout save/load.
window.storage = {
  set: function(key, value) {
    try { localStorage.setItem('eb_'+key, value); return {key:key,value:value}; }
    catch(e) { console.error('storage.set failed:',e); return null; }
  },
  get: function(key) {
    try { var v=localStorage.getItem('eb_'+key); return v!==null?{key:key,value:v}:null; }
    catch(e) { return null; }
  },
  delete: function(key) {
    try { localStorage.removeItem('eb_'+key); return {key:key,deleted:true}; }
    catch(e) { return null; }
  },
  list: function(prefix) {
    try {
      var p='eb_'+(prefix||''), keys=[];
      for(var i=0;i<localStorage.length;i++){
        var k=localStorage.key(i);
        if(k&&k.startsWith(p))keys.push(k.slice(3));
      }
      return {keys:keys,prefix:prefix};
    } catch(e) { return {keys:[]}; }
  }
};

async function ensureSchema(){
  // Add optional columns if they don't exist — safe to run multiple times
  var sqls=[
    "ALTER TABLE vendors ADD COLUMN IF NOT EXISTS contract_received BOOLEAN DEFAULT false",
    "ALTER TABLE vendors ADD COLUMN IF NOT EXISTS payment_received BOOLEAN DEFAULT false",
    "ALTER TABLE vendors ADD COLUMN IF NOT EXISTS notes TEXT DEFAULT ''",
    "ALTER TABLE vendors ADD COLUMN IF NOT EXISTS booth_fee NUMERIC DEFAULT 0",
    "CREATE TABLE IF NOT EXISTS vendor_groups (id TEXT PRIMARY KEY, name TEXT, member_ids TEXT[] DEFAULT '{}', created_at TIMESTAMPTZ DEFAULT NOW())",
    "ALTER TABLE vendors ADD COLUMN IF NOT EXISTS selected_dates TEXT[] DEFAULT '{}'",
    "ALTER TABLE vendors ADD COLUMN IF NOT EXISTS modified_at TIMESTAMPTZ DEFAULT NOW()"
  ];
  for(var i=0;i<sqls.length;i++){
    try{await sb.rpc('exec_sql',{sql:sqls[i]});}catch(e){/* rpc may not exist, ignore */}
  }
}
async function loadData(){
  document.getElementById('main-content').innerHTML='<div style="text-align:center;padding:2rem;color:#888">Loading…</div>';
  await ensureSchema();
  try{
    var{data:vd,error:ve}=await sb.from('vendors').select('*').order('created_at',{ascending:false});
    if(ve)throw ve;vendors=(vd||[]).map(dbToV);
    var{data:td,error:te}=await sb.from('tents').select('*').order('num');
    if(te)throw te;tents=td||[];if(!tents.length)await initTentsDB();
    var{data:gd,error:ge}=await sb.from('vendor_groups').select('*').order('name');
    if(!ge)vendorGroups=(gd||[]);
    var{data:cd,error:ce}=await sb.from('calendar').select('*');
    if(ce)throw ce;calRows={};
    (cd||[]).forEach(function(r){calRows[r.date]={approved:r.approved_vendors||[],waitlist:r.waitlist_vendors||[],tent_assignments:r.tent_assignments||{}};});
    syncVendorDatesFromCalendar(); // keep vendor.selectedDates in sync with calendar
  }catch(e){console.error(e);}
  render();
}

// ── Single source of truth — calendar drives vendor dates ──────────────────
// Rebuilds every vendor's selectedDates from calRows so both views match.
// Call this after any change to calRows or vendor saves.
function syncVendorDatesFromCalendar(){
  var datesByVendor={};
  Object.keys(calRows).forEach(function(ds){
    (calRows[ds].approved||[]).forEach(function(vid){
      if(!datesByVendor[vid])datesByVendor[vid]=[];
      datesByVendor[vid].push(ds);
    });
  });
  vendors.forEach(function(v){
    v.selectedDates=(datesByVendor[v.id]||[]).slice().sort();
  });
}

  catch(e){console.warn('Could not persist vendor dates:',e.message);}
}

async function saveVendorDB(data,id){
  var isNew=!id;
  // ── Core row — only columns that definitely exist in base Supabase vendors table ──
  var row={
    id:id||uid(),
    vendor_status:data.vendorStatus||'active',
    status:data.status||'pending',
    business_name:data.businessName||'',
    contact_name:data.contactName||'',
    email:data.email||'',
    phone:data.phone||'',
    website:data.website||'',
    social:data.social||'',
    category:data.category||'',
    category_comment:data.categoryComment||'',
    products:data.products||'',
    product_desc:data.productDesc||'',
    local_produced:data.local||'',
    local_comment:data.localComment||'',
    price_range:data.priceRange||[],
    licenses:data.licenses||'',
    licenses_comment:data.licensesComment||'',
    food_docs:data.foodDocs||[],
    liability:data.liability||'',
    booth_size:data.boothSize||'',
    own_setup:data.ownSetup||'',
    setup_comment:data.ownSetupComment||'',
    electricity:data.electricity||'',
    attendance:data.attendance||'',
    months:data.months||'',
    why_join:data.whyJoin||'',
    values:data.values||'',
    additional_info:data.additionalInfo||'',
    photos:[]
  };
  var{error}=await sb.from('vendors').upsert(row);
  if(error){alert('Error saving vendor: '+error.message);return null;}

  // ── Optional columns — added via ALTER TABLE; each tried separately so one
  //    missing column doesn't block the others ──────────────────────────────
  var optionals=[
    {modified_at:nowISO()},
    isNew?{created_at:nowISO()}:null,
    {selected_dates:data.selectedDates||[]},
    {contract_received:!!data.contractReceived},
    {payment_received:!!data.paymentReceived},
    {notes:data.notes||''},
    {booth_fee:data.boothFee||0},
  ].filter(Boolean);

  for(var i=0;i<optionals.length;i++){
    var{error:oe}=await sb.from('vendors').update(optionals[i]).eq('id',row.id);
    if(oe)console.warn('Column not saved (run SQL migration):', Object.keys(optionals[i])[0], '-', oe.message);
  }
  return row.id;
}

// ── ASSIGNMENTS TAB ───────────────────────────────────────────────────────
// Spots come from the Layout tab for the selected date.
// Tents (vendor canopies) get assigned to those spots here.
// Auto-assign uses real XY proximity from the layout for adjacency checks.

function getSpotsForDate(ds){
  // Primary source: layout spots saved for this date (from window.storage)
  // These are the physical spots on the canvas.
  // Returns an array of {id, num, size, x, y, w, h} objects.
  return window._layoutCache&&window._layoutCache[ds]?window._layoutCache[ds]:[];
}

// Load layout spots for date into cache — Supabase first, localStorage fallback
async function ensureLayoutCache(ds){
  if(!ds)return[];
  window._layoutCache=window._layoutCache||{};
  if(window._layoutCache[ds])return window._layoutCache[ds];
  // Try Supabase first
  try{
    var{data,error}=await sb.from('layouts').select('spots').eq('date',ds).single();
    if(!error&&data&&data.spots&&data.spots.length){
      window._layoutCache[ds]=data.spots;
      return data.spots;
    }
  }catch(e){}
  // Fallback: localStorage
  try{
    var ls=localStorage.getItem('eb_layout_'+ds);
    if(ls){var spots=JSON.parse(ls);window._layoutCache[ds]=spots;return spots;}
  }catch(e){}
  window._layoutCache[ds]=[];
  return [];
}

function clearLayoutCache(ds){if(window._layoutCache&&ds)delete window._layoutCache[ds];}

// ── AUTO-ASSIGN — uses real XY proximity from layout for adjacency ────────
// Rules:
//   1. Returning vendors get the same spot they had most recently (last 5 dates)
//   2. No two adjacent spots (within 40px on canvas) get the same vendor category
//   3. Remaining vendors fill available spots respecting adjacency rule
async function autoAssign(){
  if(!tentViewDate){alert('Select a market date first.');return;}
  var v4d=getApproved(tentViewDate).map(function(id){return vendors.find(function(x){return x.id===id;});}).filter(Boolean);
  if(!v4d.length){alert('No approved vendors for this date.\nSchedule them in Calendar first.');return;}

  // Load layout spots for this date
  var layoutSpotList=await ensureLayoutCache(tentViewDate);
  if(!layoutSpotList.length){alert('No spots defined for this date.\nGo to the Layout tab and define spots first.');return;}

  // Build adjacency map using real XY positions
  var ADJACENT_THRESHOLD=40;
  function spotsAdjacent(a,b){
    var ax1=a.x,ax2=a.x+(a.w||80),ay1=a.y,ay2=a.y+(a.h||80);
    var bx1=b.x,bx2=b.x+(b.w||80),by1=b.y,by2=b.y+(b.h||80);
    var gapX=Math.max(ax1,bx1)-Math.min(ax2,bx2);
    var gapY=Math.max(ay1,by1)-Math.min(ay2,by2);
    return(gapX<ADJACENT_THRESHOLD&&gapY<200)||(gapY<ADJACENT_THRESHOLD&&gapX<200);
  }
  var adjacency={};
  layoutSpotList.forEach(function(s){adjacency[s.id]=[];});
  for(var i=0;i<layoutSpotList.length;i++){
    for(var j=i+1;j<layoutSpotList.length;j++){
      var a=layoutSpotList[i],b=layoutSpotList[j];
      if(spotsAdjacent(a,b)){adjacency[a.id].push(b.id);adjacency[b.id].push(a.id);}
    }
  }

  // Load previous spot history from Supabase — up to last 5 market dates
  // This gives "returning vendor gets same spot" across devices
  var lastSpot={};
  try{
    var prevDates=getMarketDates().filter(function(d){return d<tentViewDate;}).sort().slice(-5).reverse();
    // Load layouts for previous dates from Supabase
    if(prevDates.length){
      var{data:prevLayouts}=await sb.from('layouts').select('date,spots').in('date',prevDates);
      // Build vendorId -> spotId map from most recent to oldest
      (prevLayouts||[]).sort(function(a,b){return b.date.localeCompare(a.date);}).forEach(function(layout){
        (layout.spots||[]).forEach(function(sp){
          if(sp.vendorId&&!lastSpot[sp.vendorId])lastSpot[sp.vendorId]=sp.id;
        });
      });
    }
    // Also check in-memory calRows tent_assignments as additional source
    prevDates.forEach(function(d){
      var ta=getTentAssignments(d);
      Object.keys(ta).forEach(function(sid){
        var vid=ta[sid];
        if(vid&&!lastSpot[vid])lastSpot[vid]=sid;
      });
    });
  }catch(e){console.warn('Could not load previous layouts:',e);}

  var spots=layoutSpotList.slice();
  var assignment={};

  // First pass: assign returning vendors to their preferred (last used) spot
  var assigned=[];
  v4d.forEach(function(v){
    var p=lastSpot[v.id];
    if(p&&spots.find(function(s){return s.id===p;})&&!assignment[p]){
      assignment[p]=v.id;assigned.push(v.id);
    }
  });

  // Second pass: place remaining vendors, avoiding same-category adjacency
  var unasgn=v4d.filter(function(v){return assigned.indexOf(v.id)===-1;});
  var sorted=spots.slice().sort(function(a,b){return a.num-b.num;});

  unasgn.forEach(function(v){
    var placed=false;
    // Try each spot; skip if it causes adjacency conflict
    for(var i=0;i<sorted.length;i++){
      var s=sorted[i];
      if(assignment[s.id])continue;
      var conflict=false;
      (adjacency[s.id]||[]).forEach(function(nid){
        if(assignment[nid]){
          var nv=vendors.find(function(x){return x.id===assignment[nid];});
          if(nv&&nv.category&&nv.category===v.category)conflict=true;
        }
      });
      if(!conflict){assignment[s.id]=v.id;placed=true;break;}
    }
    // If no conflict-free spot found, place anywhere available
    if(!placed){
      for(var i=0;i<sorted.length;i++){
        if(!assignment[sorted[i].id]){assignment[sorted[i].id]=v.id;break;}
      }
    }
  });

  // Save assignments to calRows and Supabase
  if(!calRows[tentViewDate])calRows[tentViewDate]={approved:getApproved(tentViewDate),waitlist:[],tent_assignments:{}};
  calRows[tentViewDate].tent_assignments=assignment;
  await saveCalRow(tentViewDate);
  refreshLayoutColors(tentViewDate);
  clearLayoutCache(tentViewDate);
  // Refresh whichever is visible
  if(tab==='tents')renderTents();
  else{renderLayoutAssignPanel(tentViewDate);updateLayoutStats();}
  var count=Object.values(assignment).filter(Boolean).length;
  var returning=v4d.filter(function(v){return lastSpot[v.id]&&assignment[lastSpot[v.id]]===v.id;}).length;
  alert('✅ Auto-assigned '+count+' vendor'+(count!==1?'s':'')+' for '+tentViewDate+'.\n\n'+
    (returning?'↩ '+returning+' vendor'+(returning!==1?'s':'')+' returned to their usual spot.\n':'')+
    '✓ Adjacent spots with the same category were avoided.'
  );
}

// ── LAYOUT (date-specific, spot deletion is local only) ───────────────────
function renderLayout(){
  var el=document.getElementById('main-content');
  // Build date options: all market dates from calRows + any dates with saved layouts
  var marketDates=getMarketDates();
  // Default to first upcoming market date, or today
  if(!layoutDate){
    var today=new Date().toISOString().slice(0,10);
    layoutDate=marketDates.find(function(d){return d>=today;})||marketDates[0]||today;
  }
  var dateOptions=marketDates.map(function(ds){
    var ac=getApproved(ds).length;

    '<span class="layout-badge badge-empty" id="layoutBadge">No layout</span>'+

function drawLayoutGrid(){
  var canvas=document.getElementById('layoutCanvas');if(!canvas)return;
  for(var x=20;x<1400;x+=20)for(var y=20;y<900;y+=20){var d=document.createElement('div');d.className='grid-dot';d.style.cssText='left:'+(x-1)+'px;top:'+(y-1)+'px';canvas.appendChild(d);}
}
function attachLayoutEvents(){
  // Date dropdown
  var dsel=document.getElementById('layoutDateSel');
  var dinp=document.getElementById('layoutDateInput');
  function switchLayoutDate(newDate){
    if(!newDate||newDate===layoutDate)return;
    if(layoutUnsaved&&layoutSpots.length){if(!confirm('Unsaved changes. Switch date?')){if(dsel)dsel.value=layoutDate;return;}}
    layoutDate=newDate;layoutSelectMode=false;
    loadLayoutForDate(layoutDate);
  }
  if(dsel){
    dsel.addEventListener('change',function(){
      if(this.value==='__custom__'){
        // Show manual date input
        dsel.style.display='none';
        if(dinp){dinp.style.display='';dinp.focus();}
      } else {
        switchLayoutDate(this.value);
      }
    });
  }
  if(dinp){
    dinp.addEventListener('change',function(){
      var v=this.value;
      if(v){switchLayoutDate(v);}
      // Hide manual input, re-render to update dropdown
      renderLayout();
    });
    dinp.addEventListener('keydown',function(e){
      if(e.key==='Escape'){renderLayout();}
    });
  }
  var lp=document.getElementById('loadPrevLayoutBtn');if(lp)lp.addEventListener('click',openLoadLayoutModal);
  var lc=document.getElementById('clearLayoutBtn');if(lc)lc.addEventListener('click',function(){if(!layoutSpots.length)return;if(!confirm('Clear all spots from the '+layoutDate+' layout?'))return;clearLayoutCanvas();markLayoutUnsaved();updateLayoutStats();});
  var ls=document.getElementById('lSnapBtn');if(ls)ls.addEventListener('click',function(){layoutSnapOn=!layoutSnapOn;document.getElementById('lSnapLabel').textContent=layoutSnapOn?'on':'off';});
  // Select mode toggle — lets users tap/click spots to add to selection without opening panel
  var lsm=document.getElementById('lSelectModeBtn');
  if(lsm)lsm.addEventListener('click',function(){
    layoutSelectMode=!layoutSelectMode;
    if(!layoutSelectMode){
      // Exiting select mode — clear selection
      layoutSelectedIds.clear();
      layoutSpots.forEach(function(s){var se=document.getElementById('ls-'+s.id);if(se)se.classList.remove('lsel');});
    }
    updateLayoutToolbar();
  });
  var lcs=document.getElementById('lClearSelBtn');if(lcs)lcs.addEventListener('click',function(){layoutSelectedIds.clear();layoutSpots.forEach(function(s){var se=document.getElementById('ls-'+s.id);if(se)se.classList.remove('lsel');});updateLayoutToolbar();});
  var lds=document.getElementById('lDelSelBtn');if(lds)lds.addEventListener('click',function(){
    if(!layoutSelectedIds.size)return;
    if(!confirm('Remove '+layoutSelectedIds.size+' spot'+(layoutSelectedIds.size!==1?'s':'')+' from '+layoutDate+' layout only?'))return;
    Array.from(layoutSelectedIds).forEach(function(id){removeLayoutSpotLocal(id);});
    markLayoutUnsaved();updateLayoutStats();updateLayoutToolbar();
  });
  var lsv=document.getElementById('saveLayoutBtn');if(lsv)lsv.addEventListener('click',saveLayoutForDate);
  var la=document.getElementById('addLSpotBtn');if(la)la.addEventListener('click',function(){openAddLayoutModal(false);});
  var lr=document.getElementById('addLRowBtn');if(lr)lr.addEventListener('click',function(){openAddLayoutModal(true);});
  var canvas=document.getElementById('layoutCanvas');
  if(canvas)canvas.addEventListener('click',function(e){
    if(e.target!==this)return; // only fires on canvas background itself
    layoutSelectedIds.clear();
    layoutSpots.forEach(function(s){var se=document.getElementById('ls-'+s.id);if(se)se.classList.remove('lsel');});
    updateLayoutToolbar();
  });
}
function clearLayoutCanvas(){
  layoutSpots.forEach(function(s){var el=document.getElementById('ls-'+s.id);if(el)el.remove();});
  layoutSpots=[];layoutSelectedIds.clear();
}
function updateLayoutBadge(state){
  var el=document.getElementById('layoutBadge');if(!el)return;
  el.className='layout-badge';
  if(state==='saved'){el.classList.add('badge-saved');el.textContent='Layout saved';}
  else if(state==='unsaved'){el.classList.add('badge-unsaved');el.textContent='Unsaved changes';}
  else{el.classList.add('badge-empty');el.textContent='No layout for this date';}
}
function markLayoutUnsaved(){layoutUnsaved=true;updateLayoutBadge('unsaved');}
function updateLayoutToolbar(){

      '<div class="stat"><div class="sl">Match</div><div class="sv" style="color:#27500A">✓</div></div>')+
    '<div class="stat"><div class="sl">Assigned</div><div class="sv" style="color:#27500A">'+occ+'</div></div>'+

// Sync layout canvas spot colors + vendor labels with current tent assignments.
// Call this whenever an assignment changes (from Assignments tab or auto-assign)
// so the canvas always reflects the latest state without a full reload.
function refreshLayoutColors(ds){
  // Only update if the layout canvas is currently showing this date
  if(!layoutSpots.length||layoutDate!==ds)return;
  var ta=getTentAssignments(ds);
  layoutSpots.forEach(function(sp){
    // Match spot to assignment by spot id
    var vid=ta[sp.id]||null;
    var v=vid?vendors.find(function(x){return x.id===vid;}):null;
    // Update in-memory spot data
    sp.vendorId=vid||'';
    sp.vendorName=v?v.businessName:'';
    sp.vendorCat=v?v.category:'';
    sp.vendorInactive=v&&v.vendorStatus==='inactive';
    // Update the DOM element directly — no full re-render needed
    var el=document.getElementById('ls-'+sp.id);
    if(!el)return;
    var dims=LSIZES[sp.size]||LSIZES['10x10'];
    if(v){
      var cc=catColor(v.category);
      el.style.background=cc.bg;
      el.style.borderColor=cc.border;
      el.style.borderWidth='1.5px';
    } else {
      el.style.background='';
      el.style.borderColor='';
      el.style.borderWidth='';
    }
    // Re-render inner content (vendor name, category, hint text)
    el.innerHTML=
      '<button class="lspot-del" title="Remove from this date only">×</button>'+
      '<div class="lspot-num">Spot '+sp.num+'</div>'+
      '<div class="lspot-size">'+dims.label+'</div>'+
      (sp.vendorName
        ?'<div class="lspot-vendor" style="color:'+(sp.vendorCat?catColor(sp.vendorCat).text:'#27500A')+'">'+esc(sp.vendorName)+'</div>'+
          (sp.vendorInactive
            ?'<div style="font-size:8px;color:#791F1F;font-weight:600">⚠️ Inactive</div>'
            :'<div class="lspot-cat">'+esc(sp.vendorCat)+'</div>')+
          '<div style="font-size:8px;color:#aaa;margin-top:3px;text-align:center">click · drag to move</div>'
        :'<div style="font-size:9px;color:#aaa;margin-top:6px;text-align:center">click to assign</div>');
    // Re-attach delete button handler
    var delBtn=el.querySelector('.lspot-del');
    if(delBtn)delBtn.addEventListener('click',function(e){
      e.stopPropagation();
      removeLayoutSpotLocal(sp.id);markLayoutUnsaved();updateLayoutStats();updateLayoutToolbar();
    });
  });
  updateLayoutStats();
}
async function loadLayoutForDate(ds){
  clearLayoutCanvas();
  if(!ds){updateLayoutBadge('empty');updateLayoutStats();return;}

  var loaded=false;
  // Load from Supabase first, localStorage fallback
  var savedSpots=null;
  try{
    var{data,error}=await sb.from('layouts').select('spots').eq('date',ds).single();
    if(!error&&data&&data.spots&&data.spots.length)savedSpots=data.spots;
  }catch(e){}
  if(!savedSpots){
    try{var ls=localStorage.getItem('eb_layout_'+ds);if(ls)savedSpots=JSON.parse(ls);}catch(e){}
  }
  if(savedSpots&&savedSpots.length){
    var ta=getTentAssignments(ds);
    savedSpots.forEach(function(sp){
      var vid=ta[sp.id]||sp.vendorId||null;
      var v=vid?vendors.find(function(x){return x.id===vid;}):null;
      addLayoutSpot({
        id:sp.id,num:sp.num,size:sp.size,x:sp.x,y:sp.y,w:sp.w,h:sp.h,
        vendorId:vid||'',
        vendorName:v?v.businessName:'',
        vendorCat:v?v.category:'',
        vendorInactive:v&&v.vendorStatus==='inactive'
      });
    });
    // Update cache
    window._layoutCache=window._layoutCache||{};
    window._layoutCache[ds]=savedSpots;
    updateLayoutBadge('saved');
    loaded=true;
  }

  if(!loaded){
    // No saved layout — create one spot per vendor scheduled for this date.
    // Check both calRows (calendar tab assignments) and vendor.selectedDates (vendor form chips)
    var approvedIds=getApproved(ds);
    // Also include any vendors who have this date in selectedDates but may not be in calRows yet
    vendors.forEach(function(v){
      if(v.status==='approved'&&(v.selectedDates||[]).indexOf(ds)>-1&&approvedIds.indexOf(v.id)===-1){
        approvedIds=approvedIds.concat([v.id]);
        // Sync calRows too
        if(!calRows[ds])calRows[ds]={approved:[],waitlist:[],tent_assignments:{}};
        if(calRows[ds].approved.indexOf(v.id)===-1)calRows[ds].approved.push(v.id);
      }
    });
    var count=approvedIds.length;
    if(count>0){
      var COLS=5,GAP=10,START_X=60,START_Y=60;
      var dims=LSIZES['10x10'];
      for(var i=0;i<count;i++){
        var col=i%COLS,row=Math.floor(i/COLS);
        addLayoutSpot({
          num:i+1,size:'10x10',
          x:START_X+col*(dims.w+GAP),
          y:START_Y+row*(dims.h+GAP+16),
          w:dims.w,h:dims.h,
          vendorId:'',vendorName:'',vendorCat:'',vendorInactive:false
        });
      }
      updateLayoutBadge('unsaved');
      layoutUnsaved=true;
      var canvas=document.getElementById('layoutCanvas');
      if(canvas){
        var hint=document.createElement('div');
        hint.style.cssText='position:absolute;top:10px;left:50%;transform:translateX(-50%);background:#fef9c3;border:.5px solid #eab308;border-radius:8px;padding:6px 14px;font-size:11px;color:#a16207;white-space:nowrap;z-index:50;pointer-events:none;font-family:inherit';
        hint.textContent='✓ '+count+' spot'+(count!==1?'s':'')+' auto-created — one per vendor scheduled for this date. Drag to arrange, then Save layout.';
        canvas.appendChild(hint);
        setTimeout(function(){if(hint.parentNode)hint.parentNode.removeChild(hint);},5000);
      }
    } else {
      updateLayoutBadge('empty');
    }
  }
  if(loaded)layoutUnsaved=false;
  updateLayoutStats();updateLayoutToolbar();
  // Render vendor assignment panel below canvas
  renderLayoutAssignPanel(ds);
}

function addLayoutSpot(data){
  var dims=LSIZES[data.size]||LSIZES['10x10'];
  var sp={
    id:data.id||uid(),num:data.num||getNextLayoutNum(),
    size:data.size||'10x10',x:data.x||60,y:data.y||60,
    w:data.w||dims.w,h:data.h||dims.h,
    vendorId:data.vendorId||'',
    vendorName:data.vendorName||'',
    vendorCat:data.vendorCat||'',
    vendorInactive:data.vendorInactive||false
  };
  layoutSpots.push(sp);renderLayoutSpot(sp);return sp;
}
function getNextLayoutNum(){var used=new Set(layoutSpots.map(function(s){return s.num;}));var n=1;while(used.has(n))n++;return n;}
function renderLayoutSpot(sp){
  var existing=document.getElementById('ls-'+sp.id);if(existing)existing.remove();
  var el=document.createElement('div');
  el.id='ls-'+sp.id;
  el.className='lspot'+(sp.size==='truck'?' ltruck':'')+(layoutSelectedIds.has(sp.id)?' lsel':'');
  el.style.cssText='left:'+sp.x+'px;top:'+sp.y+'px;width:'+sp.w+'px;height:'+sp.h+'px';
  if(sp.vendorName){var lcc=catColor(sp.vendorCat);el.style.background=lcc.bg;el.style.borderColor=lcc.border;el.style.borderWidth='1.5px';}
  var dims=LSIZES[sp.size]||LSIZES['10x10'];
  el.innerHTML=
    '<button class="lspot-del" title="Remove from this date only">×</button>'+
    '<div class="lspot-num">Spot '+sp.num+'</div>'+
    '<div class="lspot-size">'+dims.label+'</div>'+
    (sp.vendorName
      ?'<div class="lspot-vendor" style="color:'+(sp.vendorCat?catColor(sp.vendorCat).text:'#27500A')+'">'+esc(sp.vendorName)+'</div>'+
        (sp.vendorInactive
          ?'<div style="font-size:8px;color:#791F1F;font-weight:600">⚠️ Inactive</div>'
          :'<div class="lspot-cat">'+esc(sp.vendorCat)+'</div>')+
        '<div style="font-size:8px;color:#aaa;margin-top:3px;text-align:center">click · drag to move</div>'
      :'<div style="font-size:9px;color:#aaa;margin-top:6px;text-align:center">click to assign</div>');
  document.getElementById('layoutCanvas').appendChild(el);

  // Delete removes from THIS layout only
  el.querySelector('.lspot-del').addEventListener('click',function(e){
    e.stopPropagation();
    removeLayoutSpotLocal(sp.id);markLayoutUnsaved();updateLayoutStats();updateLayoutToolbar();
  });

  // ── Unified pointer handler — works on mouse (desktop) and touch (iOS/iPad) ──
  // Measures movement distance: < 8px = tap/click, >= 8px = drag.
  // Touch events use changedTouches[0] for coordinates.
  function startInteraction(startX, startY, isCtrl){
    var totalDist=0, isDrag=false;
    if(!isCtrl){
      if(!layoutSelectedIds.has(sp.id)){
        layoutSelectedIds.clear();
        layoutSpots.forEach(function(s){var se=document.getElementById('ls-'+s.id);if(se)se.classList.remove('lsel');});
        layoutSelectedIds.add(sp.id);el.classList.add('lsel');updateLayoutToolbar();
      }
    }
    var orig={};
    layoutSelectedIds.forEach(function(sid){
      var s=layoutSpots.find(function(x){return x.id===sid;});
      if(s)orig[sid]={x:s.x,y:s.y};
    });
    orig[sp.id]=orig[sp.id]||{x:sp.x,y:sp.y};

    function doMove(cx,cy){
      var dx=cx-startX,dy=cy-startY;
      totalDist=Math.sqrt(dx*dx+dy*dy);
      if(totalDist>8){
        isDrag=true;
        el.classList.add('dragging');
        layoutSelectedIds.forEach(function(sid){
          var s=layoutSpots.find(function(x){return x.id===sid;});if(!s)return;
          var o=orig[sid];if(!o)return;
          s.x=Math.max(0,snapV(o.x+dx));
          s.y=Math.max(0,snapV(o.y+dy));
          var se=document.getElementById('ls-'+sid);
          if(se){se.style.left=s.x+'px';se.style.top=s.y+'px';}
        });
      }
    }

    function doEnd(){
      el.classList.remove('dragging');
      if(isDrag){
        markLayoutUnsaved();
      } else {
        if(isCtrl){
          if(layoutSelectedIds.has(sp.id)){layoutSelectedIds.delete(sp.id);el.classList.remove('lsel');}
          else{layoutSelectedIds.add(sp.id);el.classList.add('lsel');}
          updateLayoutToolbar();
        } else {
          layoutSelectedIds.clear();
          layoutSpots.forEach(function(s){var se=document.getElementById('ls-'+s.id);if(se)se.classList.remove('lsel');});
          updateLayoutToolbar();
          openLayoutSpotPanel(sp);
        }
      }
    }

    // Mouse events
    function onMouseMove(ev){doMove(ev.clientX,ev.clientY);}
    function onMouseUp(){
      document.removeEventListener('mousemove',onMouseMove);
      document.removeEventListener('mouseup',onMouseUp);
      doEnd();
    }

    // Touch events
    function onTouchMove(ev){
      ev.preventDefault(); // prevent page scroll while dragging spot
      var t=ev.changedTouches[0];
      doMove(t.clientX,t.clientY);
    }
    function onTouchEnd(ev){
      el.removeEventListener('touchmove',onTouchMove);
      el.removeEventListener('touchend',onTouchEnd);
      doEnd();
    }

    return {
      attachMouse: function(){
        document.addEventListener('mousemove',onMouseMove);
        document.addEventListener('mouseup',onMouseUp);
      },
      attachTouch: function(){
        el.addEventListener('touchmove',onTouchMove,{passive:false});
        el.addEventListener('touchend',onTouchEnd);
      }
    };
  }

  // Mouse start
  el.addEventListener('mousedown',function(e){
    if(e.target.classList.contains('lspot-del'))return;
    e.preventDefault();e.stopPropagation();
    var h=startInteraction(e.clientX,e.clientY,e.ctrlKey||e.metaKey||layoutSelectMode);
    h.attachMouse();
  });

  // Touch start (iOS / iPad)
  el.addEventListener('touchstart',function(e){
    if(e.target.classList.contains('lspot-del'))return;
    e.stopPropagation();
    var t=e.changedTouches[0];
    var h=startInteraction(t.clientX,t.clientY,layoutSelectMode);
    h.attachTouch();
  },{passive:true});
}
// KEY: only removes from local array + DOM — no Supabase delete, no global effect
function removeLayoutSpotLocal(id){
  layoutSpots=layoutSpots.filter(function(s){return s.id!==id;});
  layoutSelectedIds.delete(id);
  var el=document.getElementById('ls-'+id);if(el)el.remove();
}

// ── Layout spot panel — click a spot to assign vendor or edit their record ──
function openLayoutSpotPanel(sp){
  var v=sp.vendorId?vendors.find(function(x){return x.id===sp.vendorId;}):null;
  var eligible=eligibleVendors();
  // Also include currently assigned vendor even if not "eligible" (e.g. now inactive)
  if(v&&!eligible.find(function(e){return e.id===v.id;}))eligible=eligible.concat([v]);
  var cc=v?catColor(v.category):null;

  document.getElementById('modal-area').innerHTML=
    '<div class="overlay" id="lspOverlay" style="align-items:center"><div class="modal md" style="max-height:90vh;overflow-y:auto;padding:0;width:100%;max-width:520px">'+
    '<div class="mtitle" style="padding:1rem 1.25rem;border-bottom:.5px solid #e5e3de;margin:0">⛺ Spot '+sp.num+' — '+layoutDate+'</div>'+
    '<div style="padding:1rem 1.25rem">'+

    // Current vendor card (if assigned)
    (v?

async function saveLayoutForDate(){
  if(!layoutDate){alert('Select a market date first.');return;}
  var btn=document.getElementById('saveLayoutBtn');if(btn){btn.disabled=true;btn.textContent='Saving…';}
  try{
    var spots=layoutSpots.map(function(s){return{id:s.id,num:s.num,size:s.size,x:s.x,y:s.y,w:s.w,h:s.h,vendorId:s.vendorId||'',vendorName:s.vendorName||'',vendorCat:s.vendorCat||'',vendorInactive:s.vendorInactive||false};});
    // Save to Supabase layouts table (primary)
    var{error}=await sb.from('layouts').upsert({date:layoutDate,spots:spots,modified_at:nowISO()});
    if(error)throw new Error(error.message);
    // Also save to localStorage as offline fallback
    try{localStorage.setItem('eb_layout_'+layoutDate,JSON.stringify(spots));}catch(e){}
    // Update cache
    window._layoutCache=window._layoutCache||{};
    window._layoutCache[layoutDate]=spots;
    layoutUnsaved=false;updateLayoutBadge('saved');
    if(btn){btn.textContent='✅ Saved!';setTimeout(function(){btn.textContent='💾 Save layout for date';btn.disabled=false;},1500);}
  }catch(e){alert('Save failed: '+e.message);if(btn){btn.disabled=false;btn.textContent='💾 Save layout for date';}}
}
async function openLoadLayoutModal(){
  if(layoutUnsaved&&layoutSpots.length){if(!confirm('Unsaved changes. Load anyway?'))return;}
  // Load all saved layouts from Supabase
  var items=[];
  try{
    var{data,error}=await sb.from('layouts').select('date,spots,modified_at').order('date',{ascending:false});
    if(!error&&data)items=data.filter(function(r){return r.date!==layoutDate&&r.spots&&r.spots.length;});
  }catch(e){}
  // Fallback: localStorage
  if(!items.length){
    try{
      var ls=localStorage.getItem('eb_layout_dates');
      var dl=ls?JSON.parse(ls):[];
      for(var i=0;i<dl.length;i++){
        if(dl[i]===layoutDate)continue;
        var s=localStorage.getItem('eb_layout_'+dl[i]);
        if(s)items.push({date:dl[i],spots:JSON.parse(s)});
      }
    }catch(e){}
  }
  if(!items.length){alert('No saved layouts from other dates yet. Save a layout first.');return;}
  document.getElementById('modal-area').innerHTML='<div class="overlay" id="loadLayoutOverlay"><div class="modal md"><div class="mtitle">⏪ Load layout from previous date</div><div class="notice">Spot positions will be copied to <strong>'+layoutDate+'</strong>. Vendor assignments are cleared — spots start blank.</div>'+
    (items.length?items.map(function(item){var n10=item.spots.filter(function(s){return s.size==='10x10';}).length,n20=item.spots.filter(function(s){return s.size==='20x20';}).length,ntr=item.spots.filter(function(s){return s.size==='truck';}).length;

    }).join(''):'<div style="text-align:center;padding:1.5rem;color:#aaa;font-size:12px">No saved layouts found.</div>')+
    '<div class="mfoot"><button class="btn-s" id="loadLayoutCancel">Cancel</button></div></div></div>';

function sortIcon(col){
  if(reportSortCol!==col)return'<span style="color:#ccc;font-size:9px;margin-left:3px">⇅</span>';
  return'<span style="color:#1a1a1a;font-size:9px;margin-left:3px">'+(reportSortDir===1?'↑':'↓')+'</span>';
}

function sortVendors(list,col){
  if(!col)return list;
  return list.slice().sort(function(a,b){
    var av,bv;
    if(col==='name'){av=a.businessName||'';bv=b.businessName||'';}
    else if(col==='status'){av=a.vendorStatus||'';bv=b.vendorStatus||'';}
    else if(col==='sched'){av=a.status||'';bv=b.status||'';}
    else if(col==='contract'){av=a.contractReceived?1:0;bv=b.contractReceived?1:0;return(bv-av)*reportSortDir;}
    else if(col==='payment'){av=a.paymentReceived?1:0;bv=b.paymentReceived?1:0;return(bv-av)*reportSortDir;}
    else if(col==='category'){av=a.category||'';bv=b.category||'';}
    else if(col==='dates'){av=(a.selectedDates||[]).length;bv=(b.selectedDates||[]).length;return(av-bv)*reportSortDir;}
    else{av='';bv='';}
    return av.localeCompare(bv)*reportSortDir;
  });
}

var STRIPE_PK='';// Set your Stripe publishable key here when ready
var STRIPE_PRICE_ID='';// Optional: your Stripe Price ID for booth fee product

// ── Stripe config — fill these in after creating your account ────────────
// STRIPE_PK: your publishable key from stripe.com/dashboard → API keys
// SUPABASE_FUNCTIONS_URL: your Supabase project functions endpoint
var STRIPE_PK='';  // e.g. 'pk_live_...' or 'pk_test_...'
var SUPABASE_FN_URL=(IS_LIVE?SUPA_URL_LIVE:SUPA_URL_DEV)+'/functions/v1';
// Supabase anon key (JWT) — needed to call Edge Functions.
var SUPA_ANON_KEY=IS_LIVE?SUPA_KEY_LIVE:SUPA_KEY_DEV;

var stripeLoaded=false;
var stripeInstance=null;

// Load Stripe.js and Connect.js once
function loadStripeScripts(cb){
  if(stripeLoaded){cb();return;}
  var s1=document.createElement('script');
  s1.src='https://js.stripe.com/v3/';
  s1.onload=function(){
    var s2=document.createElement('script');
    s2.src='https://connect-js.stripe.com/v1.0/connect.js';
    s2.onload=function(){stripeLoaded=true;cb();};
    document.head.appendChild(s2);
  };
  document.head.appendChild(s1);
}

// Fetch a session token from our Edge Function
async function fetchStripeSession(){
  var res=await fetch(SUPABASE_FN_URL+'/stripe-session',{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SUPA_ANON_KEY||SUPA_KEY,'Authorization':'Bearer '+(SUPA_ANON_KEY||SUPA_KEY)},
    body:JSON.stringify({action:'dashboard_session'})
  });
  var data=await res.json();
  if(data.error)throw new Error(data.error);
  return data.client_secret;
}

// Generate a Stripe payment link for a vendor via Edge Function
async function generatePaymentLink(v){
  if(!v.boothFee||v.boothFee<=0){alert('Set a booth fee for this vendor first.');return null;}
  var res=await fetch(SUPABASE_FN_URL+'/stripe-session',{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SUPA_ANON_KEY||SUPA_KEY,'Authorization':'Bearer '+(SUPA_ANON_KEY||SUPA_KEY)},
    body:JSON.stringify({action:'create_payment_link',vendorId:v.id,vendorName:v.businessName,amount:v.boothFee})
  });
  var data=await res.json();
  if(data.error){alert('Error creating payment link: '+data.error);return null;}
  return data.url;
}

// Mount the embedded Stripe dashboard inside #stripeContainer
function mountStripeDashboard(){
  var container=document.getElementById('stripeContainer');
  if(!container||!STRIPE_PK)return;
  container.innerHTML='<div style="font-size:12px;color:#888;text-align:center;padding:2rem">Connecting to Stripe…</div>';
  loadStripeScripts(async function(){
    try{
      var clientSecret=await fetchStripeSession();
      stripeInstance=window.Stripe(STRIPE_PK);
      var instance=stripeInstance.initEmbeddedCheckout?
        window.StripeConnect.init({publishableKey:STRIPE_PK,fetchClientSecret:function(){return Promise.resolve(clientSecret);}})
        :null;
      // Use Connect.js embedded components
      if(window.StripeConnect){
        var connect=window.StripeConnect.init({
          publishableKey:STRIPE_PK,
          fetchClientSecret:function(){return Promise.resolve(clientSecret);}
        });
        container.innerHTML='';
        // Mount payments component
        var paymentsEl=connect.create('payments');
        container.appendChild(paymentsEl);
      } else {
        container.innerHTML='<div style="font-size:12px;color:#791F1F;padding:1rem">Stripe Connect JS failed to load. Check your publishable key and try again.</div>';
      }
    }catch(err){
      container.innerHTML='<div style="padding:1rem;font-size:12px;color:#791F1F">'+
        '<strong>Could not connect to Stripe:</strong> '+esc(err.message)+'<br><br>'+
        'Make sure you have:<br>'+
        '1. Set STRIPE_PK in the app script<br>'+
        '2. Deployed the stripe-session Edge Function<br>'+
        '3. Set STRIPE_SECRET_KEY and STRIPE_ACCOUNT_ID in Supabase Edge Function secrets'+
      '</div>';
    }
  });
}

            '<div style="display:flex;gap:4px;flex-wrap:wrap">'+

      '</tbody>'+
    '</table></div></div>'+

    // ── Invoices section ───────────────────────────────────────────────────
    '<div style="margin-top:1.5rem;padding-top:1.25rem;border-top:2px solid #e5e3de" id="invoiceSection">'+
      '<div style="text-align:center;color:#aaa;font-size:12px;padding:1rem">Loading invoices…</div>'+
    '</div>';

  // Mount Stripe embedded dashboard if key is set
  if(STRIPE_PK)setTimeout(function(){mountStripeDashboard();},100);

  // Save booth fee
  el.querySelectorAll('[data-save-fee]').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var vid=btn.dataset.saveFee;
      var inp=el.querySelector('[data-fee-vid="'+vid+'"]');
      var fee=parseFloat(inp?inp.value:0)||0;
      await sb.from('vendors').update({booth_fee:fee}).eq('id',vid);try{await sb.from('vendors').update({modified_at:nowISO()}).eq('id',vid);}catch(e){}
      var v=vendors.find(function(x){return x.id===vid;});if(v)v.boothFee=fee;
      renderPayments();
    });
  });

  // Mark paid / unpaid
  el.querySelectorAll('[data-mark-paid]').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var v=vendors.find(function(x){return x.id===btn.dataset.markPaid;});if(!v)return;
      var newVal=!v.paymentReceived;
      await sb.from('vendors').update({payment_received:newVal}).eq('id',v.id);try{await sb.from('vendors').update({modified_at:nowISO()}).eq('id',v.id);}catch(e){}
      v.paymentReceived=newVal;renderPayments();
    });
  });

  // Email invoice (payment request)
  el.querySelectorAll('[data-send-pay-req]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var v=vendors.find(function(x){return x.id===btn.dataset.sendPayReq;});
      if(!v||!v.email){alert('No email address on file for this vendor.');return;}
      var fee=(v.boothFee||0).toFixed(2);
      sendEmail(
        v.email,
        'Booth fee invoice — Elevation Bend Farmers Market',
        'Hi '+(v.contactName||v.businessName)+'\n\nYour booth fee for the Elevation Bend Farmers Market is $'+fee+'.\n\nPlease arrange payment at your earliest convenience.\n\nThank you,\nElevation Bend Farmers Market'
      );    });
  });

  // Generate Stripe payment link
  el.querySelectorAll('[data-gen-stripe]').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var v=vendors.find(function(x){return x.id===btn.dataset.genStripe;});if(!v)return;
      btn.disabled=true;btn.textContent='Generating…';
      var url=await generatePaymentLink(v);
      btn.disabled=false;btn.textContent='💳 Pay link';
      if(url){
        // Copy link and offer to email it
        navigator.clipboard.writeText(url).catch(function(){});
        if(confirm('Payment link generated and copied to clipboard! Send this link to '+v.businessName+' by email now?')){
          sendEmail(
            v.email||'',
            'Pay your booth fee — Elevation Bend Farmers Market',
            'Hi '+(v.contactName||v.businessName)+'\n\nClick the link below to pay your booth fee of $'+(v.boothFee||0).toFixed(2)+':\n\n'+url+'\n\nNo account needed — just enter your card details.\n\nThank you,\nElevation Bend Farmers Market'
          );
        }
      }
    });
  });

  // Bulk email unpaid
  document.getElementById('payBulkEmailBtn').addEventListener('click',function(){
    var unpaidVendors=approved.filter(function(v){return!v.paymentReceived&&v.email;});
    if(!unpaidVendors.length){alert('No unpaid vendors with email addresses.');return;}
    sendEmail(
      unpaidVendors.map(function(v){return v.email;}).join(','),
      'Booth fee reminder — Elevation Bend Farmers Market',
      'Hi,\n\nThis is a friendly reminder that your booth fee for the Elevation Bend Farmers Market is outstanding.\n\nPlease contact us to arrange payment.\n\nThank you,\nElevation Bend Farmers Market'
    );
  });

  // Bulk generate Stripe links
  document.getElementById('payBulkLinksBtn').addEventListener('click',async function(){
    if(!STRIPE_PK){alert('Set STRIPE_PK in the script to generate payment links.');return;}
    var btn=this;btn.disabled=true;btn.textContent='Generating…';
    var unpaidWithFee=approved.filter(function(v){return!v.paymentReceived&&v.boothFee>0&&v.email;});
    if(!unpaidWithFee.length){btn.disabled=false;btn.textContent='💳 Generate all payment links';alert('No unpaid vendors with a booth fee and email address.');return;}
    var links=[];
    for(var i=0;i<unpaidWithFee.length;i++){
      var v=unpaidWithFee[i];
      var url=await generatePaymentLink(v);
      if(url)links.push(v.businessName+': '+url);
    }
    btn.disabled=false;btn.textContent='💳 Generate all payment links';
    if(links.length){
      var all=links.join('\n');
      navigator.clipboard.writeText(all).catch(function(){});
      alert('Generated '+links.length+' payment link'+(links.length!==1?'s':'')+' (copied to clipboard):\n\n'+all);
    }
  });

  // Export CSV
  document.getElementById('payExportBtn').addEventListener('click',function(){
    var rows=[['Vendor','Email','Category','Booth Fee ($)','Payment Status','Contract']];
    approved.forEach(function(v){
      rows.push([v.businessName||'',v.email||'',v.category||'',(v.boothFee||0).toFixed(2),v.paymentReceived?'Paid':'Unpaid',v.contractReceived?'Received':'Pending']);
    });
    downloadCSV('eb-payments-'+today()+'.csv',rows);
  });

  // ── Render invoices section ──────────────────────────────────────────────
  renderInvoiceSection();
}

// ── INVOICE SYSTEM ────────────────────────────────────────────────────────
var invoices=[];

async function loadInvoices(){
  try{
    var{data,error}=await sb.from('invoices').select('*').order('created_at',{ascending:false});
    if(!error&&data)invoices=data;
  }catch(e){invoices=[];}
}

function feeForBoothSize(boothSize){
  var fees=loadFeeSchedule();
  var map={"10'x10'":fees.t10x10,"20'x20'":fees.t20x20,"10'x20'":fees.t10x20,'Food truck / trailer':fees.ttruck};
  return map[boothSize]||0;
}

function invStatusBadge(status){
  var map={
    draft:  {bg:'#f3f4f6',text:'#555',label:'📝 Draft'},
    sent:   {bg:'#E6F1FB',text:'#0C447C',label:'📧 Sent'},
    paid:   {bg:'#EAF3DE',text:'#27500A',label:'✅ Paid'},
    overdue:{bg:'#FCEBEB',text:'#791F1F',label:'⚠️ Overdue'}
  };
  var s=map[status]||map.draft;
  return'<span style="font-size:10px;padding:2px 9px;border-radius:20px;background:'+s.bg+';color:'+s.text+';font-weight:600">'+s.label+'</span>';
}

async function renderInvoiceSection(){
  await loadInvoices();
  var el=document.getElementById('invoiceSection');
  if(!el)return;

  var dates=getMarketDates();
  var totalInvoiced=invoices.reduce(function(s,i){return s+parseFloat(i.total||0);},0);
  var totalPaid=invoices.filter(function(i){return i.status==='paid';}).reduce(function(s,i){return s+parseFloat(i.total||0);},0);
  var totalOutstanding=invoices.filter(function(i){return i.status!=='paid';}).reduce(function(s,i){return s+parseFloat(i.total||0);},0);

  el.innerHTML=
    // Section header
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:8px">'+
      '<div>'+
        '<div style="font-size:14px;font-weight:700">Invoices</div>'+
        '<div style="font-size:11px;color:#888;margin-top:2px">Generate, send and track booth fee invoices</div>'+
      '</div>'+
      '<div style="display:flex;gap:6px;flex-wrap:wrap">'+
        '<button class="btn-blue" id="invBulkDateBtn">📅 Bulk invoice by date</button>'+
        '<button class="btn-p" id="invNewBtn">+ New invoice</button>'+
      '</div>'+
    '</div>'+

    // Invoice summary cards
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:1rem">'+
      mkPayCard('Total invoiced','$'+totalInvoiced.toFixed(2),'#1a1a1a')+
      mkPayCard('Collected','$'+totalPaid.toFixed(2),'#27500A')+
      mkPayCard('Outstanding','$'+totalOutstanding.toFixed(2),'#791F1F')+
      mkPayCard('Invoices',invoices.length+' total','#0C447C')+
    '</div>'+

    // Invoice list
    (invoices.length===0
      ?'<div class="empty">No invoices yet. Click <strong>+ New invoice</strong> to create one, or <strong>📅 Bulk invoice by date</strong> to generate invoices for all vendors on a market day.</div>'
      :'<div class="report-wrap"><div style="overflow-x:auto"><table class="report-table">'+
        '<thead><tr><th>Invoice #</th><th>Vendor</th><th>Dates</th><th>Amount</th><th>Status</th><th>Due</th><th>Actions</th></tr></thead>'+
        '<tbody>'+
        invoices.map(function(inv){
          var v=vendors.find(function(x){return x.id===inv.vendor_id;});
          var isOverdue=inv.status==='sent'&&inv.due_date&&new Date(inv.due_date)<new Date();
          var displayStatus=isOverdue?'overdue':inv.status;
          var datesArr=inv.dates||[];
          return'<tr>'+
            '<td style="font-size:11px;color:#888;font-weight:600">'+esc(inv.invoice_number||'—')+'</td>'+
            '<td><div style="font-size:12px;font-weight:600">'+esc(v?v.businessName:'Unknown')+'</div>'+
              '<div style="font-size:10px;color:#888">'+esc(v?v.email:'')+'</div></td>'+
            '<td style="font-size:11px;color:#555">'+
              (datesArr.length<=2?datesArr.join(', '):(datesArr.length+' dates'))+
            '</td>'+
            '<td style="font-weight:700;font-size:13px">$'+parseFloat(inv.total||0).toFixed(2)+'</td>'+
            '<td>'+invStatusBadge(displayStatus)+'</td>'+
            '<td style="font-size:11px;color:'+(isOverdue?'#791F1F':'#888')+'">'+
              (inv.due_date?inv.due_date:'—')+
            '</td>'+
            '<td>'+
              '<div style="display:flex;gap:4px;flex-wrap:wrap">'+
                '<button class="btn-s" style="font-size:10px;padding:3px 7px" data-inv-pdf="'+inv.id+'">📄 PDF</button>'+
                (inv.status!=='paid'?'<button class="btn-blue" style="font-size:10px;padding:3px 7px" data-inv-send="'+inv.id+'">📧 Send</button>':'')+ 
                (inv.status!=='paid'&&STRIPE_PK?'<button class="btn-g" style="font-size:10px;padding:3px 7px" data-inv-stripe="'+inv.id+'">'+(inv.stripe_payment_link?'🔗 Link ✓':'💳 Pay link')+'</button>':'')+
                (inv.status!=='paid'?'<button class="btn-p" style="font-size:10px;padding:3px 7px" data-inv-paid="'+inv.id+'">✓ Mark paid</button>':
                  '<button class="btn-s" style="font-size:10px;padding:3px 7px" data-inv-unpaid="'+inv.id+'">↩ Unmark</button>')+
                '<button class="btn-danger" style="font-size:10px;padding:3px 7px" data-inv-del="'+inv.id+'">✕</button>'+
              '</div>'+
            '</td>'+
          '</tr>';
        }).join('')+
        '</tbody></table></div></div>');

  // Button events
  document.getElementById('invNewBtn').addEventListener('click',function(){openInvoiceModal(null);});
  document.getElementById('invBulkDateBtn').addEventListener('click',openBulkInvoiceModal);

  // Invoice action buttons
  el.querySelectorAll('[data-inv-stripe]').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var inv=invoices.find(function(x){return x.id===btn.dataset.invStripe;});
      if(!inv)return;
      var v=vendors.find(function(x){return x.id===inv.vendor_id;});if(!v)return;
      btn.disabled=true;btn.textContent='Generating…';
      // Use invoice total for the payment link amount
      var total=parseFloat(inv.total||0);
      if(total<=0){alert('Invoice total is $0 — set a booth fee first.');btn.disabled=false;btn.textContent='💳 Pay link';return;}
      var res=await fetch(SUPABASE_FN_URL+'/stripe-session',{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':SUPA_ANON_KEY||SUPA_KEY,'Authorization':'Bearer '+(SUPA_ANON_KEY||SUPA_KEY)},
        body:JSON.stringify({action:'create_payment_link',vendorId:v.id,vendorName:v.businessName,amount:total})
      });
      var data=await res.json();
      btn.disabled=false;
      if(data.error){alert('Error: '+data.error);btn.textContent='💳 Pay link';return;}
      var url=data.url;
      // Save link to invoice
      await sb.from('invoices').update({stripe_payment_link:url,modified_at:nowISO()}).eq('id',inv.id);
      inv.stripe_payment_link=url;
      btn.textContent='🔗 Link ✓';
      navigator.clipboard.writeText(url).catch(function(){});
      alert('Payment link generated and copied to clipboard!\n\n'+url);
      renderInvoiceSection();
    });
  });
  el.querySelectorAll('[data-inv-pdf]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var inv=invoices.find(function(x){return x.id===btn.dataset.invPdf;});
      if(inv)generateInvoicePDF(inv);
    });
  });
  el.querySelectorAll('[data-inv-send]').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var inv=invoices.find(function(x){return x.id===btn.dataset.invSend;});
      if(!inv)return;
      var v=vendors.find(function(x){return x.id===inv.vendor_id;});
      if(!v||!v.email){alert('No email on file for this vendor.');return;}
      // Generate and show PDF, then open email
      generateInvoicePDF(inv);
      sendEmail(v.email,'Invoice #'+inv.invoice_number+' — Elevation Bend Farmers Market',
        'Hi '+(v.contactName||v.businessName)+',\n\nPlease find attached your invoice for the Elevation Bend Farmers Market.\n\nInvoice #: '+inv.invoice_number+'\nAmount due: $'+parseFloat(inv.total||0).toFixed(2)+'\nDue date: '+(inv.due_date||'Upon receipt')+'\n\n'+(inv.stripe_payment_link?'Pay online: '+inv.stripe_payment_link+'\n\n':'')+
        'Thank you,\nElevation Bend Farmers Market');
      // Mark as sent
      await sb.from('invoices').update({status:'sent',sent_at:nowISO(),modified_at:nowISO()}).eq('id',inv.id);
      inv.status='sent';inv.sent_at=nowISO();
      renderInvoiceSection();
    });
  });
  el.querySelectorAll('[data-inv-paid]').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var inv=invoices.find(function(x){return x.id===btn.dataset.invPaid;});
      if(!inv)return;
      await sb.from('invoices').update({status:'paid',paid_at:nowISO(),modified_at:nowISO()}).eq('id',inv.id);
      // Also mark vendor as paid
      var v=vendors.find(function(x){return x.id===inv.vendor_id;});
      if(v){v.paymentReceived=true;await sb.from('vendors').update({payment_received:true}).eq('id',v.id);}
      inv.status='paid';inv.paid_at=nowISO();
      renderInvoiceSection();renderPayments();
    });
  });
  el.querySelectorAll('[data-inv-unpaid]').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var inv=invoices.find(function(x){return x.id===btn.dataset.invUnpaid;});
      if(!inv)return;
      await sb.from('invoices').update({status:'sent',paid_at:null,modified_at:nowISO()}).eq('id',inv.id);
      inv.status='sent';inv.paid_at=null;
      renderInvoiceSection();
    });
  });
  el.querySelectorAll('[data-inv-del]').forEach(function(btn){
    btn.addEventListener('click',async function(){
      if(!confirm('Delete this invoice? This cannot be undone.'))return;
      await sb.from('invoices').delete().eq('id',btn.dataset.invDel);
      invoices=invoices.filter(function(x){return x.id!==btn.dataset.invDel;});
      renderInvoiceSection();
    });
  });
}

function nextInvoiceNumber(){
  var nums=invoices.map(function(i){return parseInt((i.invoice_number||'0').replace(/[^0-9]/g,''))||0;});
  var max=nums.length?Math.max.apply(null,nums):0;
  return 'INV-'+String(max+1).padStart(4,'0');
}

function openInvoiceModal(vendorId){
  var approved=vendors.filter(function(v){return v.status==='approved';});
  var fees=loadFeeSchedule();
  var preV=vendorId?vendors.find(function(v){return v.id===vendorId;}):null;

  document.getElementById('modal-area').innerHTML=
    '<div class="overlay" id="invModalOverlay"><div class="modal md" style="max-height:90vh;overflow-y:auto">'+
    '<div class="mtitle">New invoice</div>'+
    '<div class="fg"><label>Vendor</label>'+
      '<select id="invVendorSel" style="width:100%;border:.5px solid #d0cec7;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit">'+
        '<option value="">— Select vendor —</option>'+
        approved.map(function(v){return'<option value="'+v.id+'"'+(preV&&preV.id===v.id?' selected':'')+'>'+esc(v.businessName||'Unnamed')+'</option>';}).join('')+
      '</select></div>'+
    '<div id="invVendorDetails" style="margin-bottom:.65rem"></div>'+
    '<div class="fg"><label>Dates to include <span style="font-weight:400;color:#aaa">— check all market dates for this invoice</span></label>'+
      '<div style="max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;border:.5px solid #e5e3de;border-radius:8px;padding:6px" id="invDateList">'+
        '<div style="font-size:11px;color:#aaa;padding:.5rem;text-align:center">Select a vendor first</div>'+
      '</div></div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.65rem">'+
      '<div class="fg"><label>Due date</label><input type="date" id="invDueDate" style="width:100%;border:.5px solid #d0cec7;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit"></div>'+
      '<div class="fg"><label>Invoice #</label><input id="invNumber" value="'+nextInvoiceNumber()+'" style="width:100%;border:.5px solid #d0cec7;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit"></div>'+
    '</div>'+
    '<div class="fg"><label>Notes <span style="font-weight:400;color:#aaa">optional</span></label><textarea id="invNotes" style="height:60px;font-size:13px" placeholder="Payment terms, bank details, etc."></textarea></div>'+
    '<div style="background:#f8f7f4;border-radius:8px;padding:.75rem;margin-bottom:.65rem" id="invTotalPreview"><div style="font-size:12px;color:#888">Select a vendor and dates to see total</div></div>'+
    '<div class="mfoot" id="invModalFoot"></div>'+
    '</div></div>';

  document.getElementById('invModalOverlay').addEventListener('click',function(e){if(e.target===this)closeMod();});

  function refreshVendorDetails(){
    var vid=document.getElementById('invVendorSel').value;
    var v=vid?vendors.find(function(x){return x.id===vid;}):null;
    var det=document.getElementById('invVendorDetails');
    var dateList=document.getElementById('invDateList');
    if(!v){det.innerHTML='';dateList.innerHTML='<div style="font-size:11px;color:#aaa;padding:.5rem;text-align:center">Select a vendor first</div>';updateTotal();return;}
    var cc=catColor(v.category);
    det.innerHTML='<div style="background:'+cc.bg+';border:.5px solid '+cc.border+';border-radius:8px;padding:.6rem .85rem;display:flex;gap:10px;align-items:center">'+
      '<div><div style="font-size:12px;font-weight:600;color:'+cc.text+'">'+esc(v.businessName)+'</div>'+
      '<div style="font-size:10px;color:'+cc.text+';opacity:.7">'+esc(v.category||'')+(v.boothSize?' · '+esc(v.boothSize):'')+(v.email?' · '+esc(v.email):'')+'</div></div>'+
      '<div style="margin-left:auto;font-size:11px;font-weight:600;color:'+cc.text+'">Fee: $'+feeForBoothSize(v.boothSize).toFixed(2)+' / date</div>'+
    '</div>';
    // Show vendor's scheduled dates
    var vDates=getMarketDates().filter(function(ds){return getApproved(ds).indexOf(v.id)>-1;});
    if(!vDates.length){dateList.innerHTML='<div style="font-size:11px;color:#aaa;padding:.5rem;text-align:center">No market dates scheduled for this vendor</div>';updateTotal();return;}
    dateList.innerHTML=vDates.map(function(ds){
      return'<label style="display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;cursor:pointer">'+

        '<span style="font-size:12px;font-weight:500">'+ds+'</span>'+
        '<span style="font-size:10px;color:#888;margin-left:auto">$'+feeForBoothSize(v.boothSize).toFixed(2)+'</span>'+
      '</label>';
    }).join('');
    document.querySelectorAll('.inv-date-cb').forEach(function(cb){cb.addEventListener('change',updateTotal);});
    updateTotal();
  }

  function updateTotal(){
    var vid=document.getElementById('invVendorSel').value;
    var v=vid?vendors.find(function(x){return x.id===vid;}):null;
    var preview=document.getElementById('invTotalPreview');
    if(!v){preview.innerHTML='<div style="font-size:12px;color:#888">Select a vendor and dates to see total</div>';return;}
    var fee=feeForBoothSize(v.boothSize);
    var checkedDates=Array.from(document.querySelectorAll('.inv-date-cb:checked')).map(function(c){return c.value;});
    var total=fee*checkedDates.length;
    preview.innerHTML=
      '<div style="display:flex;justify-content:space-between;align-items:center">'+
        '<div>'+
          '<div style="font-size:12px;font-weight:600">Invoice total</div>'+
          '<div style="font-size:10px;color:#888;margin-top:2px">'+checkedDates.length+' date'+(checkedDates.length!==1?'s':'')+' × $'+fee.toFixed(2)+' ('+esc(v.boothSize||'booth')+')</div>'+
        '</div>'+
        '<div style="font-size:22px;font-weight:800;color:#27500A">$'+total.toFixed(2)+'</div>'+
      '</div>';
  }

  document.getElementById('invVendorSel').addEventListener('change',refreshVendorDetails);
  if(preV)refreshVendorDetails();

  var canBtn=document.createElement('button');canBtn.className='btn-s';canBtn.textContent='Cancel';canBtn.addEventListener('click',closeMod);
