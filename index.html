    var vid=document.getElementById('invVendorSel').value;
    if(!vid){alert('Please select a vendor.');return;}
    var v=vendors.find(function(x){return x.id===vid;});if(!v)return;
    var checkedDates=Array.from(document.querySelectorAll('.inv-date-cb:checked')).map(function(c){return c.value;});
    if(!checkedDates.length){alert('Please select at least one date.');return;}
    var fee=feeForBoothSize(v.boothSize);
    var total=fee*checkedDates.length;
    var lineItems=checkedDates.map(function(ds){return{date:ds,description:'Booth fee ('+esc(v.boothSize||'standard')+')',amount:fee};});
    var invNum=(document.getElementById('invNumber').value||'').trim()||nextInvoiceNumber();
    var dueDate=document.getElementById('invDueDate').value||null;
    var notes=(document.getElementById('invNotes').value||'').trim();
    // Try to generate Stripe payment link
    var stripeLink='';
    if(STRIPE_PK&&total>0){
      try{
        var res=await fetch(SUPABASE_FN_URL+'/stripe-session',{
          method:'POST',
          headers:{'Content-Type':'application/json','apikey':SUPA_ANON_KEY||SUPA_KEY,'Authorization':'Bearer '+(SUPA_ANON_KEY||SUPA_KEY)},
          body:JSON.stringify({action:'create_payment_link',vendorId:vid,vendorName:v.businessName,amount:total})
        });
        var ldata=await res.json();
        if(ldata.url)stripeLink=ldata.url;
      }catch(e){}
    }
    var row={id:uid(),vendor_id:vid,invoice_number:invNum,dates:checkedDates,line_items:lineItems,subtotal:total,total:total,status:'draft',due_date:dueDate||null,notes:notes,stripe_payment_link:stripeLink,created_at:nowISO(),modified_at:nowISO()};
    var{error}=await sb.from('invoices').upsert(row);
    if(error){alert('Error creating invoice: '+error.message);return;}
    invoices.unshift(row);
    closeMod();
    renderInvoiceSection();
  });
  foot.appendChild(canBtn);foot.appendChild(savBtn);
}

function openBulkInvoiceModal(){
  var dates=getMarketDates();
  if(!dates.length){alert('No market dates scheduled. Go to Calendar and add vendors to a date first.');return;}
  document.getElementById('modal-area').innerHTML=
    '<div class="overlay" id="bulkInvOverlay"><div class="modal sm">'+
    '<div class="mtitle">📅 Bulk invoice by date</div>'+
    '<div style="font-size:11px;color:#888;margin-bottom:.85rem;line-height:1.6">Generates one invoice per approved vendor scheduled for the selected date. Fees are calculated from the booth size fee schedule in the Manage tab.</div>'+
    '<div class="fg"><label>Select market date</label>'+
      '<select id="bulkInvDateSel" style="width:100%;border:.5px solid #d0cec7;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit">'+
        dates.map(function(ds){var n=getApproved(ds).length;return'<option value="'+ds+'">'+ds+' ('+n+' vendor'+(n!==1?'s':'')+' scheduled)</option>';}).join('')+
      '</select></div>'+
    '<div id="bulkInvPreview" style="background:#f8f7f4;border-radius:8px;padding:.75rem;margin-bottom:.65rem;font-size:11px;color:#888">Select a date to preview</div>'+
    '<div class="mfoot" id="bulkInvFoot"></div>'+
    '</div></div>';

  document.getElementById('bulkInvOverlay').addEventListener('click',function(e){if(e.target===this)closeMod();});

  function refreshPreview(){
    var ds=document.getElementById('bulkInvDateSel').value;
    var vids=getApproved(ds);
    var vlist=vids.map(function(id){return vendors.find(function(x){return x.id===id;});}).filter(Boolean);
    var fees=loadFeeSchedule();
    var total=vlist.reduce(function(s,v){return s+feeForBoothSize(v.boothSize);},0);
    var preview=document.getElementById('bulkInvPreview');
    if(!vlist.length){preview.innerHTML='<div style="color:#aaa">No vendors scheduled for this date.</div>';return;}
    preview.innerHTML=
      '<div style="font-weight:600;margin-bottom:6px;font-size:12px">'+vlist.length+' invoice'+(vlist.length!==1?'s':'')+' will be created — total $'+total.toFixed(2)+'</div>'+
      vlist.map(function(v){var fee=feeForBoothSize(v.boothSize);return'<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:.5px solid #e5e3de">'+
        '<span>'+esc(v.businessName||'?')+'<span style="color:#aaa;margin-left:6px">'+esc(v.boothSize||'no size')+'</span></span>'+
        '<span style="font-weight:600">$'+fee.toFixed(2)+'</span>'+
      '</div>';}).join('');
  }

  document.getElementById('bulkInvDateSel').addEventListener('change',refreshPreview);
  refreshPreview();

  var foot=document.getElementById('bulkInvFoot');
  var canBtn=document.createElement('button');canBtn.className='btn-s';canBtn.textContent='Cancel';canBtn.addEventListener('click',closeMod);
  var genBtn=document.createElement('button');genBtn.className='btn-p';genBtn.textContent='Generate invoices';
  genBtn.addEventListener('click',async function(){
    var ds=document.getElementById('bulkInvDateSel').value;
    var vids=getApproved(ds);
    var vlist=vids.map(function(id){return vendors.find(function(x){return x.id===id;});}).filter(Boolean);
    if(!vlist.length){alert('No vendors scheduled for this date.');return;}
    genBtn.disabled=true;genBtn.textContent='Generating…';
    var rows=[];
    for(var i=0;i<vlist.length;i++){
      var v=vlist[i];
      var fee=feeForBoothSize(v.boothSize);
      var stripeLink='';
      if(STRIPE_PK&&fee>0){
        try{
          var res=await fetch(SUPABASE_FN_URL+'/stripe-session',{
            method:'POST',
            headers:{'Content-Type':'application/json','apikey':SUPA_ANON_KEY||SUPA_KEY,'Authorization':'Bearer '+(SUPA_ANON_KEY||SUPA_KEY)},
            body:JSON.stringify({action:'create_payment_link',vendorId:v.id,vendorName:v.businessName,amount:fee})
          });
          var ld=await res.json();
          if(ld.url)stripeLink=ld.url;
        }catch(e){}
      }
      var row={id:uid(),vendor_id:v.id,invoice_number:nextInvoiceNumber(),dates:[ds],line_items:[{date:ds,description:'Booth fee ('+esc(v.boothSize||'standard')+')',amount:fee}],subtotal:fee,total:fee,status:'draft',due_date:null,stripe_payment_link:stripeLink,notes:'',created_at:nowISO(),modified_at:nowISO()};
      rows.push(row);
      invoices.unshift(row);
    }
    // Batch save
    for(var i=0;i<rows.length;i+=10){
      var chunk=rows.slice(i,i+10);
      await sb.from('invoices').upsert(chunk);
    }
    genBtn.disabled=false;
    closeMod();
    renderInvoiceSection();
    alert('✅ Created '+rows.length+' invoice'+(rows.length!==1?'s':'')+' for '+ds+'.');
  });
  foot.appendChild(canBtn);foot.appendChild(genBtn);
}

function renderCommsCompose(){
  var el=document.getElementById('commsContent');
  var dates=getMarketDates();

  el.innerHTML=
    '<div style="background:#fff;border:.5px solid #e5e3de;border-radius:12px;padding:1.25rem">'+

    '<div class="fg"><label>Send to</label>'+
    '<select id="cRecipType" style="width:100%;border:.5px solid #d0cec7;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit">'+
      '<option value="all">All vendors with email ('+allEmails.length+')</option>'+
      '<option value="approved">Approved vendors only</option>'+
      '<option value="unpaid">Unpaid approved vendors</option>'+
      '<option value="nocontract">Missing contract</option>'+
      (dates.length?'<optgroup label="By market date">'+dates.map(function(ds){return'<option value="date:'+ds+'">Vendors for '+ds+'</option>';}).join('')+'</optgroup>':'')+
      (vendorGroups.length?'<optgroup label="By group">'+vendorGroups.map(function(g){return'<option value="group:'+g.id+'">Group: '+esc(g.name)+'</option>';}).join('')+'</optgroup>':'')+
      Object.keys(CAT_COLORS).map(function(cat){return'<option value="cat:'+cat+'">Category: '+cat.split(' / ')[0]+'</option>';}).join('')+
    '</select></div>'+

    '<div class="fg" id="cRecipPreview" style="font-size:11px;color:#888;padding:.4rem .6rem;background:#f8f7f4;border-radius:6px;margin-top:-8px"></div>'+

    '<div class="fg"><label>Subject</label><input id="cSubject" value="Elevation Bend Farmers Market" style="width:100%;border:.5px solid #d0cec7;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit"></div>'+
    '<div class="fg"><label>Message</label><textarea id="cBody" style="width:100%;height:160px;border:.5px solid #d0cec7;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;resize:vertical" placeholder="Type your message here…"></textarea></div>'+

    '<div style="display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap">'+
      '<button class="btn-s" id="cCopyEmails">📋 Copy addresses</button>'+
      '<button class="btn-p" id="cSendBtn">📧 Open in mail app</button>'+
    '</div></div>';

  function getRecipients(){
    var type=document.getElementById('cRecipType').value;
    var list=vendors.filter(function(v){return v.email;});
    if(type==='approved')list=list.filter(function(v){return v.status==='approved';});
    else if(type==='unpaid')list=list.filter(function(v){return v.status==='approved'&&!v.paymentReceived;});
    else if(type==='nocontract')list=list.filter(function(v){return v.status==='approved'&&!v.contractReceived;});
    else if(type.startsWith('date:')){var ds=type.slice(5);var ids=getApproved(ds);list=list.filter(function(v){return ids.indexOf(v.id)>-1;});}
    else if(type.startsWith('group:')){var gid=type.slice(6);var g=vendorGroups.find(function(x){return x.id===gid;});var mids=g?g.member_ids||[]:[];list=list.filter(function(v){return mids.indexOf(v.id)>-1;});}
    else if(type.startsWith('cat:')){var cat=type.slice(4);list=list.filter(function(v){return v.category===cat;});}
    return list;
  }

  function updatePreview(){
    var r=getRecipients();
    var prev=document.getElementById('cRecipPreview');
    if(prev)prev.textContent=r.length+' recipient'+(r.length!==1?'s':'')+': '+r.slice(0,3).map(function(v){return v.businessName;}).join(', ')+(r.length>3?' + '+(r.length-3)+' more':'');
  }

  document.getElementById('cRecipType').addEventListener('change',updatePreview);
  updatePreview();

  document.getElementById('cCopyEmails').addEventListener('click',function(){
    var r=getRecipients();
    var emails=r.map(function(v){return v.email;}).join(', ');
    navigator.clipboard.writeText(emails).then(function(){alert('Copied '+r.length+' email address'+(r.length!==1?'es':'')+' to clipboard.');}).catch(function(){alert(emails);});
  });

  document.getElementById('cSendBtn').addEventListener('click',function(){
    var r=getRecipients();
    if(!r.length){alert('No recipients with email addresses in this selection.');return;}
    var emails=r.map(function(v){return v.email;}).join(',');
    var subj=(document.getElementById('cSubject').value||'').trim();
    var body=(document.getElementById('cBody').value||'').trim();
    sendEmail(emails,subj,body);
  });
}

        '<button class="btn-p" id="sendLayoutEmail">📧 Send to all vendors for this date</button>'+
      '</div>')+
    '</div>';

  if(!dates.length)return;

  function getLayoutRecips(ds){
    var ids=getApproved(ds);
    return vendors.filter(function(v){return ids.indexOf(v.id)>-1&&v.email;});
  }

  function buildLayoutEmailBody(ds){
    var ta=getTentAssignments(ds);
    // Find spot number for each vendor from layout cache
    var lspots=window._layoutCache&&window._layoutCache[ds]?window._layoutCache[ds]:[];
    var spotByVid={};
    lspots.forEach(function(sp){var vid=ta[sp.id];if(vid)spotByVid[vid]='Spot '+sp.num+(sp.size?' ('+sp.size+')':'');});
    var recips=getLayoutRecips(ds);
    var lines=['Market Layout — '+ds,'','Your spot assignment:'];
    recips.forEach(function(v){lines.push('  '+esc(v.businessName||v.contactName)+': '+(spotByVid[v.id]||'TBD'));});
    lines.push('','Please arrive by your scheduled setup time. Contact us with any questions.');
    var msg=(document.getElementById('layoutEmailMsg')||{}).value||'';
    if(msg.trim())lines.splice(1,0,'',msg.trim());
    return lines.join('\n');
  }

  var dateEl=document.getElementById('layoutEmailDate');
  if(dateEl){
    dateEl.addEventListener('change',function(){
      var ds=this.value;
      var r=getLayoutRecips(ds);
      var prev=document.getElementById('layoutEmailPreview');
      if(prev)prev.textContent=r.length+' vendor'+(r.length!==1?'s':'')+' with email for '+ds+': '+r.slice(0,4).map(function(v){return v.businessName;}).join(', ')+(r.length>4?' + '+(r.length-4)+' more':'');
    });
    dateEl.dispatchEvent(new Event('change'));
  }

  document.getElementById('previewLayoutEmail').addEventListener('click',function(){
    var ds=(document.getElementById('layoutEmailDate')||{}).value;
    if(!ds)return;
    alert('Subject: Market Layout for '+ds+'\n\n'+buildLayoutEmailBody(ds));
  });

  document.getElementById('sendLayoutEmail').addEventListener('click',async function(){
    var ds=(document.getElementById('layoutEmailDate')||{}).value;if(!ds)return;
    var recips=getLayoutRecips(ds);
    if(!recips.length){alert('No vendors with email addresses for '+ds+'.');return;}
    // Load layout cache if needed
    await ensureLayoutCache(ds);
    var emails=recips.map(function(v){return v.email;}).join(',');
    sendEmail(emails,'Market Layout for '+ds,buildLayoutEmailBody(ds));
  });
}

  // ── CSV file input — clean handlers, no double-click conflict ──────────
  function handleCSVFile(file){
    if(!file)return;
    if(!file.name.match(/\.csv$/i)&&file.type!=='text/csv'){
      document.getElementById('csvImportStatus').innerHTML='<span style="color:#791F1F">Please select a .csv file.</span>';
      return;
    }
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        csvData=parseCSV(ev.target.result);
        var statusEl=document.getElementById('csvImportStatus');
        var runBtn=document.getElementById('runImportBtn');
        var dropZone=document.getElementById('csvDropZone');
        if(csvData.length<2){
          statusEl.innerHTML='<span style="color:#791F1F">CSV appears empty — check the file and try again.</span>';
          return;
        }
        var headers=csvData[0].map(function(h){return h.trim().toLowerCase();});
        if(headers.indexOf('business name')===-1){
          statusEl.innerHTML='<span style="color:#791F1F">Missing required column: "Business Name". Check your file matches the template.</span>';
          return;
        }
        var count=csvData.length-1;
        statusEl.innerHTML='<span style="color:#27500A;font-weight:600">✓ Found '+count+' vendor'+(count!==1?'s':'')+' ready to import — click the button below.</span>';
        if(dropZone){dropZone.style.borderColor='#22c55e';dropZone.style.background='#EAF3DE';}
        if(runBtn){
          runBtn.style.display='';
          // Attach click handler directly to this button instance every time
          runBtn.onclick=null; // clear any old handler
          runBtn.onclick=async function(){
            runBtn.disabled=true;runBtn.textContent='Importing…';
            statusEl.innerHTML='<span style="color:#a16207">⏳ Building records…</span>';
            var hdrs=csvData[0].map(function(h){return h.trim().toLowerCase();});
            function col(row,name){var idx=hdrs.indexOf(name.toLowerCase());return idx>-1?(row[idx]||'').trim():'';}
            var CAT_VALID=['Farm / Produce Grower','Rancher / Eggs / Meat / Dairy','Baked Goods','Specialty Food / Packaged Goods','Prepared Food Vendor','Artisan / Maker','Flowers / Plants / Herbal Goods','Other'];
            var newRows=[],updatedIds=[],skipped=0;
            for(var i=1;i<csvData.length;i++){
              var row=csvData[i];
              if(!row.length||!row.join('').trim())continue;
              var bizName=col(row,'business name');
              if(!bizName){skipped++;continue;}
              var email=col(row,'email');
              var cat=col(row,'category');
              if(cat&&CAT_VALID.indexOf(cat)===-1)cat='Other';
              var appStatus=col(row,'status');
              if(['approved','pending','waitlist'].indexOf(appStatus)===-1)appStatus='pending';
              var vs=col(row,'vendor status');
              if(['active','inwork','inactive'].indexOf(vs)===-1)vs='active';
              var existing=null;
              if(email)existing=vendors.find(function(v){return v.email&&v.email.toLowerCase()===email.toLowerCase();});
              if(!existing)existing=vendors.find(function(v){return v.businessName&&v.businessName.toLowerCase()===bizName.toLowerCase();});
              var rowId=existing?existing.id:uid();
              var dbRow={
                id:rowId,status:appStatus,vendor_status:vs,
                business_name:bizName,contact_name:col(row,'contact name'),
                email:email,phone:col(row,'phone'),website:col(row,'website'),
                social:col(row,'social'),category:cat,booth_size:col(row,'booth size'),
                products:col(row,'products'),notes:col(row,'notes'),
                licenses:col(row,'licenses')||col(row,'licensing')||'',
                photos:[],price_range:[],food_docs:[],selected_dates:[],
                contract_received:false,payment_received:false,booth_fee:0,
                modified_at:nowISO()
              };
              if(!existing)dbRow.created_at=nowISO();
              newRows.push(dbRow);
              if(existing)updatedIds.push(rowId);
            }
            if(!newRows.length){
              statusEl.innerHTML='<span style="color:#791F1F">No valid rows found to import.</span>';
              runBtn.disabled=false;runBtn.textContent='📥 Import vendors';return;
            }
            statusEl.innerHTML='<span style="color:#a16207">⏳ Saving '+newRows.length+' vendors…</span>';
            var CHUNK=20,errors=0,errorMsg='';
            for(var c=0;c<newRows.length;c+=CHUNK){
              var chunk=newRows.slice(c,c+CHUNK);
              var res=await sb.from('vendors').upsert(chunk);
              if(res.error){console.error('Chunk error:',res.error);errorMsg=res.error.message;errors++;}
              statusEl.innerHTML='<span style="color:#a16207">⏳ Saved '+(Math.min(c+CHUNK,newRows.length))+' / '+newRows.length+'…</span>';
            }
            var created=newRows.length-updatedIds.length,updated=updatedIds.length;
            runBtn.disabled=false;runBtn.textContent='📥 Import vendors';
            if(errors){
              statusEl.innerHTML='<span style="color:#791F1F">⚠️ Error: '+esc(errorMsg)+'</span>';
            } else {
              statusEl.innerHTML='<span style="color:#27500A;font-weight:600">✅ Done! Created: '+created+' · Updated: '+updated+' · Skipped: '+skipped+'</span>';
              csvData=[];
              if(dropZone){dropZone.style.borderColor='#d0cec7';dropZone.style.background='';}
              runBtn.style.display='none';
              await loadData();
            }
          };
        }
      }catch(err){
        document.getElementById('csvImportStatus').innerHTML='<span style="color:#791F1F">Error reading file: '+esc(err.message)+'</span>';
      }
    };
    reader.onerror=function(){
      document.getElementById('csvImportStatus').innerHTML='<span style="color:#791F1F">Failed to read file.</span>';
    };
    reader.readAsText(file);
  }

  // File pick button
  var pickBtn=document.getElementById('csvPickBtn');
  var fileInp=document.getElementById('csvFileInput');
  if(pickBtn&&fileInp){
    pickBtn.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();fileInp.click();});
    fileInp.addEventListener('change',function(e){
      if(e.target.files&&e.target.files[0])handleCSVFile(e.target.files[0]);
    });
  }
  var dropZone=document.getElementById('csvDropZone');
  if(dropZone){
    dropZone.addEventListener('dragover',function(e){e.preventDefault();e.stopPropagation();dropZone.style.borderColor='#378ADD';dropZone.style.background='#E6F1FB';});
    dropZone.addEventListener('dragleave',function(e){e.stopPropagation();dropZone.style.borderColor='#d0cec7';dropZone.style.background='';});
    dropZone.addEventListener('drop',function(e){
      e.preventDefault();e.stopPropagation();
      dropZone.style.borderColor='#d0cec7';dropZone.style.background='';
      var f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0];
      if(f)handleCSVFile(f);
    });
  }

  // Import handler is now inside handleCSVFile → runBtn.onclick

  // ── Category color editor ─────────────────────────────────────────────
  // Helper: derive bg and text from a hex dot color
  function hexToColorSet(hex){
    // bg = very light tint (hex at 15% opacity on white)
    // text = darkened version
    // border = the hex itself
    function hexToRgb(h){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return{r,g,b};}
    function toHex(n){return Math.round(n).toString(16).padStart(2,'0');}
    var rgb=hexToRgb(hex);
    var bgR=Math.round(rgb.r*0.15+255*0.85),bgG=Math.round(rgb.g*0.15+255*0.85),bgB=Math.round(rgb.b*0.15+255*0.85);
    var bg='#'+toHex(bgR)+toHex(bgG)+toHex(bgB);
    var textR=Math.round(rgb.r*0.45),textG=Math.round(rgb.g*0.45),textB=Math.round(rgb.b*0.45);
    var text='#'+toHex(textR)+toHex(textG)+toHex(textB);
    return{bg:bg,border:hex,text:text,dot:hex};
  }

  document.querySelectorAll('.cat-color-pick').forEach(function(inp){

    for(var i=0;i<approved.length;i++){var v=approved[i];var fee=sizeMap[v.boothSize]||0;if(fee>0){await sb.from('vendors').update({booth_fee:fee}).eq('id',v.id);try{await sb.from('vendors').update({modified_at:nowISO()}).eq('id',v.id);}catch(e){}v.boothFee=fee;updated++;}}

// ── CSV parser (handles quoted fields) ────────────────────────────────────
function parseCSV(text){
  var rows=[];var lines=text.split(/\r?\n/);
  for(var i=0;i<lines.length;i++){
    var line=lines[i];if(!line.trim())continue;
    var row=[];var cur='';var inQ=false;
    for(var j=0;j<line.length;j++){
      var ch=line[j];
      if(ch==='"'){if(inQ&&line[j+1]==='"'){cur+='"';j++;}else inQ=!inQ;}
      else if(ch===','&&!inQ){row.push(cur);cur='';}
      else cur+=ch;
    }
    row.push(cur);rows.push(row);
  }
  return rows;
}

        '<option value="approved">Approved</option>'+
        '<option value="pending">Pending</option>'+
        '<option value="waitlist">Waitlist</option>'+
      '</select></div>'+
    '</div>'+

    (dates.length?

      '<select id="gFilterDate" style="width:100%;border:.5px solid #d0cec7;border-radius:7px;padding:6px 8px;font-size:12px;font-family:inherit">'+
        '<option value="">Any date</option>'+
        dates.map(function(ds){return'<option value="'+ds+'">'+ds+'</option>';}).join('')+

    // Vendor list
    '<div style="max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;border:.5px solid #e5e3de;border-radius:8px;padding:6px" id="gMemberList">'+

          ' data-name="'+esc((v.businessName||'').toLowerCase())+'"'+
          ' data-cat="'+esc((v.category||'').toLowerCase())+'"'+
          ' data-catfull="'+esc(v.category||'')+'"'+
          ' data-status="'+esc(v.status||'pending')+'"'+
          ' data-dates="'+esc(getMarketDates().filter(function(ds){return getApproved(ds).indexOf(v.id)>-1;}).join(','))+'">'+
          '<input type="checkbox" value="'+v.id+'" class="g-member-cb"'+(memberIds.indexOf(v.id)>-1?' checked':'')+' style="width:15px;height:15px;accent-color:#22c55e;flex-shrink:0">'+

  // Filter function — applies all active filters simultaneously
  function applyGroupFilters(){
    var q=(document.getElementById('gSearch').value||'').toLowerCase();
    var cat=(document.getElementById('gFilterCat').value||'').toLowerCase();
    var status=(document.getElementById('gFilterStatus').value||'');
    var date=(document.getElementById('gFilterDate')&&document.getElementById('gFilterDate').value)||'';
    var visible=0;
    document.querySelectorAll('.g-member-opt').forEach(function(row){
      var nameMatch=!q||row.dataset.name.indexOf(q)>-1;
      var catMatch=!cat||row.dataset.cat.indexOf(cat)>-1;
      var statusMatch=!status||row.dataset.status===status;
      var dateMatch=!date||row.dataset.dates.indexOf(date)>-1;
      var show=nameMatch&&catMatch&&statusMatch&&dateMatch;
      row.style.display=show?'':'none';
      if(show)visible++;
    });
    document.getElementById('gCount').textContent=
      document.querySelectorAll('.g-member-cb:checked').length+' selected · '+visible+' visible';
  }

  function updateCount(){
    var vis=document.querySelectorAll('.g-member-opt:not([style*="none"])').length;
    document.getElementById('gCount').textContent=document.querySelectorAll('.g-member-cb:checked').length+' selected · '+vis+' visible';

// ── sendEmail — swap this body for Gmail API when ready ───────────────────
// TO SWITCH TO GMAIL API: replace the window.open line with a fetch() call
// to your Gmail API endpoint with the same to/subject/body parameters.
function sendEmail(to,subject,body){
  // mailto: version — opens the user's default mail app
  var url='mailto:'+encodeURIComponent(to)+
    '?subject='+encodeURIComponent(subject)+
    '&body='+encodeURIComponent(body);
  window.open(url,'_blank');
}
